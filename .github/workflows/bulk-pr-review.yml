name: Bulk PR Review (Process Existing Open PRs)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (comment + label only, no merge)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  bulk-review:
    runs-on: ubuntu-latest
    steps:
      - name: Process all open PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MERGE_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const DRY_RUN = '${{ github.event.inputs.dry_run }}' === 'true';

            core.info(`Starting bulk PR review. Dry run: ${DRY_RUN}`);

            // ── Fetch ALL open PRs (paginate) ─────────────────────────────
            const allPRs = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 100, page,
              });
              if (data.length === 0) break;
              allPRs.push(...data);
              page++;
            }

            core.info(`Found ${allPRs.length} open PRs to process.`);

            // ── Process each PR ───────────────────────────────────────────
            for (const pr of allPRs) {
              const prNum    = pr.number;
              const prHead   = pr.head.sha;
              const prAuthor = pr.user.login;

              core.info(`\n── Processing PR #${prNum} by @${prAuthor} ──`);

              try {
                // Check if already processed (has level3 label)
                const { data: currentPR } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNum,
                });
                
                if (currentPR.merged) {
                  core.info(`PR #${prNum} already merged.`);
                  continue;
                }

                // ── Collect changed files ─────────────────────────────────
                const { data: files } = await github.rest.pulls.listFiles({
                  owner, repo, pull_number: prNum,
                });

                const normalized = files.map(f => ({
                  ...f,
                  fl: f.filename.toLowerCase(),
                  st: (f.status || 'added').toLowerCase(),
                }));

                const errors = [];

                // ── SECTION 1: File scope ─────────────────────────────────
                const outsideProjects = files.some(f => !f.filename.startsWith('Projects/'));
                const rootJsonTouched = files.some(f => f.filename === 'project.json');

                if (rootJsonTouched || outsideProjects) {
                  errors.push(
                    'All changes must be inside a new project folder under `Projects/`. ' +
                    'Do not modify root-level files or any file outside your project folder.'
                  );
                }

                const projectDirs = new Set();
                for (const f of normalized) {
                  if (f.filename.startsWith('Projects/')) {
                    const parts = f.filename.split('/');
                    if (parts.length >= 2) projectDirs.add(parts.slice(0, 2).join('/'));
                  }
                }

                if (projectDirs.size === 0) {
                  errors.push(
                    'No files were found under `Projects/`. ' +
                    'Place your project inside a new folder in `Projects/`.'
                  );
                } else if (projectDirs.size > 1) {
                  errors.push(
                    `This PR touches ${projectDirs.size} different project folders. ` +
                    'A single PR must contain exactly one new project.'
                  );
                }

                if (files.length > 6) {
                  errors.push(
                    `This PR contains ${files.length} files. ` +
                    'The maximum for a single project submission is 6 files.'
                  );
                }

                let projectDir = null;
                if (projectDirs.size === 1) {
                  [projectDir] = [...projectDirs];
                  const folderName = projectDir.split('/')[1];

                  // ── SECTION 2: Folder name ────────────────────────────
                  function isTitleCase(name) {
                    if (/[-_]/.test(name)) return false;
                    return name.split(' ').every(w => /^[A-Z0-9][A-Za-z0-9]*$/.test(w));
                  }

                  if (!isTitleCase(folderName)) {
                    errors.push(
                      `The folder name "${folderName}" does not follow the required format. ` +
                      'Folder names must be Title Case with real spaces, e.g. "To Do Web App".'
                    );
                  }

                  // ── SECTION 3: Required files ─────────────────────────
                  const dirLower = projectDir.toLowerCase();
                  const hasReadme      = normalized.some(f => f.fl === `${dirLower}/readme.md`);
                  const hasProjectJson = normalized.some(f => f.fl === `${dirLower}/project.json`);
                  const hasModified    = normalized.some(
                    f => f.fl.startsWith(`${dirLower}/`) && f.st !== 'added'
                  );

                  if (!hasReadme)      errors.push('A `README.md` file is required inside your project folder.');
                  if (!hasProjectJson) errors.push('A `project.json` metadata file is required inside your project folder.');
                  if (hasModified) {
                    errors.push(
                      'This PR modifies one or more existing files. ' +
                      'A project submission must only add new files.'
                    );
                  }

                  // ── SECTION 4: project.json content validation ─────────
                  if (hasProjectJson) {
                    let meta = null;
                    try {
                      const { data: fileData } = await github.rest.repos.getContent({
                        owner, repo,
                        path: `${projectDir}/project.json`,
                        ref: prHead,
                      });
                      const raw = Buffer.from(fileData.content, 'base64').toString('utf8');
                      meta = JSON.parse(raw);
                    } catch (e) {
                      errors.push(`\`project.json\` could not be read or parsed: ${e.message}.`);
                    }

                    if (meta) {
                      const REQUIRED = ['title', 'description', 'author', 'tags', 'entry'];
                      for (const field of REQUIRED) {
                        if (!meta[field]) errors.push(`\`project.json\` is missing the required field \`${field}\`.`);
                      }
                      if (meta.title && meta.title !== folderName) {
                        errors.push(`\`project.json\` title "${meta.title}" must exactly match the folder name "${folderName}".`);
                      }
                      if (meta.author && typeof meta.author === 'object') {
                        if (!meta.author.name)   errors.push('`project.json` author object is missing `name`.');
                        if (!meta.author.github) errors.push('`project.json` author object is missing `github`.');
                      }
                      if (meta.tags !== undefined) {
                        if (!Array.isArray(meta.tags)) {
                          errors.push('`project.json` field `tags` must be a JSON array.');
                        } else if (meta.tags.length < 1 || meta.tags.length > 6) {
                          errors.push(`\`project.json\` \`tags\` must have between 1 and 6 entries (found ${meta.tags.length}).`);
                        }
                      }
                      if (meta.entry) {
                        const entryLower = `${dirLower}/${meta.entry.toLowerCase()}`;
                        const entryInPR  = normalized.some(f => f.fl === entryLower);
                        if (!entryInPR) {
                          errors.push(`\`project.json\` lists "${meta.entry}" as the entry point, but that file was not found in this PR.`);
                        }
                      }
                    }
                  }
                }

                // ── Post result ───────────────────────────────────────────
                if (errors.length === 0) {
                  core.info(`PR #${prNum} PASSED ✅`);

                  if (!DRY_RUN) {
                    // Add labels
                    await github.rest.issues.addLabels({
                      owner, repo, issue_number: prNum,
                      labels: ['level3', "NSoC'26 Accepted", "NSoC'26", 'nsoc26'],
                    }).catch(e => core.warning(`Label error on PR #${prNum}: ${e.message}`));

                    // Check if we already commented a pass message (avoid duplicates)
                    const { data: comments } = await github.rest.issues.listComments({
                      owner, repo, issue_number: prNum,
                    });
                    const botAlreadyCommented = comments.some(
                      c => c.user.type === 'Bot' && c.body.includes('All Checks Passed')
                    );

                    if (!botAlreadyCommented) {
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNum,
                        body: [
                          '**PR Validation — All Checks Passed ✅**',
                          '',
                          `@${prAuthor}, your project submission has passed all validation checks!`,
                          '',
                          'Your PR has been approved and will now be merged automatically.',
                          'A thumbnail will be auto-generated for your project once the merge is complete.',
                          '',
                          'Thank you for contributing to OpenStudio 🎉',
                        ].join('\n'),
                      });
                    }

                    // Merge the PR
                    const folderLabel = projectDir ? projectDir.split('/')[1] : 'submission';
                    await github.rest.pulls.merge({
                      owner, repo,
                      pull_number: prNum,
                      merge_method: 'squash',
                      commit_title: `Add project: ${folderLabel} (#${prNum})`,
                      commit_message: `Submitted by @${prAuthor}`,
                    }).catch(e => core.warning(`Merge error on PR #${prNum}: ${e.message}`));

                    core.info(`PR #${prNum} labeled and merged.`);
                  } else {
                    core.info(`DRY RUN: Would label and merge PR #${prNum}.`);
                  }

                } else {
                  core.info(`PR #${prNum} FAILED ❌ — ${errors.length} issue(s)`);

                  if (!DRY_RUN) {
                    // Only comment if bot hasn't already commented a failure
                    const { data: comments } = await github.rest.issues.listComments({
                      owner, repo, issue_number: prNum,
                    });
                    const botAlreadyCommented = comments.some(
                      c => c.user.type === 'Bot' && c.body.includes('Checks Failed')
                    );

                    if (!botAlreadyCommented) {
                      const lines = [
                        '**PR Validation — Checks Failed ❌**',
                        '',
                        'The following issues must be resolved before this PR can be merged.',
                        'Fix them in your branch and push a new commit — this check will re-run automatically.',
                        '',
                      ];
                      for (const e of errors) lines.push(`- ${e}`);
                      lines.push('', 'Refer to [CONTRIBUTING.md](../../blob/main/CONTRIBUTING.md) for full submission requirements.');

                      await github.rest.issues.createComment({
                        owner, repo, issue_number: prNum,
                        body: lines.join('\n'),
                      });
                      core.info(`Commented failure on PR #${prNum}.`);
                    } else {
                      core.info(`PR #${prNum} already has a failure comment — skipped re-comment.`);
                    }
                  } else {
                    core.info(`DRY RUN: Would comment failure on PR #${prNum}: ${errors.join('; ')}`);
                  }
                }

              } catch (err) {
                core.warning(`Error processing PR #${prNum}: ${err.message}`);
              }

              // Small delay to respect GitHub API rate limits (secondary rate limit)
              await new Promise(r => setTimeout(r, 1500));
            }

            core.info('\n── Bulk review complete ──');
