<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
    
    <!-- Glowing Filters -->
    <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-danger" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-accent" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Slate Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  
  <!-- Subtle Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Mockup Header -->
  <text x="400" y="70" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" letter-spacing="3">SORTING ALGORITHM LAB</text>
  <text x="400" y="100" text-anchor="middle" fill="#6b7280" font-family="'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5">// REAL-TIME COMPLEXITY BENCHMARKS &amp; SPECTRUM BARS</text>

  <!-- Spectral Array Columns -->
  <!-- We will place a series of rounded vertical rects representing bars in a parabolic sorting shape -->
  <!-- Sorted elements (Emerald/Success) -->
  <rect x="70" y="320" width="16" height="80" rx="4" fill="#10b981" filter="url(#glow-accent)" />
  <rect x="94" y="300" width="16" height="100" rx="4" fill="#10b981" filter="url(#glow-accent)" />
  <rect x="118" y="280" width="16" height="120" rx="4" fill="#10b981" filter="url(#glow-accent)" />
  <rect x="142" y="270" width="16" height="130" rx="4" fill="#10b981" filter="url(#glow-accent)" />
  
  <!-- Unsorted Spectrum elements (gradually shifting hues) -->
  <rect x="166" y="260" width="16" height="140" rx="4" fill="#2563eb" />
  <rect x="190" y="310" width="16" height="90" rx="4" fill="#3b82f6" />
  <rect x="214" y="230" width="16" height="170" rx="4" fill="#06b6d4" />
  <rect x="238" y="210" width="16" height="190" rx="4" fill="#0891b2" />
  
  <!-- Comparing Elements (Cyan/Info Highlight) -->
  <rect x="262" y="240" width="16" height="160" rx="4" fill="#06b6d4" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-primary)" />
  <rect x="286" y="240" width="16" height="160" rx="4" fill="#06b6d4" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-primary)" />

  <rect x="310" y="330" width="16" height="70" rx="4" fill="#4f46e5" />
  <rect x="334" y="170" width="16" height="230" rx="4" fill="#7c3aed" />
  <rect x="358" y="190" width="16" height="210" rx="4" fill="#8b5cf6" />
  
  <!-- Swap Active Elements (Magenta/Danger Highlight) -->
  <rect x="382" y="150" width="16" height="250" rx="4" fill="#f43f5e" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-danger)" />
  <rect x="406" y="290" width="16" height="110" rx="4" fill="#f43f5e" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-danger)" />

  <rect x="430" y="220" width="16" height="180" rx="4" fill="#a855f7" />
  <rect x="454" y="180" width="16" height="220" rx="4" fill="#d946ef" />
  
  <!-- Pivot Element (Orange/Warning Highlight) -->
  <rect x="478" y="130" width="16" height="270" rx="4" fill="#f59e0b" stroke="#ffffff" stroke-width="2" filter="url(#glow-primary)" />

  <rect x="502" y="280" width="16" height="120" rx="4" fill="#ec4899" />
  <rect x="526" y="250" width="16" height="150" rx="4" fill="#f43f5e" />
  <rect x="550" y="210" width="16" height="190" rx="4" fill="#ff7a00" />
  <rect x="574" y="190" width="16" height="210" rx="4" fill="#ffa800" />
  <rect x="598" y="160" width="16" height="240" rx="4" fill="#ffd000" />
  <rect x="622" y="140" width="16" height="260" rx="4" fill="#ffe600" />
  <rect x="646" y="120" width="16" height="280" rx="4" fill="#d4ff00" />
  <rect x="670" y="100" width="16" height="300" rx="4" fill="#8cff00" />
  <rect x="694" y="90" width="16" height="310" rx="4" fill="#10b981" />
  <rect x="718" y="80" width="16" height="320" rx="4" fill="#10b981" />

  <!-- Dashboard Telemetry cards mockup -->
  <rect x="30" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="45" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">SORT ENGINE</text>
  <text x="45" y="458" fill="#8b5cf6" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">QUICK SORT</text>

  <rect x="200" y="420" width="120" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="215" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">COMPARISONS</text>
  <text x="215" y="458" fill="#06b6d4" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">142</text>

  <rect x="340" y="420" width="120" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="355" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">ARRAY WRITES</text>
  <text x="355" y="458" fill="#f43f5e" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">89</text>

  <!-- Big O Notation Mockup -->
  <rect x="620" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="635" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">AVERAGE COMPLEXITY</text>
  <text x="635" y="458" fill="#10b981" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">O(N LOG N)</text>
</svg>
