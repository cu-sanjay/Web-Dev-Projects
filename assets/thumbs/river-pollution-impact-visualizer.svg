    <text x="123" y="420" font-family="monospace" font-size="5" fill="#4a5268" text-anchor="middle">ES6+</text>
    <rect x="146" y="412" width="44" height="12" rx="2" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
