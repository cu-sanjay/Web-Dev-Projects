    <text x="568" y="220" font-family="'Orbitron',monospace" font-size="15" fill="#ffb800" font-weight="700">73.3%</text>

    <rect x="558" y="242" width="182" height="48" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <text x="568" y="254" font-family="monospace" font-size="6" fill="#4a5268">ECO-HEALTH</text>
    <text x="568" y="276" font-family="'Orbitron',monospace" font-size="14" fill="#ffb800" font-weight="700">DEGRADED</text>

