    <text x="267" y="381" font-family="monospace" font-size="7" fill="#8892a8" text-anchor="middle">ACTIVATE CLEANUP</text>
    <rect x="350" y="366" width="160" height="22" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
