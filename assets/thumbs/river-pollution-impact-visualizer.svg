    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00e5ff"/><stop offset="100%" stop-color="#7c4dff"/></linearGradient>
    <filter id="panelGlow"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.8"/></filter>
    <pattern id="gridP" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M12 0L0 0 0 12" fill="none" stroke="rgba(148,163,184,0.01)" stroke-width="1"/></pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/><rect width="800" height="500" fill="url(#gridP)"/>
  <circle cx="650" cy="80" r="140" fill="#00e5ff" opacity="0.02" filter="blur(50px)"/>

  <g transform="translate(18,16)" filter="url(#panelGlow)">
