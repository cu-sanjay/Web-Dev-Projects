<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111827" stop-opacity="1" />
      <stop offset="100%" stop-color="#070a13" stop-opacity="1" />
    </radialGradient>
    
    <!-- Component Gradients -->
    <linearGradient id="client-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="lb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <linearGradient id="app-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="32" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4"/>

  <!-- Canvas Grid Pattern -->
  <g stroke="rgba(255, 255, 255, 0.025)" stroke-width="1.5">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Connection Paths -->
  <g fill="none" stroke-linecap="round">
    <!-- Path: Client to LB -->
    <path d="M140 256 H216" stroke="rgba(255, 255, 255, 0.15)" stroke-width="4" />
    <!-- Path: LB to App Server 1 -->
    <path d="M280 256 C310 256, 330 170, 370 170" stroke="rgba(56, 189, 248, 0.2)" stroke-width="4" />
    <!-- Path: LB to App Server 2 -->
    <path d="M280 256 C310 256, 330 342, 370 342" stroke="rgba(56, 189, 248, 0.2)" stroke-width="4" />
    <!-- Path: App Server 1 to DB -->
    <path d="M410 170 C435 170, 435 256, 450 256" stroke="rgba(52, 211, 153, 0.15)" stroke-width="3" />
    <!-- Path: App Server 2 to DB -->
    <path d="M410 342 C435 342, 435 256, 450 256" stroke="rgba(52, 211, 153, 0.15)" stroke-width="3" />
  </g>

  <!-- Traffic Particles (Glowing Circles along paths) -->
  <circle cx="178" cy="256" r="6" fill="#38bdf8" filter="url(#neon-glow)" />
  <circle cx="328" cy="210" r="5" fill="#a855f7" filter="url(#neon-glow)" />
  <circle cx="340" cy="308" r="5" fill="#34d399" filter="url(#neon-glow)" />

  <!-- Node 1: Client (Browser) -->
  <g transform="translate(60, 216)">
    <rect width="80" height="80" rx="12" fill="#0f1629" stroke="url(#client-grad)" stroke-width="3" filter="url(#neon-glow)" />
    <!-- Browser Mock -->
    <rect x="12" y="12" width="56" height="12" rx="4" fill="rgba(56, 189, 248, 0.15)" />
    <circle cx="20" cy="18" r="2" fill="#ef4444" />
    <circle cx="26" cy="18" r="2" fill="#fbbf24" />
    <circle cx="32" cy="18" r="2" fill="#10b981" />
    <path d="M24 44 H56 M24 54 H44" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Node 2: Load Balancer -->
  <g transform="translate(200, 216)">
    <rect width="80" height="80" rx="12" fill="#0f1629" stroke="url(#lb-grad)" stroke-width="3" filter="url(#neon-glow)" />
    <!-- Balance Scale Representation -->
    <line x1="40" y1="20" x2="40" y2="60" stroke="#a855f7" stroke-width="4" stroke-linecap="round" />
    <line x1="20" y1="30" x2="60" y2="30" stroke="#a855f7" stroke-width="4" stroke-linecap="round" />
    <!-- Balancer left & right weights -->
    <circle cx="20" cy="46" r="8" fill="none" stroke="#a855f7" stroke-width="3" />
    <circle cx="60" cy="46" r="8" fill="none" stroke="#a855f7" stroke-width="3" />
  </g>

  <!-- Node 3: App Server 1 -->
  <g transform="translate(350, 130)">
    <rect width="60" height="80" rx="10" fill="#0f1629" stroke="url(#app-grad)" stroke-width="3" filter="url(#neon-glow)" />
    <!-- Server Stack Rails -->
    <rect x="12" y="16" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="21" r="2" fill="#34d399" />
    <rect x="12" y="35" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="40" r="2" fill="#34d399" />
    <rect x="12" y="54" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="59" r="2" fill="#34d399" />
  </g>

  <!-- Node 4: App Server 2 -->
  <g transform="translate(350, 302)">
    <rect width="60" height="80" rx="10" fill="#0f1629" stroke="url(#app-grad)" stroke-width="3" filter="url(#neon-glow)" />
    <!-- Server Stack Rails -->
    <rect x="12" y="16" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="21" r="2" fill="#34d399" />
    <rect x="12" y="35" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="40" r="2" fill="#34d399" />
    <rect x="12" y="54" width="36" height="10" rx="2" fill="rgba(52, 211, 153, 0.15)" />
    <circle cx="20" cy="59" r="2" fill="#34d399" />
  </g>

  <!-- Node 5: Database (Target) -->
  <g transform="translate(440, 216)">
    <circle cx="30" cy="40" r="26" fill="#0f1629" stroke="url(#db-grad)" stroke-width="3" filter="url(#neon-glow)" />
    <!-- Cylinder details -->
    <path d="M16 26 C 16 34, 44 34, 44 26 M16 38 C 16 46, 44 46, 44 38 M16 50 C 16 58, 44 58, 44 50" fill="none" stroke="#f97316" stroke-width="3" />
  </g>
</svg>
