<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#0f172a"/></linearGradient><linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="60" y="50" font-family="ui-monospace,monospace" font-size="20" font-weight="800" fill="#f8fafc" letter-spacing="1">ANCIENT CIVILIZATION EXPLORER</text>
  <text x="60" y="72" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">Egypt · Indus Valley · Mesopotamia · Greece · Rome · China</text>
  <rect x="60" y="95" width="260" height="570" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
  <g transform="translate(75,110)">
    <rect x="0" y="0" width="230" height="40" rx="6" fill="rgba(56,189,248,.06)" stroke="rgba(56,189,248,.2)" stroke-width="1"/><text x="12" y="26" font-family="ui-monospace,monospace" font-size="18">🔺</text><text x="38" y="26" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#38bdf8">Ancient Egypt</text>
    <rect x="0" y="46" width="230" height="40" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="72" font-family="ui-monospace,monospace" font-size="18">🏛️</text><text x="38" y="72" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#cbd5e1">Indus Valley</text>
    <rect x="0" y="92" width="230" height="40" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="118" font-family="ui-monospace,monospace" font-size="18">⚱️</text><text x="38" y="118" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#cbd5e1">Mesopotamia</text>
    <rect x="0" y="138" width="230" height="40" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="164" font-family="ui-monospace,monospace" font-size="18">🏗️</text><text x="38" y="164" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#cbd5e1">Ancient Greece</text>
    <rect x="0" y="184" width="230" height="40" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="210" font-family="ui-monospace,monospace" font-size="18">🏛️</text><text x="38" y="210" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#cbd5e1">Ancient Rome</text>
    <rect x="0" y="230" width="230" height="40" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="256" font-family="ui-monospace,monospace" font-size="18">🏯</text><text x="38" y="256" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#cbd5e1">Ancient China</text>
  </g>
  <rect x="350" y="95" width="400" height="570" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
  <g transform="translate(370,120)">
    <text font-family="ui-monospace,monospace" font-size="36">🔺</text>
    <text y="8" x="50" font-family="ui-monospace,monospace" font-size="18" font-weight="700" fill="#f8fafc">Ancient Egypt</text>
    <text y="28" x="50" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">c. 3100–332 BCE · Northeast Africa · Capital: Memphis / Thebes</text>
    <text y="55" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">OVERVIEW</text>
    <text y="75" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1" line-height="1.5">One of the world's oldest civilizations, known for</text>
    <text y="92" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">monumental architecture, hieroglyphic writing, and</text>
    <text y="109" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">advanced mathematics.</text>
    <text y="135" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">KEY STATISTICS</text>
    <rect x="0" y="148" width="85" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="42" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#38bdf8">2,700+</text><text x="42" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">YEARS</text>
    <rect x="93" y="148" width="85" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="135" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#38bdf8">3–5M</text><text x="135" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">POPULATION</text>
    <rect x="186" y="148" width="85" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="228" y="170" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#38bdf8">170+</text><text x="228" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">RULERS</text>
    <text y="228" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">MAJOR ACHIEVEMENTS</text>
    <text y="250" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">✦ Pyramids of Giza — last surviving Wonder</text>
    <text y="270" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">✦ Hieroglyphic writing system</text>
    <text y="290" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">✦ 365-day calendar with 12 months</text>
    <text y="310" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">✦ Advanced mummification techniques</text>
    <text y="330" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">✦ First known peace treaty</text>
  </g>
  <rect x="780" y="95" width="440" height="570" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="810" y="125" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">TIMELINE</text>
  <g transform="translate(810,140)">
    <line x1="8" y1="0" x2="8" y2="480" stroke="#334155" stroke-width="2"/>
    <circle cx="8" cy="0" r="4" fill="#38bdf8"/><text x="22" y="4" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#38bdf8">c. 3100 BCE</text><text x="22" y="18" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Unification of Upper and Lower Egypt</text>
    <circle cx="8" cy="50" r="4" fill="#38bdf8"/><text x="22" y="54" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#38bdf8">c. 2560 BCE</text><text x="22" y="68" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Great Pyramid of Giza completed</text>
    <circle cx="8" cy="100" r="4" fill="#38bdf8"/><text x="22" y="104" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#38bdf8">c. 1500 BCE</text><text x="22" y="118" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Height of Egyptian power</text>
    <circle cx="8" cy="150" r="4" fill="#38bdf8"/><text x="22" y="154" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#38bdf8">1332 BCE</text><text x="22" y="168" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Tutankhamun's reign</text>
    <circle cx="8" cy="200" r="4" fill="#38bdf8"/><text x="22" y="204" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#38bdf8">332 BCE</text><text x="22" y="218" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Alexander the Great conquers Egypt</text>
  </g>
  <rect x="0" y="718" width="1280" height="2" fill="url(#accent)" opacity=".4"/>
</svg>
