<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#111832" />
      <stop offset="100%" stop-color="#04060b" />
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="12" />

  <!-- Alignment Grid -->
  <g stroke="rgba(255, 255, 255, 0.025)" stroke-width="0.75">
    <line x1="40" y1="0" x2="40" y2="400" />
    <line x1="80" y1="0" x2="80" y2="400" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="240" y1="0" x2="240" y2="400" />
    <line x1="280" y1="0" x2="280" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />

    <line x1="0" y1="40" x2="400" y2="40" />
    <line x1="0" y1="80" x2="400" y2="80" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="160" x2="400" y2="160" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="240" x2="400" y2="240" />
    <line x1="0" y1="280" x2="400" y2="280" />
    <line x1="0" y1="320" x2="400" y2="320" />
    <line x1="0" y1="360" x2="400" y2="360" />
  </g>

  <!-- Flow Vector Arrows (Faint Background Field) -->
  <g stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" fill="rgba(255, 255, 255, 0.08)">
    <!-- Upstream field (Laminar) -->
    <path d="M 20 100 L 40 100 M 40 100 L 35 97 M 40 100 L 35 103" />
    <path d="M 20 150 L 40 150 M 40 150 L 35 147 M 40 150 L 35 153" />
    <path d="M 20 200 L 40 200 M 40 200 L 35 197 M 40 200 L 35 203" />
    <path d="M 20 250 L 40 250 M 40 250 L 35 247 M 40 250 L 35 253" />
    <path d="M 20 300 L 40 300 M 40 300 L 35 297 M 40 300 L 35 303" />
    
    <!-- Deflected field around cylinder -->
    <path d="M 70 140 L 88 130 M 88 130 L 81 129 M 88 130 L 85 136" />
    <path d="M 70 260 L 88 270 M 88 270 L 85 264 M 88 270 L 81 271" />
    <path d="M 120 105 L 140 105 M 140 105 L 135 102 M 140 105 L 135 108" />
    <path d="M 120 295 L 140 295 M 140 295 L 135 292 M 140 295 L 135 298" />
  </g>

  <!-- Glowing Fluid Vortex Street Dye Fields -->
  <!-- Upper Cyan vortices -->
  <path d="M 200 150 C 230 110, 240 170, 220 190 C 200 210, 180 160, 200 150 Z" fill="rgba(0, 242, 254, 0.08)" stroke="rgba(0, 242, 254, 0.3)" stroke-width="1.5" filter="url(#glow-cyan)" />
  <path d="M 310 145 C 340 115, 350 175, 330 190 C 310 205, 295 160, 310 145 Z" fill="rgba(0, 242, 254, 0.06)" stroke="rgba(0, 242, 254, 0.22)" stroke-width="1.2" filter="url(#glow-cyan)" />

  <!-- Lower Purple vortices (anti-symmetric) -->
  <path d="M 255 240 C 285 270, 305 210, 285 195 C 265 180, 245 220, 255 240 Z" fill="rgba(168, 85, 247, 0.08)" stroke="rgba(168, 85, 247, 0.3)" stroke-width="1.5" filter="url(#glow-purple)" />
  <path d="M 360 235 C 385 265, 395 210, 380 200 C 365 190, 350 220, 360 235 Z" fill="rgba(168, 85, 247, 0.05)" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1.2" filter="url(#glow-purple)" />

  <!-- Fluid Streamlines (Drifting Particles Paths) -->
  <g fill="none" stroke-linecap="round">
    <!-- Top laminar to wake -->
    <path d="M 10 90 L 90 90 Q 140 90, 180 120 T 260 135 T 330 110 T 390 125" stroke="rgba(255, 255, 255, 0.22)" stroke-width="1.2" />
    <path d="M 10 130 C 60 130, 80 120, 110 110 C 145 95, 175 120, 195 145 C 220 175, 240 180, 260 170 T 310 155 T 370 175" stroke="rgba(0, 242, 254, 0.35)" stroke-width="1.5" />

    <!-- Center splitting around cylinder -->
    <path d="M 10 200 L 70 200 C 90 180, 95 160, 130 160 C 170 160, 185 230, 220 220 C 250 210, 260 175, 290 190 C 320 205, 340 240, 390 220" stroke="rgba(0, 242, 254, 0.45)" stroke-width="1.8" filter="url(#glow-cyan)" />
    
    <path d="M 10 200 L 70 200 C 90 220, 95 240, 130 240 C 160 240, 180 180, 205 175 C 230 170, 245 235, 275 235 C 300 235, 320 190, 390 195" stroke="rgba(168, 85, 247, 0.45)" stroke-width="1.8" filter="url(#glow-purple)" />

    <!-- Bottom laminar to wake -->
    <path d="M 10 270 C 60 270, 80 280, 110 290 C 145 305, 175 280, 195 255 C 220 225, 240 220, 260 230 T 310 245 T 370 225" stroke="rgba(168, 85, 247, 0.35)" stroke-width="1.5" />
    <path d="M 10 310 L 90 310 Q 140 310, 180 280 T 260 265 T 330 290 T 390 275" stroke="rgba(255, 255, 255, 0.22)" stroke-width="1.2" />
  </g>

  <!-- Tracer particles dots -->
  <circle cx="210" cy="180" r="2" fill="#ffffff" />
  <circle cx="285" cy="195" r="2.2" fill="#ffffff" />
  <circle cx="330" cy="190" r="1.8" fill="#ffffff" filter="url(#glow-cyan)" />
  <circle cx="255" cy="240" r="2" fill="#ffffff" />
  <circle cx="360" cy="235" r="2.2" fill="#ffffff" filter="url(#glow-purple)" />

  <!-- Obstacle (Circular Cylinder Block) -->
  <circle cx="120" cy="200" r="25" fill="#1c2842" stroke="#94a3b8" stroke-width="3" />
  <!-- Inner core shading -->
  <circle cx="115" cy="195" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

  <!-- Outer Dashboard Border -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" rx="8" />

  <!-- Flow Vector Emitter Icon (Top Left Decor) -->
  <g transform="translate(25, 25)" stroke="var(--color-faucet)" stroke-width="1" fill="none" opacity="0.6">
    <circle cx="8" cy="8" r="7" stroke-dasharray="2 1" />
    <path d="M 4 8 L 12 8 M 12 8 L 9 5 M 12 8 L 9 11" stroke-width="1.2" />
  </g>

  <!-- Emitter Label -->
  <text x="45" y="36" font-family="'Share Tech Mono', monospace" font-size="8" fill="#64748b" letter-spacing="1">INLET_A</text>

  <!-- Typography Labels -->
  <text x="200" y="356" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="12" font-weight="700" fill="#00f2fe" letter-spacing="5">FLUID DYNAMICS</text>
  <text x="200" y="371" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="9" fill="#64748b" letter-spacing="2">HYDRO LAB SIMULATOR</text>
</svg>
