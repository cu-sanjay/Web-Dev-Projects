<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glowViolet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="violetGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bgGrad)" />

  <!-- Code IDE Window Mockup -->
  <rect x="20" y="38" width="160" height="106" rx="8" fill="#090d16" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />
  
  <!-- Editor Window Title Dots -->
  <circle cx="32" cy="48" r="3" fill="#ef4444" />
  <circle cx="42" cy="48" r="3" fill="#f59e0b" />
  <circle cx="52" cy="48" r="3" fill="#10b981" />
  
  <!-- Coding Lines Mockup -->
  <g opacity="0.5" stroke-linecap="round" stroke-width="3">
    <line x1="32" y1="64" x2="100" y2="64" stroke="#6366f1" />
    <line x1="32" y1="76" x2="60" y2="76" stroke="#10b981" />
    <line x1="45" y1="88" x2="130" y2="88" stroke="#eab308" />
    <line x1="45" y1="100" x2="95" y2="100" stroke="#94a3b8" />
    <line x1="45" y1="112" x2="120" y2="112" stroke="#6366f1" />
    <line x1="32" y1="124" x2="55" y2="124" stroke="#10b981" />
  </g>
  <line x1="57" y1="124" x2="57" y2="132" stroke="#ffffff" stroke-width="1.5" opacity="0.8" /> <!-- Blinking Cursor -->

  <!-- Robot AI Mentor Mockup -->
  <g transform="translate(240, 91)" opacity="0.95">
    <!-- Outer glow circle -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="rgba(99, 102, 241, 0.03)" stroke-width="5" />
    <circle cx="0" cy="0" r="34" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="213.5" stroke-dashoffset="50" stroke-linecap="round" filter="url(#glowViolet)" transform="rotate(-90)" />

    <!-- AI Brain/Robot Node representation -->
    <rect x="-16" y="-12" width="32" height="24" rx="6" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#glowViolet)" />
    <!-- Antennas -->
    <line x1="0" y1="-12" x2="0" y2="-20" stroke="#6366f1" stroke-width="1.5" />
    <circle cx="0" cy="-21" r="2.5" fill="#10b981" filter="url(#glowGreen)" />
    
    <!-- Face / Eyes -->
    <circle cx="-6" cy="0" r="2" fill="#10b981" />
    <circle cx="6" cy="0" r="2" fill="#10b981" />
    <path d="M -5,5 Q 0,8 5,5" fill="none" stroke="#94a3b8" stroke-width="1" stroke-linecap="round" />
  </g>

  <!-- Connection line between Code and AI Robot -->
  <path d="M 180,91 C 200,91 200,91 220,91" stroke="url(#violetGreen)" stroke-dasharray="4,4" stroke-width="1.5" opacity="0.6" />
  <circle cx="180" cy="91" r="3" fill="#10b981" />
  <circle cx="206" cy="91" r="2.5" fill="#6366f1" />

  <!-- Achievements progress metrics row -->
  <g transform="translate(20, 160)">
    <rect width="280" height="24" rx="6" fill="rgba(255,255,255,0.01)" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    <text x="10" y="15" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#94a3b8">LEVEL 3</text>
    <rect x="52" y="10" width="160" height="4" rx="2" fill="rgba(255,255,255,0.05)" />
    <rect x="52" y="10" width="112" height="4" rx="2" fill="#10b981" />
    <text x="222" y="15" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#10b981">70% XP</text>
    <!-- Streak flame -->
    <circle cx="265" cy="12" r="6" fill="rgba(245, 158, 11, 0.1)" />
    <path d="M 265,9 C 267,10 268,12 267,14 C 266,15 264,15 263,14 C 262,12 263,10 265,9 Z" fill="#f59e0b" />
  </g>

  <!-- Brand Typography -->
  <text x="160" y="24" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    CODE<tspan fill="#6366f1">MENTOR</tspan>
  </text>
</svg>
