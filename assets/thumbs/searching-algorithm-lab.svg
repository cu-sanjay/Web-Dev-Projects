<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
    
    <!-- Glowing Filters -->
    <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-accent" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Slate Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  
  <!-- Grid pattern overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Mockup Header -->
  <text x="400" y="70" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" letter-spacing="3">SEARCHING ALGORITHM LAB</text>
  <text x="400" y="100" text-anchor="middle" fill="#6b7280" font-family="'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5">// DIVIDE-AND-CONQUER SPACE ELIMINATION TRAJECTORIES</text>

  <!-- Array Columns with searching states -->
  <!-- Left Side: Discarded/Faded search space -->
  <rect x="70" y="320" width="16" height="80" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="94" y="300" width="16" height="100" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="118" y="280" width="16" height="120" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="142" y="260" width="16" height="140" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="166" y="240" width="16" height="160" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="190" y="220" width="16" height="180" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="214" y="200" width="16" height="200" rx="4" fill="#1e293b" opacity="0.15" />

  <!-- Pointer Low (L) - start of active search range -->
  <rect x="238" y="190" width="16" height="210" rx="4" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-primary)" />
  <rect x="238" y="145" width="22" height="18" rx="4" fill="#3b82f6" transform="translate(-3,0)" />
  <text x="249" y="154" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" text-anchor="middle">L</text>

  <rect x="262" y="180" width="16" height="220" rx="4" fill="#22d3ee" />
  <rect x="286" y="170" width="16" height="230" rx="4" fill="#06b6d4" />
  <rect x="310" y="160" width="16" height="240" rx="4" fill="#0891b2" />
  <rect x="334" y="150" width="16" height="250" rx="4" fill="#0e7490" />
  <rect x="358" y="140" width="16" height="260" rx="4" fill="#155e75" />

  <!-- Pointer Mid (M) - target found element (Emerald highlight) -->
  <rect x="382" y="130" width="16" height="270" rx="4" fill="#10b981" stroke="#ffffff" stroke-width="2" filter="url(#glow-accent)" />
  <rect x="382" y="85" width="22" height="18" rx="4" fill="#f59e0b" transform="translate(-3,0)" />
  <text x="393" y="94" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" text-anchor="middle">M</text>
  <!-- Glow badge highlighting found target value -->
  <circle cx="390" cy="130" r="10" fill="#10b981" filter="url(#glow-accent)" opacity="0.4" />

  <rect x="406" y="120" width="16" height="280" rx="4" fill="#a855f7" />
  <rect x="430" y="110" width="16" height="290" rx="4" fill="#8b5cf6" />
  <rect x="454" y="100" width="16" height="300" rx="4" fill="#7c3aed" />
  <rect x="478" y="90" width="16" height="310" rx="4" fill="#6d28d9" />
  <rect x="502" y="80" width="16" height="320" rx="4" fill="#4c1d95" />

  <!-- Pointer High (H) - end of active search range -->
  <rect x="526" y="70" width="16" height="330" rx="4" fill="#8b5cf6" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-primary)" />
  <rect x="526" y="25" width="22" height="18" rx="4" fill="#8b5cf6" transform="translate(-3,0)" />
  <text x="537" y="34" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" text-anchor="middle">H</text>

  <!-- Right Side: Unexplored / Out of bounds search space -->
  <rect x="550" y="60" width="16" height="340" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="574" y="50" width="16" height="350" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="598" y="40" width="16" height="360" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="622" y="30" width="16" height="370" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="646" y="20" width="16" height="380" rx="4" fill="#1e293b" opacity="0.15" />
  <rect x="670" y="10" width="16" height="390" rx="4" fill="#1e293b" opacity="0.15" />

  <!-- Dashboard Metrics Mockups -->
  <rect x="30" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="45" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">SEARCH ENGINE</text>
  <text x="45" y="458" fill="#3b82f6" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">BINARY SEARCH</text>

  <rect x="200" y="420" width="130" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="215" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">COMPARISONS</text>
  <text x="215" y="458" fill="#06b6d4" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">3 CHECKS</text>

  <rect x="350" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="365" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">SPACE DISCARDED</text>
  <text x="365" y="458" fill="#f43f5e" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">85% REDUCTION</text>

  <rect x="620" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="635" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">WORST CASE TIME</text>
  <text x="635" y="458" fill="#10b981" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">O(LOG N)</text>
</svg>
