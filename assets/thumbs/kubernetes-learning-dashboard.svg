<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="1" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="k8s-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="url(#bg-glow)" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  
  <!-- Subtle Grid Lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Connection Nodes / Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(56, 189, 248, 0.1)" stroke-width="2" stroke-dasharray="8 6" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(99, 102, 241, 0.08)" stroke-width="1" />

  <!-- Outer orbiting Pod-like shapes -->
  <circle cx="256" cy="66" r="10" fill="#10b981" filter="url(#glow)" />
  <circle cx="446" cy="256" r="10" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="256" cy="446" r="10" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="66" cy="256" r="10" fill="#f59e0b" filter="url(#glow)" />

  <!-- Central Kubernetes Logo structure -->
  <g transform="translate(0, 0)">
    <!-- Heptagon (Outer Wheel) -->
    <polygon points="256,100 376,150 422,274 346,380 166,380 90,274 136,150" 
             fill="none" stroke="url(#k8s-gradient)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Heptagon (Inner Details) -->
    <polygon points="256,130 351,170 388,270 327,350 185,350 124,270 161,170" 
             fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linejoin="round"/>

    <!-- Center Hub -->
    <circle cx="256" cy="256" r="44" fill="#0b0f19" stroke="url(#k8s-gradient)" stroke-width="8" />

    <!-- Spokes connecting hub to outer vertices -->
    <g stroke="url(#k8s-gradient)" stroke-width="8" stroke-linecap="round">
      <line x1="256" y1="212" x2="256" y2="108" />
      <line x1="288" y1="284" x2="376" y2="150" />
      <line x1="294" y1="268" x2="422" y2="274" />
      <line x1="274" y1="294" x2="346" y2="380" />
      <line x1="238" y1="294" x2="166" y2="380" />
      <line x1="218" y1="268" x2="90" y2="274" />
      <line x1="224" y1="284" x2="136" y2="150" />
    </g>

    <!-- Inner central graphic (white letter/shape representation) -->
    <path d="M246,240 L266,240 L272,256 L266,272 L246,272 L240,256 Z" fill="#ffffff" />
  </g>
</svg>
