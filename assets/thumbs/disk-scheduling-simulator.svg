<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c18" />
      <stop offset="100%" stop-color="#0f1626" />
    </linearGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Platter Graphic (Left) -->
  <g transform="translate(70, 75)">
    <!-- Platter Base concentric rings -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="8" />
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(6, 182, 212, 0.08)" stroke-width="3" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(6, 182, 212, 0.12)" stroke-width="2.5" />
    <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(6, 182, 212, 0.15)" stroke-width="1.5" />
    <circle cx="0" cy="0" r="6" fill="#111827" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    
    <!-- Mechanical sweep arm -->
    <line x1="-58" y1="-38" x2="-22" y2="-12" stroke="#64748b" stroke-width="4" stroke-linecap="round" />
    <circle cx="-58" cy="-38" r="5" fill="#475569" />
    <!-- Fine arm trace tip -->
    <line x1="-22" y1="-12" x2="-4" y2="17" stroke="url(#cyan-grad)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)" />
    <!-- Active track dot -->
    <circle cx="-4" cy="17" r="2.5" fill="#ffffff" />
  </g>

  <!-- Head Movement Seek Curve (Right) -->
  <g transform="translate(155, 30)">
    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    <line x1="0" y1="90" x2="145" y2="90" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
    <text x="145" y="96" font-family="'Inter', sans-serif" font-size="6" fill="#64748b" text-anchor="end">CYLINDER</text>
    <text x="-6" y="5" font-family="'Inter', sans-serif" font-size="6" fill="#64748b" transform="rotate(-90)" text-anchor="end">TIME</text>

    <!-- Zigzag trace points (FCFS / SSTF visual) -->
    <path d="M 34,10 L 63,28 L 24,46 L 79,64 L 9,82" fill="none" stroke="url(#purple-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Nodes at points -->
    <circle cx="34" cy="10" r="3" fill="#8b5cf6" />
    <circle cx="63" cy="28" r="3" fill="#a78bfa" />
    <circle cx="24" cy="46" r="3" fill="#c084fc" />
    <circle cx="79" cy="64" r="3" fill="#e879f9" />
    <circle cx="9" cy="82" r="3" fill="#f472b6" />
  </g>

  <!-- Total seek info -->
  <g transform="translate(15, 130)">
    <text font-family="'Inter', sans-serif" font-size="7" font-weight="600" fill="#94a3b8">ALGORITHM METRIC</text>
    <text y="12" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#06b6d4">236 <tspan font-size="7.5" font-weight="500" fill="#64748b">TOTAL SEEK</tspan></text>
  </g>

  <!-- Title & Branding -->
  <g transform="translate(160, 168)">
    <text font-family="'Inter', sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#ffffff">
      DISK <tspan fill="#8b5cf6">SCHEDULER</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="1">
      SEEK CHART &amp; Platter visualizer
    </text>
  </g>
</svg>
