<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="16" fill="#070a13"/>
  <rect x="8" y="8" width="112" height="112" rx="10" fill="none" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Eye icon -->
  <g transform="translate(44, 18)">
    <path d="M20 6c-6 0-11 3.5-15 10.5 4 7 9 10.5 15 10.5s11-3.5 15-10.5c-4-7-9-10.5-15-10.5z" fill="none" stroke="#f8fafc" stroke-width="1.8"/>
    <circle cx="20" cy="16.5" r="4" fill="none" stroke="#f8fafc" stroke-width="1.8"/>
  </g>

  <!-- Color spectrum bar (top) - how it looks normally -->
  <defs>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="20%" stop-color="#ffff00"/>
      <stop offset="40%" stop-color="#00ff00"/>
      <stop offset="60%" stop-color="#00ffff"/>
      <stop offset="80%" stop-color="#0000ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="spec-gray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="25%" stop-color="#aaa"/>
      <stop offset="50%" stop-color="#777"/>
      <stop offset="75%" stop-color="#999"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>

  <rect x="16" y="42" width="96" height="10" rx="3" fill="url(#spec)"/>

  <!-- Simulated version (bottom) - desaturated/confused -->
  <rect x="16" y="56" width="96" height="10" rx="3" fill="url(#spec-gray)" opacity="0.7"/>

  <!-- Arrow between them -->
  <line x1="64" y1="52" x2="64" y2="56" stroke="#10b981" stroke-width="1.5"/>
  <polyline points="60,56 64,60 68,56" fill="none" stroke="#10b981" stroke-width="1.5"/>

  <!-- Color confusion dots -->
  <circle cx="30" cy="80" r="6" fill="#ff4444" opacity="0.5"/>
  <circle cx="40" cy="80" r="6" fill="#ff8800" opacity="0.5"/>
  <circle cx="50" cy="80" r="6" fill="#44ff44" opacity="0.5"/>
  <circle cx="60" cy="80" r="6" fill="#00ff88" opacity="0.5"/>
  <circle cx="70" cy="80" r="6" fill="#4488ff" opacity="0.5"/>
  <circle cx="80" cy="80" r="6" fill="#8844ff" opacity="0.5"/>
  <circle cx="90" cy="80" r="6" fill="#ff44aa" opacity="0.5"/>

  <!-- Filter matrix icon -->
  <rect x="16" y="96" width="96" height="18" rx="4" fill="none" stroke="#1f2937" stroke-width="1"/>
  <text x="64" y="108" fill="#3b82f6" font-size="7" font-family="monospace" text-anchor="middle">feColorMatrix</text>

  <!-- Bottom label -->
  <text x="64" y="124" fill="#94a3b8" font-size="6" font-family="monospace" text-anchor="middle" letter-spacing="0.5">ACCESSIBILITY ENG</text>
</svg>
