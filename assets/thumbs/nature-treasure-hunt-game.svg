<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07130d"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <rect width="400" height="250" fill="url(#glow)"/>

  <!-- Map outline -->
  <path d="M60 60 Q120 40 180 50 Q240 30 300 45 Q350 55 340 90 Q360 120 340 150 Q330 190 300 200 Q260 220 220 210 Q180 230 140 220 Q100 210 80 180 Q60 160 50 130 Q40 100 60 60Z" fill="none" stroke="#1a3020" stroke-width="1.5"/>
  <circle cx="120" cy="120" r="18" fill="none" stroke="#059669" stroke-width="0.8" opacity="0.4"/>
  <circle cx="200" cy="100" r="14" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="280" cy="150" r="16" fill="none" stroke="#0284c7" stroke-width="0.8" opacity="0.4"/>
  <circle cx="160" cy="160" r="12" fill="none" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>

  <!-- Dotted path -->
  <path d="M120 120 Q160 110 200 100 Q240 120 280 150" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Mountain -->
  <path d="M170 130 L190 90 L210 130Z" fill="#475569" opacity="0.3"/>
  <path d="M180 130 L195 100 L210 130Z" fill="#64748b" opacity="0.2"/>

  <!-- Tree -->
  <g transform="translate(140,150)">
    <rect x="-2" y="0" width="4" height="8" fill="#244532"/>
    <ellipse cx="0" cy="-6" rx="10" ry="8" fill="#059669" opacity="0.4"/>
    <ellipse cx="0" cy="-8" rx="7" ry="6" fill="#16a34a" opacity="0.3"/>
  </g>

  <!-- Treasure chest -->
  <g transform="translate(265,165)">
    <rect x="-10" y="-6" width="20" height="14" rx="2" fill="#92400e" stroke="#f59e0b" stroke-width="0.8"/>
    <rect x="-10" y="-8" width="20" height="4" rx="2" fill="#b45309" stroke="#f59e0b" stroke-width="0.8"/>
    <circle cx="0" cy="-1" r="2" fill="#facc15"/>
    <!-- Glow -->
    <circle cx="0" cy="-4" r="18" fill="#facc15" opacity="0.08"/>
  </g>

  <!-- Compass -->
  <g transform="translate(60,195)">
    <circle r="16" fill="none" stroke="#475569" stroke-width="0.8" opacity="0.5"/>
    <polygon points="0,-10 2,0 0,10 -2,0" fill="#34d399" opacity="0.6"/>
    <polygon points="0,-10 -2,0 0,4 2,0" fill="#facc15" opacity="0.5"/>
  </g>

  <!-- Stars -->
  <circle cx="320" cy="40" r="1.5" fill="#facc15" opacity="0.5"/>
  <circle cx="350" cy="60" r="1" fill="#facc15" opacity="0.3"/>
  <circle cx="60" cy="45" r="1" fill="#facc15" opacity="0.4"/>
  <circle cx="90" cy="35" r="1.2" fill="#facc15" opacity="0.3"/>

  <!-- Title -->
  <rect x="80" y="210" width="240" height="28" rx="14" fill="rgba(16,32,23,0.85)" stroke="#244532" stroke-width="0.5"/>
  <text x="200" y="229" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Nature Treasure Hunt</text>
</svg>