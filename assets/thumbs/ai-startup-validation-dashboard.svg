<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060c"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowViolet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="greenViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bgGrad)" />

  <!-- Background Grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
  </g>

  <!-- Left: Glowing Viability SVG Circular Gauge Mockup -->
  <g transform="translate(75, 100)" opacity="0.95">
    <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="6" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#10b981" stroke-width="6" stroke-dasharray="201" stroke-dashoffset="45" stroke-linecap="round" filter="url(#glowGreen)" transform="rotate(-90)" />
    
    <!-- Inner rocket icon representation -->
    <path d="M 0,-15 L 7,-3 L 7,8 C 7,11 0,14 0,14 C 0,14 -7,11 -7,8 L -7,-3 Z" fill="url(#greenViolet)" opacity="0.8" />
    <path d="M -7,8 L -12,12 L -7,12 Z M 7,8 L 12,12 L 7,12 Z" fill="#6366f1" />
  </g>

  <!-- Right: 12-Month Financial Bar Chart & SWOT Cards Visuals -->
  <g transform="translate(155, 48)">
    <rect width="140" height="106" rx="8" fill="#090d16" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />
    
    <!-- SWOT Mock Blocks -->
    <rect x="10" y="10" width="56" height="24" rx="4" fill="rgba(16, 185, 129, 0.06)" stroke="rgba(16, 185, 129, 0.15)" stroke-width="0.8" />
    <rect x="18" y="16" width="30" height="3" rx="1.5" fill="#10b981" />
    <rect x="18" y="24" width="20" height="2" rx="1" fill="#94a3b8" opacity="0.5" />

    <rect x="74" y="10" width="56" height="24" rx="4" fill="rgba(239, 68, 68, 0.06)" stroke="rgba(239, 68, 68, 0.15)" stroke-width="0.8" />
    <rect x="82" y="16" width="24" height="3" rx="1.5" fill="#ef4444" />
    <rect x="82" y="24" width="35" height="2" rx="1" fill="#94a3b8" opacity="0.5" />

    <!-- 12mo Revenue Projection Curve chart -->
    <g transform="translate(10, 48)">
      <rect width="120" height="46" rx="4" fill="rgba(0,0,0,0.2)" stroke="rgba(255, 255, 255, 0.02)" stroke-width="0.8" />
      <g transform="translate(6, 23)" opacity="0.75" stroke-linecap="round">
        <!-- Bars projections -->
        <line x1="6" y1="12" x2="6" y2="18" stroke="#ef4444" stroke-width="4" />
        <line x1="15" y1="8" x2="15" y2="18" stroke="#ef4444" stroke-width="4" />
        <line x1="24" y1="4" x2="24" y2="18" stroke="#ef4444" stroke-width="4" />
        <line x1="33" y1="0" x2="33" y2="18" stroke="#ef4444" stroke-width="4" />
        <!-- Profit bars -->
        <line x1="42" y1="-4" x2="42" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="51" y1="-6" x2="51" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="60" y1="-8" x2="60" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="69" y1="-12" x2="69" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="78" y1="-14" x2="78" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="87" y1="-18" x2="87" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="96" y1="-21" x2="96" y2="-18" stroke="#10b981" stroke-width="4" />
        <line x1="105" y1="-24" x2="105" y2="-18" stroke="#10b981" stroke-width="4" filter="url(#glowGreen)" />
      </g>
    </g>
  </g>

  <!-- Brand Typography -->
  <text x="160" y="24" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    FOUNDRY<tspan fill="#10b981">AI</tspan>
  </text>
</svg>
