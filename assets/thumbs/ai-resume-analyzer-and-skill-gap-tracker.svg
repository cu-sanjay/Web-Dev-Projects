<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Background decorative glows -->
  <circle cx="280" cy="40" r="60" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />
  <circle cx="40" cy="160" r="50" fill="#d946ef" opacity="0.1" filter="url(#glow)" />

  <!-- Document/Resume Scanning Visual -->
  <g transform="translate(45, 40)">
    <!-- Document Backdrop -->
    <rect x="0" y="0" width="90" height="120" rx="8" fill="#1f2937" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Folded Corner -->
    <path d="M74,0 L90,16 L74,16 Z" fill="#374151" />
    <path d="M74,0 L74,16 L90,16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <!-- Document Lines -->
    <line x1="15" y1="20" x2="60" y2="20" stroke="#f3f4f6" stroke-width="4" stroke-linecap="round" />
    <line x1="15" y1="35" x2="75" y2="35" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <line x1="15" y1="48" x2="70" y2="48" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    
    <!-- Progress Indicator Bar Inside Document -->
    <rect x="15" y="65" width="60" height="8" rx="4" fill="#111827" />
    <rect x="15" y="65" width="42" height="8" rx="4" fill="url(#violet-grad)" />

    <!-- Document Checkmarks -->
    <circle cx="20" cy="90" r="6" fill="#10b981" />
    <path d="M17,90 L19,92 L23,88" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

    <circle cx="45" cy="90" r="6" fill="#10b981" />
    <path d="M42,90 L44,92 L48,88" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />

    <circle cx="70" cy="90" r="6" fill="#f59e0b" />
    <line x1="67" y1="90" x2="73" y2="90" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />

    <!-- Scan Beam Overlay -->
    <line x1="-5" y1="58" x2="95" y2="58" stroke="#d946ef" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" />
  </g>

  <!-- Analysis Dashboard Visual (Radar / Radial Dial) -->
  <g transform="translate(210, 85)">
    <!-- Main Radial Gauge -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6" />
    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#violet-grad)" stroke-width="6" stroke-dasharray="238" stroke-dashoffset="55" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Inner Circle -->
    <circle cx="0" cy="0" r="28" fill="#111827" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    
    <!-- Score Text -->
    <text x="0" y="5" font-family="'Outfit', 'Inter', sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">82</text>
    <text x="0" y="18" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="1">MATCH</text>
  </g>

  <!-- Connecting Analytics Line -->
  <path d="M135,105 L155,105 L165,85 L175,85" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />

  <!-- Text Branding -->
  <g transform="translate(160, 175)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="800" text-anchor="middle" fill="#ffffff">
      Resu<tspan fill="#8b5cf6">Align</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" text-anchor="middle" fill="#9ca3af" letter-spacing="0.5">
      AI Resume &amp; Skill Gap Tracker
    </text>
  </g>
</svg>
