<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cl"><rect width="800" height="500"/></clipPath>
    <linearGradient id="sbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#cl)">
    <!-- Right: screenshot -->
    <image href="data:image/jpeg;base64," x="258" y="0" width="542" height="500" preserveAspectRatio="xMidYMid slice"/>
    <rect x="258" y="0" width="542" height="500" fill="#2dd4bf" opacity="0.18"/>
    <rect x="258" y="0" width="542" height="500" fill="rgba(0,0,0,0.35)"/>
    <!-- Left: dark sidebar -->
    <rect x="0" y="0" width="258" height="500" fill="rgba(9,11,18,0.97)"/>
    <rect x="0" y="0" width="3" height="500" fill="url(#sbar)"/>
    <line x1="258" y1="0" x2="258" y2="500" stroke="#2dd4bf" stroke-width="1.5" opacity="0.55"/>
    <!-- Author circle -->
    <circle cx="50" cy="66" r="26" fill="#2dd4bf" opacity="0.1"/>
    <circle cx="50" cy="66" r="20" fill="#2dd4bf" opacity="0.18"/>
    <text x="50" y="73" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="800" font-family="system-ui,sans-serif">JB</text>
    <!-- Author label + name -->
    <text x="86" y="55" fill="rgba(255,255,255,0.38)" font-size="8" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.8">DEVELOPER</text>
    <text x="86" y="74" fill="rgba(255,255,255,0.88)" font-size="13.5" font-weight="600" font-family="system-ui,sans-serif">Jhnavi Bhadkariya</text>
    <!-- Divider -->
    <rect x="26" y="106" width="210" height="1" fill="rgba(255,255,255,0.07)"/>
    <!-- Project label -->
    <text x="26" y="145" fill="#2dd4bf" font-size="8.5" font-weight="800" font-family="system-ui,sans-serif" letter-spacing="2.2">PROJECT</text>
    <!-- Title -->
    <text x="26" y="195" fill="#fff" font-size="34" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-0.5">Weather Finder</text>
    <!-- Divider -->
    <rect x="26" y="326" width="210" height="1" fill="rgba(255,255,255,0.07)"/>
    <!-- Stack label -->
    <text x="26" y="348" fill="rgba(255,255,255,0.35)" font-size="8.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1.8">STACK</text>
    <!-- Tag pills -->
    <rect x="26" y="350" width="39" height="21" rx="10.5" fill="#2dd4bf" opacity="0.25"/><text x="45" y="364" text-anchor="middle" fill="#2dd4bf" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">API</text><rect x="72" y="350" width="84" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="114" y="364" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">JAVASCRIPT</text><rect x="163" y="350" width="64" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="195" y="364" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">WEATHER</text>
    <!-- Watermark -->
    <text x="26" y="488" fill="rgba(255,255,255,0.15)" font-size="8.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">✦ OPENSTUDIO</text>
  </g>
</svg>