<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04111f"/>
      <stop offset="50%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#04111f"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="600" cy="300" r="260" fill="url(#glowGrad)"/>

  <g stroke="#1e293b" stroke-width="0.3" opacity="0.2">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/><line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Current paths on thumbnail -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gulf Stream warm -->
    <path d="M 120 380 Q 180 370 240 355 Q 300 340 360 320 Q 420 300 470 285 Q 520 270 560 258" stroke="#f97316" stroke-width="3" opacity="0.5"/>
    <!-- North Atlantic Drift -->
    <path d="M 560 258 Q 600 248 640 240 Q 680 232 710 228" stroke="#f97316" stroke-width="2.5" opacity="0.4"/>
    <!-- Canary Current cool -->
    <path d="M 420 340 Q 410 370 405 400 Q 400 430 395 455" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
    <!-- Labrador Current cold -->
    <path d="M 320 200 Q 310 235 305 270 Q 300 300 295 330" stroke="#2563eb" stroke-width="2.5" opacity="0.45"/>
    <!-- Kuroshio warm -->
    <path d="M 750 340 Q 760 315 765 295 Q 770 275 775 255 Q 780 240 785 225" stroke="#f97316" stroke-width="3" opacity="0.5"/>
    <!-- California Current cool -->
    <path d="M 130 230 Q 125 265 120 300 Q 115 335 112 365" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
    <!-- Peru Current cool -->
    <path d="M 195 420 Q 190 395 185 370 Q 180 345 175 320" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
    <!-- Agulhas warm -->
    <path d="M 640 435 Q 655 420 670 400 Q 685 380 690 360" stroke="#f97316" stroke-width="2.5" opacity="0.5"/>
    <!-- Antarctic Circumpolar cold -->
    <path d="M 60 510 Q 160 505 280 500 Q 400 495 520 500 Q 640 505 750 510 Q 840 515 900 518" stroke="#2563eb" stroke-width="3.5" opacity="0.45"/>
    <!-- ACC arrow markers -->
  </g>

  <!-- Arrow heads on currents -->
  <g fill="#f97316" opacity="0.5">
    <polygon points="470,285 460,278 462,292"/>
    <polygon points="710,228 700,222 702,236"/>
    <polygon points="785,225 775,219 777,233"/>
    <polygon points="690,360 680,354 682,368"/>
  </g>
  <g fill="#38bdf8" opacity="0.4">
    <polygon points="395,455 390,444 386,458"/>
    <polygon points="112,365 107,354 103,368"/>
    <polygon points="175,320 170,309 166,323"/>
  </g>
  <g fill="#2563eb" opacity="0.45">
    <polygon points="295,330 290,319 286,333"/>
    <polygon points="60,510 70,504 72,518"/>
  </g>

  <!-- Continents -->
  <g fill="#0f172a" stroke="#1e3a5f" stroke-width="0.6">
    <path d="M 130 200 L 170 195 L 210 198 L 245 205 L 258 220 L 262 240 L 258 258 L 250 268 L 240 280 L 230 288 L 218 292 L 205 290 L 195 296 L 182 290 L 170 280 L 160 270 L 148 260 L 135 248 L 125 235 L 118 218 Z"/>
    <path d="M 230 298 L 245 295 L 258 302 L 265 318 L 268 338 L 265 358 L 258 375 L 245 390 L 230 398 L 218 395 L 210 382 L 202 365 L 196 345 L 192 325 L 195 308 Z"/>
    <path d="M 360 150 L 375 145 L 390 142 L 405 145 L 418 150 L 430 158 L 435 168 L 438 180 L 435 192 L 428 200 L 418 205 L 408 208 L 398 206 L 388 200 L 380 192 L 374 182 L 368 170 L 365 160 Z"/>
    <path d="M 375 215 L 388 210 L 400 208 L 415 210 L 428 218 L 438 230 L 442 248 L 444 268 L 440 290 L 432 308 L 420 325 L 405 338 L 390 345 L 378 342 L 368 330 L 362 315 L 358 295 L 355 272 L 355 248 L 358 230 Z"/>
    <path d="M 430 148 L 452 142 L 478 140 L 505 142 L 532 148 L 555 155 L 575 165 L 590 178 L 600 195 L 602 212 L 598 228 L 588 238 L 575 245 L 558 248 L 538 245 L 518 240 L 498 235 L 478 230 L 462 222 L 450 210 L 442 195 L 438 175 Z"/>
    <path d="M 665 290 L 690 285 L 715 288 L 735 298 L 748 315 L 752 335 L 745 352 L 730 365 L 710 370 L 690 368 L 672 358 L 662 345 L 658 328 Z"/>
    <path d="M 60 510 L 120 505 L 200 502 L 300 500 L 400 498 L 500 500 L 600 502 L 680 505 L 740 510 L 750 520 L 740 530 L 680 538 L 600 542 L 500 545 L 400 545 L 300 542 L 200 538 L 120 530 L 60 520 Z"/>
  </g>

  <!-- Temperature gauge icon -->
  <g transform="translate(55, 60)">
    <rect x="0" y="0" width="20" height="40" rx="4" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.4"/>
    <rect x="3" y="25" width="14" height="12" rx="2" fill="#f97316" opacity="0.5"/>
    <rect x="3" y="12" width="14" height="10" rx="2" fill="#ef4444" opacity="0.3"/>
    <circle cx="10" cy="43" r="3" fill="#7dd3fc" opacity="0.3"/>
  </g>

  <!-- Wave icon -->
  <g transform="translate(1125, 55)">
    <path d="M0 10 Q 8 0 16 10 Q 24 20 32 10 Q 40 0 48 10" stroke="#7dd3fc" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M4 16 Q 12 8 20 16 Q 28 24 36 16 Q 44 8 48 16" stroke="#7dd3fc" stroke-width="0.8" fill="none" opacity="0.25"/>
  </g>

  <!-- Title -->
  <g transform="translate(600, 510)">
    <rect x="-250" y="-52" width="500" height="104" rx="12" fill="#0f172a" opacity="0.88"/>
    <rect x="-230" y="-40" width="460" height="2" fill="url(#titleGrad)" opacity="0.3"/>
    <text x="0" y="-14" fill="#f8fafc" font-size="21" font-weight="800" text-anchor="middle" font-family="system-ui" letter-spacing="1">OCEAN CURRENTS SIMULATOR</text>
    <text x="0" y="10" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="3">GLOBAL MARINE CIRCULATION EXPLORER</text>

    <circle cx="-105" cy="30" r="3" fill="#f97316" opacity="0.7"/>
    <circle cx="-75" cy="30" r="3" fill="#ef4444" opacity="0.7"/>
    <circle cx="-45" cy="30" r="3" fill="#38bdf8" opacity="0.7"/>
    <circle cx="-15" cy="30" r="3" fill="#2563eb" opacity="0.7"/>
    <circle cx="15" cy="30" r="3" fill="#f97316" opacity="0.7"/>
    <circle cx="45" cy="30" r="3" fill="#38bdf8" opacity="0.7"/>
    <circle cx="75" cy="30" r="3" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="105" cy="30" r="3" fill="#7dd3fc" opacity="0.7"/>
  </g>

  <!-- Stats -->
  <g transform="translate(160, 480)">
    <rect x="-65" y="-16" width="130" height="32" rx="6" fill="#0f172a" opacity="0.75" stroke="#334155" stroke-width="0.5"/>
    <text x="0" y="-2" fill="#7dd3fc" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui">13</text>
    <text x="0" y="10" fill="#64748b" font-size="6" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="1">CURRENTS</text>
  </g>
  <g transform="translate(1040, 480)">
    <rect x="-65" y="-16" width="130" height="32" rx="6" fill="#0f172a" opacity="0.75" stroke="#334155" stroke-width="0.5"/>
    <text x="0" y="-2" fill="#f97316" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui">4</text>
    <text x="0" y="10" fill="#64748b" font-size="6" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="1">BASINS</text>
  </g>

  <rect x="0" y="620" width="1200" height="10" fill="#0f172a" opacity="0.5"/>
</svg>