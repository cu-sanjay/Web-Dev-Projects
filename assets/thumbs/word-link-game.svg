<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cl"><rect width="800" height="500"/></clipPath>
  </defs>
  <g clip-path="url(#cl)">
    <!-- Screenshot background -->
    <image href="data:image/jpeg;base64," x="0" y="0" width="800" height="500" preserveAspectRatio="xMidYMid slice"/>
    <!-- Dark overlay -->
    <rect width="800" height="500" fill="rgba(6,8,18,0.60)"/>
    <!-- Frosted card -->
    <rect x="98" y="88" width="604" height="324" rx="14" fill="rgba(12,15,28,0.90)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <!-- Card top accent line -->
    <rect x="98" y="88" width="604" height="3" rx="1.5" fill="#fbbf24" opacity="0.85"/>
    <!-- Title bar stripe -->
    <rect x="98" y="91" width="604" height="40" rx="14" fill="rgba(255,255,255,0.04)"/>
    <rect x="98" y="117" width="604" height="14" fill="rgba(255,255,255,0.04)"/>
    <!-- Traffic lights -->
    <circle cx="130" cy="112" r="6.5" fill="#FF5F56"/>
    <circle cx="153" cy="112" r="6.5" fill="#FFBD2E"/>
    <circle cx="176" cy="112" r="6.5" fill="#27C93F"/>
    <!-- Tab filename -->
    <text x="204" y="117" fill="rgba(255,255,255,0.32)" font-size="11" font-family="monospace">word-link-game.html</text>
    <!-- Card separator -->
    <rect x="98" y="131" width="604" height="1" fill="rgba(255,255,255,0.07)"/>
    <!-- <title> monospace tag -->
    <text x="150" y="178" fill="#fbbf24" font-size="12" font-family="monospace" font-weight="700">&lt;title&gt;</text>
    <!-- Project title -->
    <text x="150" y="222" fill="#fff" font-size="44" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-1">Word Link Game</text>
    <!-- Author -->
    <text x="150" y="282" fill="rgba(255,255,255,0.45)" font-size="13" font-family="system-ui,sans-serif">by <tspan fill="rgba(255,255,255,0.85)" font-weight="600">Priya Kalamkar</tspan></text>
    <!-- Tag pills -->
    <rect x="150" y="308" width="77" height="21" rx="10.5" fill="#fbbf24" opacity="0.25"/><text x="188" y="322" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">WORD-GAME</text><rect x="234" y="308" width="77" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="273" y="322" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">LINK-GAME</text><rect x="319" y="308" width="122" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="380" y="322" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">INTERACTIVE-GAME</text>
    <!-- Initials badge (bottom-right of card) -->
    <circle cx="664" cy="376" r="20" fill="#fbbf24" opacity="0.12"/>
    <circle cx="664" cy="376" r="15" fill="#fbbf24" opacity="0.22"/>
    <text x="664" y="382" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="800" font-family="system-ui,sans-serif">PK</text>
    <!-- Watermark -->
    <text x="700" y="490" text-anchor="end" fill="rgba(255,255,255,0.15)" font-size="9" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="1">✦ OPENSTUDIO</text>
  </g>
</svg>