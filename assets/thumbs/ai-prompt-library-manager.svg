<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070e" />
      <stop offset="100%" stop-color="#0f1322" />
    </linearGradient>
    
    <!-- Accent Indigo Gradient -->
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Accent Fuchsia Gradient -->
    <linearGradient id="fuchsia-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

  <!-- Ambient Glows -->
  <circle cx="280" cy="50" r="50" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="150" r="60" fill="#c084fc" opacity="0.08" filter="url(#glow)" />

  <!-- Main Prompt Template Box -->
  <g transform="translate(35, 35)">
    <rect width="145" height="105" rx="8" fill="#0b0f19" stroke="rgba(255,255,255,0.06)" stroke-width="1.2" />
    
    <!-- Card header line -->
    <line x1="10" y1="12" x2="65" y2="12" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />
    <line x1="75" y1="12" x2="135" y2="12" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round" />

    <!-- Prompt lines with bracket highlights -->
    <g transform="translate(10, 28)">
      <!-- Line 1: 'Act as a [Role]...' -->
      <line x1="0" y1="5" x2="35" y2="5" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />
      <rect x="40" y="-1" width="30" height="10" rx="3" fill="rgba(192, 132, 252, 0.15)" stroke="var(--clr-secondary)" stroke-width="0.8" />
      <text x="55" y="7" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#c084fc" text-anchor="middle">ROLE</text>
      <line x1="75" y1="5" x2="120" y2="5" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />
      
      <!-- Line 2: 'Write a blog outline about [Topic]...' -->
      <line x1="0" y1="20" x2="60" y2="20" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />
      <rect x="65" y="14" width="34" height="10" rx="3" fill="rgba(99, 102, 241, 0.15)" stroke="var(--clr-accent)" stroke-width="0.8" />
      <text x="82" y="22" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#6366f1" text-anchor="middle">TOPIC</text>
      <line x1="104" y1="20" x2="125" y2="20" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />

      <!-- Line 3: 'Tone: [Style]...' -->
      <line x1="0" y1="35" x2="20" y2="35" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />
      <rect x="25" y="29" width="30" height="10" rx="3" fill="rgba(192, 132, 252, 0.15)" stroke="var(--clr-secondary)" stroke-width="0.8" />
      <text x="40" y="37" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#c084fc" text-anchor="middle">TONE</text>
      <line x1="60" y1="35" x2="115" y2="35" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />

      <!-- Line 4: Footer specs -->
      <line x1="0" y1="50" x2="80" y2="50" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
    </g>

    <!-- Visual Floating Connections -->
    <path d="M 80 56 L 95 56 M 50 71 L 65 71" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5" />
  </g>

  <!-- Interactive Sandbox Input Boxes (Right) -->
  <g transform="translate(205, 45)">
    <!-- Input Field 1 -->
    <rect width="85" height="18" rx="4" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="6" y="11" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#94a3b8">ROLE:</text>
    <text x="32" y="11" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#ffffff">Developer</text>
    <path d="M-6,9 L-1,9" stroke="#c084fc" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5" />

    <!-- Input Field 2 -->
    <g transform="translate(0, 24)">
      <rect width="85" height="18" rx="4" fill="#1e293b" stroke="#6366f1" stroke-width="1" filter="url(#glow)" />
      <text x="6" y="11" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#6366f1">TOPIC:</text>
      <text x="35" y="11" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#ffffff">React Hooks</text>
      <!-- Cursor blink -->
      <line x1="77" y1="4" x2="77" y2="14" stroke="#6366f1" stroke-width="1" />
    </g>

    <!-- Input Field 3 -->
    <g transform="translate(0, 48)">
      <rect width="85" height="18" rx="4" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <text x="6" y="11" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#94a3b8">TONE:</text>
      <text x="32" y="11" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#ffffff">Professional</text>
    </g>

    <!-- Quick Copy Badge -->
    <g transform="translate(0, 72)">
      <rect width="85" height="16" rx="4" fill="url(#indigo-grad)" />
      <text x="42.5" y="10.5" font-family="'Outfit', 'Inter', sans-serif" font-size="7" font-weight="800" fill="#ffffff" text-anchor="middle">COPY COMPILED</text>
    </g>
  </g>

  <!-- Title Branding text -->
  <g transform="translate(160, 175)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="14.5" font-weight="800" text-anchor="middle" fill="#ffffff">
      Prompt<tspan fill="#6366f1">Forge</tspan>
    </text>
    <text y="11" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="0.5">
      AI Prompt Library &amp; Sandbox Compiler
    </text>
  </g>
</svg>
