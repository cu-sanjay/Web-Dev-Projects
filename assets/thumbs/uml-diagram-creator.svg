<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111625" stop-opacity="1" />
      <stop offset="100%" stop-color="#070a13" stop-opacity="1" />
    </radialGradient>
    
    <!-- Class Box Gradients -->
    <linearGradient id="parent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="child-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Filter for subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="512" height="512" rx="32" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4"/>

  <!-- Dotted Canvas Grid -->
  <g fill="rgba(255, 255, 255, 0.04)">
    <circle cx="40" cy="40" r="1.5" /><circle cx="80" cy="40" r="1.5" /><circle cx="120" cy="40" r="1.5" /><circle cx="160" cy="40" r="1.5" /><circle cx="200" cy="40" r="1.5" /><circle cx="240" cy="40" r="1.5" /><circle cx="280" cy="40" r="1.5" /><circle cx="320" cy="40" r="1.5" /><circle cx="360" cy="40" r="1.5" /><circle cx="400" cy="40" r="1.5" /><circle cx="440" cy="40" r="1.5" /><circle cx="480" cy="40" r="1.5" />
    <circle cx="40" cy="80" r="1.5" /><circle cx="80" cy="80" r="1.5" /><circle cx="120" cy="80" r="1.5" /><circle cx="160" cy="80" r="1.5" /><circle cx="200" cy="80" r="1.5" /><circle cx="240" cy="80" r="1.5" /><circle cx="280" cy="80" r="1.5" /><circle cx="320" cy="80" r="1.5" /><circle cx="360" cy="80" r="1.5" /><circle cx="400" cy="80" r="1.5" /><circle cx="440" cy="80" r="1.5" /><circle cx="480" cy="80" r="1.5" />
    <circle cx="40" cy="120" r="1.5" /><circle cx="80" cy="120" r="1.5" /><circle cx="120" cy="120" r="1.5" /><circle cx="160" cy="120" r="1.5" /><circle cx="200" cy="120" r="1.5" /><circle cx="240" cy="120" r="1.5" /><circle cx="280" cy="120" r="1.5" /><circle cx="320" cy="120" r="1.5" /><circle cx="360" cy="120" r="1.5" /><circle cx="400" cy="120" r="1.5" /><circle cx="440" cy="120" r="1.5" /><circle cx="480" cy="120" r="1.5" />
    <circle cx="40" cy="160" r="1.5" /><circle cx="80" cy="160" r="1.5" /><circle cx="120" cy="160" r="1.5" /><circle cx="160" cy="160" r="1.5" /><circle cx="200" cy="160" r="1.5" /><circle cx="240" cy="160" r="1.5" /><circle cx="280" cy="160" r="1.5" /><circle cx="320" cy="160" r="1.5" /><circle cx="360" cy="160" r="1.5" /><circle cx="400" cy="160" r="1.5" /><circle cx="440" cy="160" r="1.5" /><circle cx="480" cy="160" r="1.5" />
    <circle cx="40" cy="200" r="1.5" /><circle cx="80" cy="200" r="1.5" /><circle cx="120" cy="200" r="1.5" /><circle cx="160" cy="200" r="1.5" /><circle cx="200" cy="200" r="1.5" /><circle cx="240" cy="200" r="1.5" /><circle cx="280" cy="200" r="1.5" /><circle cx="320" cy="200" r="1.5" /><circle cx="360" cy="200" r="1.5" /><circle cx="400" cy="200" r="1.5" /><circle cx="440" cy="200" r="1.5" /><circle cx="480" cy="200" r="1.5" />
    <circle cx="40" cy="240" r="1.5" /><circle cx="80" cy="240" r="1.5" /><circle cx="120" cy="240" r="1.5" /><circle cx="160" cy="240" r="1.5" /><circle cx="200" cy="240" r="1.5" /><circle cx="240" cy="240" r="1.5" /><circle cx="280" cy="240" r="1.5" /><circle cx="320" cy="240" r="1.5" /><circle cx="360" cy="240" r="1.5" /><circle cx="400" cy="240" r="1.5" /><circle cx="440" cy="240" r="1.5" /><circle cx="480" cy="240" r="1.5" />
    <circle cx="40" cy="280" r="1.5" /><circle cx="80" cy="280" r="1.5" /><circle cx="120" cy="280" r="1.5" /><circle cx="160" cy="280" r="1.5" /><circle cx="200" cy="280" r="1.5" /><circle cx="240" cy="280" r="1.5" /><circle cx="280" cy="280" r="1.5" /><circle cx="320" cy="280" r="1.5" /><circle cx="360" cy="280" r="1.5" /><circle cx="400" cy="280" r="1.5" /><circle cx="440" cy="280" r="1.5" /><circle cx="480" cy="280" r="1.5" />
    <circle cx="40" cy="320" r="1.5" /><circle cx="80" cy="320" r="1.5" /><circle cx="120" cy="320" r="1.5" /><circle cx="160" cy="320" r="1.5" /><circle cx="200" cy="320" r="1.5" /><circle cx="240" cy="320" r="1.5" /><circle cx="280" cy="320" r="1.5" /><circle cx="320" cy="320" r="1.5" /><circle cx="360" cy="320" r="1.5" /><circle cx="400" cy="320" r="1.5" /><circle cx="440" cy="320" r="1.5" /><circle cx="480" cy="320" r="1.5" />
    <circle cx="40" cy="360" r="1.5" /><circle cx="80" cy="360" r="1.5" /><circle cx="120" cy="360" r="1.5" /><circle cx="160" cy="360" r="1.5" /><circle cx="200" cy="360" r="1.5" /><circle cx="240" cy="360" r="1.5" /><circle cx="280" cy="360" r="1.5" /><circle cx="320" cy="360" r="1.5" /><circle cx="360" cy="360" r="1.5" /><circle cx="400" cy="360" r="1.5" /><circle cx="440" cy="360" r="1.5" /><circle cx="480" cy="360" r="1.5" />
    <circle cx="40" cy="400" r="1.5" /><circle cx="80" cy="400" r="1.5" /><circle cx="120" cy="400" r="1.5" /><circle cx="160" cy="400" r="1.5" /><circle cx="200" cy="400" r="1.5" /><circle cx="240" cy="400" r="1.5" /><circle cx="280" cy="400" r="1.5" /><circle cx="320" cy="400" r="1.5" /><circle cx="360" cy="400" r="1.5" /><circle cx="400" cy="400" r="1.5" /><circle cx="440" cy="400" r="1.5" /><circle cx="480" cy="400" r="1.5" />
    <circle cx="40" cy="440" r="1.5" /><circle cx="80" cy="440" r="1.5" /><circle cx="120" cy="440" r="1.5" /><circle cx="160" cy="440" r="1.5" /><circle cx="200" cy="440" r="1.5" /><circle cx="240" cy="440" r="1.5" /><circle cx="280" cy="440" r="1.5" /><circle cx="320" cy="440" r="1.5" /><circle cx="360" cy="440" r="1.5" /><circle cx="400" cy="440" r="1.5" /><circle cx="440" cy="440" r="1.5" /><circle cx="480" cy="440" r="1.5" />
  </g>

  <!-- Vector Connections / Inheritance Arrows -->
  <g fill="none">
    <!-- Generalization Arrow from Child 1 (Left) to Parent -->
    <path d="M 180 280 L 180 240 L 256 240 L 256 200" stroke="#38bdf8" stroke-width="3" />
    <polygon points="256,188 250,200 262,200" fill="#070a13" stroke="#38bdf8" stroke-width="2" />

    <!-- Generalization Arrow from Child 2 (Right) to Parent -->
    <path d="M 332 280 L 332 240 L 256 240" stroke="#38bdf8" stroke-width="3" />

    <!-- Dashed association from Actor to Use Case -->
    <path d="M 100 420 H 400" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="8 6" />
    <path d="M 400 420 L 392 415 M 400 420 L 392 425" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
  </g>

  <!-- Parent Class Card (Top Center) -->
  <g transform="translate(196, 60)">
    <rect width="120" height="110" rx="8" fill="#0f1422" stroke="url(#parent-grad)" stroke-width="2.5" filter="url(#glow)" />
    <line x1="0" y1="32" x2="120" y2="32" stroke="url(#parent-grad)" stroke-width="2" />
    <line x1="0" y1="70" x2="120" y2="70" stroke="rgba(56,189,248,0.3)" stroke-width="1.5" />
    <!-- Text outlines placeholder -->
    <rect x="25" y="10" width="70" height="12" rx="3" fill="#ffffff" opacity="0.9" />
    <rect x="10" y="44" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="10" y="54" width="60" height="6" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="10" y="82" width="100" height="6" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="10" y="92" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)" />
  </g>

  <!-- Child Class 1 (Bottom Left) -->
  <g transform="translate(120, 280)">
    <rect width="120" height="90" rx="8" fill="#0f1422" stroke="url(#child-grad)" stroke-width="2.5" filter="url(#glow)" />
    <line x1="0" y1="28" x2="120" y2="28" stroke="url(#child-grad)" stroke-width="2" />
    <rect x="30" y="8" width="60" height="10" rx="2" fill="#ffffff" opacity="0.9" />
    <rect x="10" y="38" width="70" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
    <rect x="10" y="48" width="50" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
    <line x1="0" y1="60" x2="120" y2="60" stroke="rgba(99,102,241,0.3)" stroke-width="1.5" />
    <rect x="10" y="70" width="80" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
  </g>

  <!-- Child Class 2 (Bottom Right) -->
  <g transform="translate(272, 280)">
    <rect width="120" height="90" rx="8" fill="#0f1422" stroke="url(#child-grad)" stroke-width="2.5" filter="url(#glow)" />
    <line x1="0" y1="28" x2="120" y2="28" stroke="url(#child-grad)" stroke-width="2" />
    <rect x="30" y="8" width="60" height="10" rx="2" fill="#ffffff" opacity="0.9" />
    <rect x="10" y="38" width="70" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
    <rect x="10" y="48" width="50" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
    <line x1="0" y1="60" x2="120" y2="60" stroke="rgba(99,102,241,0.3)" stroke-width="1.5" />
    <rect x="10" y="70" width="80" height="5" rx="1" fill="rgba(255,255,255,0.4)" />
  </g>

  <!-- Actor (Bottom Left overlay) -->
  <g transform="translate(60, 420)">
    <circle cx="0" cy="-24" r="10" fill="#0f1422" stroke="#38bdf8" stroke-width="2.5" />
    <line x1="0" y1="-14" x2="0" y2="10" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-15" y1="-6" x2="15" y2="-6" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" />
    <line x1="0" y1="10" x2="-10" y2="28" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" />
    <line x1="0" y1="10" x2="10" y2="28" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Use Case (Bottom Right overlay) -->
  <g transform="translate(420, 420)">
    <ellipse cx="0" cy="0" rx="45" ry="20" fill="#0f1422" stroke="#6366f1" stroke-width="2.5" filter="url(#glow)" />
    <rect x="-25" y="-3" width="50" height="6" rx="2" fill="rgba(255,255,255,0.7)" />
  </g>
</svg>
