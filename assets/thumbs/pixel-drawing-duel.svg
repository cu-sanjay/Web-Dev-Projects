<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cl"><rect width="800" height="500"/></clipPath>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="42%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(8,10,18,0.98)"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#cl)">
    <!-- Full screenshot -->
    <image href="data:image/jpeg;base64," x="0" y="0" width="800" height="500" preserveAspectRatio="xMidYMid slice"/>
    <!-- Cinema fade gradient -->
    <rect width="800" height="500" fill="url(#fade)"/>
    <!-- Solid bottom strip -->
    <rect y="356" width="800" height="144" fill="rgba(8,10,18,0.97)"/>
    <!-- Accent bar -->
    <rect y="356" width="800" height="3" fill="url(#bar)"/>
    <!-- Top-left badge -->
    <rect x="22" y="22" width="110" height="26" rx="13" fill="rgba(0,0,0,0.50)"/>
    <text x="77" y="40" text-anchor="middle" fill="#a78bfa" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.8">✦ OPENSTUDIO</text>
    <!-- Author initials (right) -->
    <circle cx="752" cy="382" r="22" fill="#a78bfa" opacity="0.14"/>
    <circle cx="752" cy="382" r="16" fill="#a78bfa" opacity="0.22"/>
    <text x="752" y="389" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="800" font-family="system-ui,sans-serif">M</text>
    <!-- Project title -->
    <text x="32" y="394" fill="#fff" font-size="32" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-0.5">Pixel Drawing Duel</text>
    <!-- Author credit -->
    <text x="32" y="422" fill="rgba(255,255,255,0.48)" font-size="13.5" font-weight="400" font-family="system-ui,sans-serif">by <tspan fill="rgba(255,255,255,0.82)" font-weight="600">Muskankr</tspan></text>
    <!-- Tag pills -->
    <rect x="32" y="466" width="45" height="21" rx="10.5" fill="#a78bfa" opacity="0.25"/><text x="54" y="480" text-anchor="middle" fill="#a78bfa" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">GAME</text><rect x="84" y="466" width="77" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="123" y="480" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">PIXEL-ART</text><rect x="169" y="466" width="84" height="21" rx="10.5" fill="rgba(255,255,255,0.1)" opacity="1"/><text x="211" y="480" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9.5" font-weight="700" font-family="system-ui,sans-serif" letter-spacing="0.7">JAVASCRIPT</text>
  </g>
</svg>