<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070e"/>
      <stop offset="100%" stop-color="#0b1122"/>
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="nodeNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="nodePath" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Network Background grid details -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Title & Subtitle -->
  <text x="40" y="70" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#ffffff">
    ROUTING ALGORITHM <tspan fill="#06b6d4">VISUALIZER</tspan>
  </text>
  <text x="40" y="100" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#94a3b8" letter-spacing="1">
    INTERACTIVE NETWORK ROUTING &amp; PATH COMPILATION
  </text>

  <!-- Inactive connections -->
  <g stroke="#334155" stroke-width="2.5">
    <line x1="160" y1="260" x2="360" y2="170"/>
    <line x1="360" y1="170" x2="560" y2="260"/>
    <line x1="360" y1="350" x2="560" y2="260"/>
  </g>
  <!-- Inactive link costs -->
  <text x="250" y="200" font-family="'Fira Code', monospace" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">Cost: 8</text>
  <text x="470" y="200" font-family="'Fira Code', monospace" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">Cost: 6</text>
  <text x="475" y="320" font-family="'Fira Code', monospace" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">Cost: 9</text>

  <!-- Active shortest path connections (Dijkstra SPF) -->
  <g stroke="#10b981" stroke-width="4.5" filter="url(#glowGreen)">
    <line x1="160" y1="260" x2="360" y2="350"/>
    <line x1="360" y1="350" x2="560" y2="260"/>
  </g>
  
  <!-- Active link costs -->
  <text x="250" y="325" font-family="'Fira Code', monospace" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">Cost: 2</text>
  <text x="470" y="325" font-family="'Fira Code', monospace" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">Cost: 3</text>

  <!-- Nodes -->
  <!-- Node A (Source) -->
  <g transform="translate(120, 225)" filter="url(#glowGreen)">
    <circle cx="40" cy="35" r="30" fill="url(#nodePath)" stroke="#34d399" stroke-width="2"/>
    <text x="40" y="41" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#ffffff" text-anchor="middle">A</text>
  </g>
  <!-- Node B -->
  <g transform="translate(320, 135)">
    <circle cx="40" cy="35" r="30" fill="url(#nodeNormal)" stroke="#334155" stroke-width="2"/>
    <text x="40" y="41" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#ffffff" text-anchor="middle">B</text>
  </g>
  <!-- Node C (Path) -->
  <g transform="translate(320, 315)" filter="url(#glowGreen)">
    <circle cx="40" cy="35" r="30" fill="url(#nodePath)" stroke="#34d399" stroke-width="2"/>
    <text x="40" y="41" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#ffffff" text-anchor="middle">C</text>
  </g>
  <!-- Node D (Destination) -->
  <g transform="translate(520, 225)" filter="url(#glowGreen)">
    <circle cx="40" cy="35" r="30" fill="url(#nodePath)" stroke="#34d399" stroke-width="2"/>
    <text x="40" y="41" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#ffffff" text-anchor="middle">D</text>
  </g>

  <!-- Label badge -->
  <g transform="translate(480, 80)" filter="url(#glowCyan)">
    <rect width="180" height="30" rx="6" fill="#0c1223" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="90" y="19" font-family="'Inter', sans-serif" font-weight="800" font-size="10" fill="#06b6d4" text-anchor="middle" letter-spacing="1">DIJKSTRA PATH: A → C → D</text>
  </g>
</svg>
