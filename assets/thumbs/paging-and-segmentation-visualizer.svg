<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d1a" />
      <stop offset="100%" stop-color="#121829" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Background glows -->
  <circle cx="270" cy="50" r="55" fill="#3b82f6" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="150" r="45" fill="#8b5cf6" opacity="0.08" filter="url(#glow)" />

  <!-- Address Translation Flow -->
  <!-- 1. Logical Address Block -->
  <g transform="translate(15, 30)">
    <text x="0" y="8" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700" fill="#94a3b8">LOGICAL ADDRESS</text>
    <rect x="0" y="14" width="90" height="18" rx="4" fill="#0f172a" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <rect x="2" y="16" width="45" height="14" rx="2" fill="rgba(59, 130, 246, 0.15)" />
    <text x="24.5" y="26" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700" fill="#3b82f6" text-anchor="middle">PAGE</text>
    <rect x="49" y="16" width="39" height="14" rx="2" fill="rgba(255,255,255,0.03)" />
    <text x="68.5" y="26" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#64748b" text-anchor="middle">OFFSET</text>
  </g>

  <!-- 2. Page Table Block -->
  <g transform="translate(120, 25)">
    <text x="0" y="8" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700" fill="#94a3b8">PAGE TABLE</text>
    <rect width="80" height="85" rx="5" fill="#0f172a" fill-opacity="0.8" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" y="14" />
    <!-- Headers -->
    <text x="10" y="26" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#64748b">PAGE</text>
    <text x="45" y="26" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#64748b">FRAME</text>
    <line x1="0" y1="30" x2="80" y2="30" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" y="14" />
    
    <!-- Table Rows -->
    <text x="14" y="44" font-family="'Inter', sans-serif" font-size="7" fill="#64748b">00</text>
    <text x="49" y="44" font-family="'Inter', sans-serif" font-size="7" fill="#94a3b8">03</text>
    
    <rect x="2" y="49" width="76" height="13" rx="2" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="0.5" />
    <text x="14" y="58" font-family="'Inter', sans-serif" font-size="7" fill="#ffffff" font-weight="700">01</text>
    <text x="49" y="58" font-family="'Inter', sans-serif" font-size="7" fill="#3b82f6" font-weight="700">05</text>
    
    <text x="14" y="72" font-family="'Inter', sans-serif" font-size="7" fill="#64748b">02</text>
    <text x="49" y="72" font-family="'Inter', sans-serif" font-size="7" fill="#94a3b8">01</text>

    <text x="14" y="85" font-family="'Inter', sans-serif" font-size="7" fill="#64748b">03</text>
    <text x="49" y="85" font-family="'Inter', sans-serif" font-size="7" fill="#94a3b8">07</text>
  </g>

  <!-- 3. Physical Memory Frames (Right) -->
  <g transform="translate(215, 25)">
    <text x="0" y="8" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700" fill="#94a3b8">PHYSICAL RAM</text>
    <rect width="90" height="85" rx="5" fill="#0f172a" fill-opacity="0.8" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" y="14" />
    
    <!-- Frames -->
    <rect x="4" y="18" width="82" height="12" rx="2" fill="rgba(255,255,255,0.02)" y="14" />
    <text x="10" y="27" font-family="'Inter', sans-serif" font-size="6.5" fill="#64748b" y="14">Frame 0</text>

    <rect x="4" y="32" width="82" height="12" rx="2" fill="rgba(255,255,255,0.02)" y="14" />
    <text x="10" y="41" font-family="'Inter', sans-serif" font-size="6.5" fill="#64748b" y="14">Frame 1</text>

    <!-- Highlighted Frame 5 -->
    <rect x="4" y="46" width="82" height="15" rx="2" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="1" filter="url(#glow)" y="14" />
    <text x="10" y="56" font-family="'Inter', sans-serif" font-size="7" fill="#06b6d4" font-weight="700" y="14">Frame 5 (Page 1)</text>

    <rect x="4" y="63" width="82" height="12" rx="2" fill="rgba(255,255,255,0.02)" y="14" />
    <text x="10" y="72" font-family="'Inter', sans-serif" font-size="6.5" fill="#64748b" y="14">Frame 6</text>
  </g>

  <!-- Connective Arrows -->
  <path d="M 60,48 Q 95,48 120,64" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow-blue)" />
  <path d="M 200,64 Q 212,64 219,65" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow-cyan)" filter="url(#glow)" />

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#06b6d4" />
    </marker>
  </defs>

  <!-- Segmentation Fault Highlight Alert (Bottom Left) -->
  <g transform="translate(15, 125)" filter="url(#glow)">
    <rect width="90" height="24" rx="6" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1" />
    <text x="45" y="15" font-family="'Inter', sans-serif" font-size="7.5" font-weight="800" fill="#ef4444" text-anchor="middle">SEGMENTATION FAULT</text>
  </g>

  <!-- Title & Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Inter', sans-serif" font-size="13" font-weight="800" text-anchor="middle" fill="#ffffff">
      MEM <tspan fill="#3b82f6">VISUALIZER</tspan>
    </text>
    <text y="11" font-family="'Inter', sans-serif" font-size="6.5" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="1">
      PAGING &amp; SEGMENTATION PIPELINE
    </text>
  </g>
</svg>
