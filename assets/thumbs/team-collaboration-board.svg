<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glow-card" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bg-grad)" />
  <rect width="318" height="198" x="1" y="1" rx="11" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Grid overlay -->
  <g opacity="0.05">
    <path d="M0,40 H320 M0,80 H320 M0,120 H320 M0,160 H320" stroke="#ffffff" stroke-width="1"/>
    <path d="M64,0 V200 M128,0 V200 M192,0 V200 M256,0 V200" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Header -->
  <g transform="translate(15, 12)">
    <!-- Team Icon -->
    <circle cx="4" cy="3" r="1.5" fill="#0ea5e9" />
    <path d="M1,8 A3,3 0 0,1 7,8 Z" fill="#0ea5e9" />
    <circle cx="10" cy="4" r="1.2" fill="#6366f1" />
    <path d="M8,8 A2,2 0 0,1 12,8 Z" fill="#6366f1" />
    <!-- Logo Text -->
    <text x="18" y="9" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="url(#logo-grad)">Collab<tspan font-weight="400" fill="#9ca3af">Board</tspan></text>
    <!-- Badge -->
    <rect x="74" y="1" width="28" height="9" rx="3" fill="#1f2937" stroke="#374151" stroke-width="0.5" />
    <text x="88" y="7" font-family="'Inter', sans-serif" font-weight="600" font-size="5" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">HUB</text>
  </g>

  <!-- Project Progress bar header -->
  <g transform="translate(200, 12)">
    <text x="105" y="6" font-family="'Inter', sans-serif" font-size="4.5" fill="#9ca3af" text-anchor="end">Progress: 50%</text>
    <rect x="55" y="8" width="50" height="3" rx="1.5" fill="#1f2937" />
    <rect x="55" y="8" width="25" height="3" rx="1.5" fill="#10b981" />
  </g>

  <!-- Kanban Columns Pipeline (4 lanes) -->
  <!-- Lane 1: Backlog -->
  <g transform="translate(15, 30)">
    <rect width="68" height="154" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="68" height="15" rx="3" fill="rgba(99, 102, 241, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#6366f1" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#a5b4fc">Backlog</text>
    <rect x="54" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="58" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="60" height="38" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <rect x="4" y="4" width="20" height="6" rx="2" fill="rgba(14, 165, 233, 0.15)" stroke="#0ea5e9" stroke-width="0.5" />
      <text x="6" y="8.5" font-family="'Inter', sans-serif" font-weight="700" font-size="4" fill="#7dd3fc">LOW</text>
      <text x="4" y="17" font-family="'Outfit', sans-serif" font-weight="600" font-size="5.5" fill="#ffffff">Write Docs</text>
      <!-- progress bar -->
      <rect x="4" y="24" width="52" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="24" width="0" height="2" rx="1" fill="#0ea5e9" />
      <!-- avatar -->
      <circle cx="50" cy="31" r="4" fill="#374151" />
      <text x="50" y="32.5" font-family="'Inter', sans-serif" font-size="4.5" fill="#ffffff" font-weight="700" text-anchor="middle">U</text>
    </g>
  </g>

  <!-- Lane 2: In Progress -->
  <g transform="translate(88, 30)">
    <rect width="68" height="154" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="68" height="15" rx="3" fill="rgba(14, 165, 233, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#0ea5e9" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#7dd3fc">In Progress</text>
    <rect x="54" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="58" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 (Glowing active card) -->
    <g transform="translate(4, 20)">
      <rect width="60" height="38" rx="4" fill="#111827" stroke="#0ea5e9" stroke-width="0.8" filter="url(#glow-card)" />
      <rect x="4" y="4" width="22" height="6" rx="2" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="0.5" />
      <text x="6" y="8.5" font-family="'Inter', sans-serif" font-weight="700" font-size="4" fill="#fca5a5">HIGH</text>
      <text x="4" y="17" font-family="'Outfit', sans-serif" font-weight="600" font-size="5.5" fill="#ffffff">OAuth Login</text>
      <!-- progress bar -->
      <rect x="4" y="24" width="52" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="24" width="34" height="2" rx="1" fill="#0ea5e9" />
      <!-- avatar -->
      <circle cx="50" cy="31" r="4" fill="#e11d48" />
      <text x="50" y="32.5" font-family="'Inter', sans-serif" font-size="4.5" fill="#ffffff" font-weight="700" text-anchor="middle">AS</text>
    </g>
  </g>

  <!-- Lane 3: In Review -->
  <g transform="translate(161, 30)">
    <rect width="68" height="154" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="68" height="15" rx="3" fill="rgba(245, 158, 11, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#f59e0b" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#fde047">In Review</text>
    <rect x="54" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="58" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="60" height="38" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <rect x="4" y="4" width="22" height="6" rx="2" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="0.5" />
      <text x="6" y="8.5" font-family="'Inter', sans-serif" font-weight="700" font-size="4" fill="#fca5a5">HIGH</text>
      <text x="4" y="17" font-family="'Outfit', sans-serif" font-weight="600" font-size="5.5" fill="#ffffff">Optimize DB</text>
      <!-- progress bar -->
      <rect x="4" y="24" width="52" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="24" width="34" height="2" rx="1" fill="#0ea5e9" />
      <!-- avatar -->
      <circle cx="50" cy="31" r="4" fill="#16a34a" />
      <text x="50" y="32.5" font-family="'Inter', sans-serif" font-size="4.5" fill="#ffffff" font-weight="700" text-anchor="middle">CB</text>
    </g>
  </g>

  <!-- Lane 4: Done -->
  <g transform="translate(234, 30)">
    <rect width="68" height="154" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="68" height="15" rx="3" fill="rgba(16, 185, 129, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#10b981" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#6ee7b7">Done</text>
    <rect x="54" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="58" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="60" height="38" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <rect x="4" y="4" width="24" height="6" rx="2" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="0.5" />
      <text x="6" y="8.5" font-family="'Inter', sans-serif" font-weight="700" font-size="4" fill="#fde047">MEDIUM</text>
      <text x="4" y="17" font-family="'Outfit', sans-serif" font-weight="600" font-size="5.5" fill="#ffffff">Design Landing</text>
      <!-- progress bar -->
      <rect x="4" y="24" width="52" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="24" width="52" height="2" rx="1" fill="#10b981" />
      <!-- avatar -->
      <circle cx="50" cy="31" r="4" fill="#2563eb" />
      <text x="50" y="32.5" font-family="'Inter', sans-serif" font-size="4.5" fill="#ffffff" font-weight="700" text-anchor="middle">BJ</text>
    </g>
  </g>
</svg>
