<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Glowing slice filters -->
    <filter id="glow-slice" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bg-grad)" />
  <rect width="318" height="198" x="1" y="1" rx="11" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Grid overlay -->
  <g opacity="0.05">
    <path d="M0,40 H320 M0,80 H320 M0,120 H320 M0,160 H320" stroke="#ffffff" stroke-width="1"/>
    <path d="M64,0 V200 M128,0 V200 M192,0 V200 M256,0 V200" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Header -->
  <g transform="translate(15, 12)">
    <!-- Pie Chart Icon -->
    <path d="M6,0 A6,6 0 0,1 6,12 A6,6 0 0,1 1,9 L6,6 L6,0 Z" fill="#0ea5e9" />
    <path d="M5,5 L0,5 A6,6 0 0,1 5,0 L5,5 Z" fill="#6366f1" transform="translate(0.5,-0.5)" />
    <!-- Logo Text -->
    <text x="18" y="9" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="url(#logo-grad)">CapTable<tspan font-weight="400" fill="#9ca3af">Pro</tspan></text>
    <!-- Badge -->
    <rect x="83" y="1" width="32" height="9" rx="3" fill="#1f2937" stroke="#374151" stroke-width="0.5" />
    <text x="99" y="7" font-family="'Inter', sans-serif" font-weight="600" font-size="5" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">EQUITY</text>
  </g>

  <!-- Valuation badge -->
  <g transform="translate(245, 12)">
    <rect x="0" y="0" width="60" height="10" rx="3" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.5" />
    <circle cx="5" cy="5" r="2.5" fill="#10b981" />
    <text x="11" y="7.2" font-family="'Inter', sans-serif" font-weight="700" font-size="5.5" fill="#10b981" letter-spacing="0.2">$4,000,000 POST</text>
  </g>

  <!-- Metrics row summary -->
  <g transform="translate(15, 30)">
    <!-- Metric 1: Valuation -->
    <rect x="0" y="0" width="68" height="28" rx="5" fill="#111827" stroke="#374151" stroke-width="0.5" />
    <text x="6" y="8" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af" letter-spacing="0.2">POST-MONEY VAL</text>
    <text x="6" y="21" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#10b981">$4,000,000</text>

    <!-- Metric 2: Total Shares -->
    <rect x="74" y="0" width="68" height="28" rx="5" fill="#111827" stroke="#374151" stroke-width="0.5" />
    <text x="80" y="8" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af" letter-spacing="0.2">TOTAL SHARES</text>
    <text x="80" y="21" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#22d3ee">10,793,650</text>

    <!-- Metric 3: ESOP pool size -->
    <rect x="148" y="0" width="68" height="28" rx="5" fill="#111827" stroke="#374151" stroke-width="0.5" />
    <text x="154" y="8" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af" letter-spacing="0.2">ESOP POOL SIZE</text>
    <text x="154" y="21" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#fde047">10.0%</text>

    <!-- Metric 4: Dilution rate -->
    <rect x="220" y="0" width="70" height="28" rx="5" fill="#111827" stroke="#374151" stroke-width="0.5" />
    <text x="226" y="8" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af" letter-spacing="0.2">ORIGINAL DILUTION</text>
    <text x="226" y="21" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#fca5a5">22.5%</text>
  </g>

  <!-- Center Workspace (Pie chart & Exit simulator slider) -->
  <g transform="translate(15, 68)">
    <rect width="200" height="116" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    
    <!-- SVG Pie Chart render -->
    <g transform="translate(55, 52)">
      <!-- Slices -->
      <path d="M 0 0 L 0 -42 A 42 42 0 0 1 36 21 Z" fill="var(--color-holder-1)" stroke="#111827" stroke-width="1" />
      <path d="M 0 0 L 36 21 A 42 42 0 0 1 -21 36 Z" fill="var(--color-holder-2)" stroke="#111827" stroke-width="1" />
      <path d="M 0 0 L -21 36 A 42 42 0 0 1 -36 -21 Z" fill="#0ea5e9" stroke="#111827" stroke-width="1" filter="url(#glow-slice)" />
      <path d="M 0 0 L -36 -21 A 42 42 0 0 1 0 -42 Z" fill="var(--color-esop)" stroke="#111827" stroke-width="1" />
      <!-- Inner hole for donut style -->
      <circle cx="0" cy="0" r="18" fill="#111827" />
    </g>

    <!-- Legend lists -->
    <g transform="translate(110, 25)" font-family="'Inter', sans-serif" font-size="5">
      <rect x="0" y="0" width="5" height="5" rx="1.5" fill="var(--color-holder-1)" />
      <text x="8" y="5.5" fill="#9ca3af">Founder A (37.1%)</text>

      <rect x="0" y="10" width="5" height="5" rx="1.5" fill="var(--color-holder-2)" />
      <text x="8" y="15.5" fill="#9ca3af">Founder B (27.8%)</text>

      <rect x="0" y="20" width="5" height="5" rx="1.5" fill="#0ea5e9" />
      <text x="8" y="25.5" fill="#9ca3af">Seed Inv (25.1%)</text>

      <rect x="0" y="30" width="5" height="5" rx="1.5" fill="var(--color-esop)" />
      <text x="8" y="35.5" fill="#9ca3af">ESOP Pool (10.0%)</text>
    </g>

    <!-- Exit Simulator Slider display inside SVG -->
    <g transform="translate(10, 88)">
      <rect width="180" height="20" rx="4" fill="rgba(9, 13, 22, 0.4)" stroke="#374151" stroke-width="0.5" />
      <text x="6" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="5.5" fill="#ffffff">Exit Simulator</text>
      <text x="174" y="12" font-family="'Outfit', sans-serif" font-weight="800" font-size="6.5" fill="#10b981" text-anchor="end">$50,000,000</text>
      <!-- Slider line representation -->
      <line x1="56" y1="10" x2="132" y2="10" stroke="#374151" stroke-width="1.5" stroke-linecap="round" />
      <circle cx="94" cy="10" r="3.5" fill="#0ea5e9" />
    </g>
  </g>

  <!-- Right side scenario vault -->
  <g transform="translate(225, 68)">
    <rect width="80" height="116" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <text x="8" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="7" fill="#ffffff">Cap Vault</text>
    
    <g transform="translate(6, 20)">
      <rect width="68" height="18" rx="3" fill="rgba(16, 185, 129, 0.05)" stroke="#10b981" stroke-width="0.5" />
      <text x="6" y="11" font-family="'Inter', sans-serif" font-weight="700" font-size="5" fill="#6ee7b7">★ Founders Plan</text>
      
      <g transform="translate(0, 23)">
        <rect width="68" height="18" rx="3" fill="rgba(255,255,255,0.02)" stroke="#374151" stroke-width="0.5" />
        <text x="6" y="11" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af">VC Series A</text>
      </g>

      <g transform="translate(0, 46)">
        <rect width="68" height="18" rx="3" fill="rgba(255,255,255,0.02)" stroke="#374151" stroke-width="0.5" />
        <text x="6" y="11" font-family="'Inter', sans-serif" font-weight="500" font-size="5" fill="#9ca3af">Angel Clean</text>
      </g>
    </g>

    <!-- Advisory quick footer tip -->
    <g transform="translate(6, 95)">
      <rect width="68" height="15" rx="3" fill="rgba(14, 165, 233, 0.05)" />
      <text x="6" y="9" font-family="'Inter', sans-serif" font-weight="600" font-size="4.5" fill="#0ea5e9">🛡️ Board control OK.</text>
    </g>
  </g>
</svg>
