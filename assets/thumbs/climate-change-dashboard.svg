<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark main background -->
  <rect width="400" height="400" fill="#07090e" rx="12"/>

  <!-- Background grid lines -->
  <g stroke="#10b981" stroke-width="1" opacity="0.04">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
  </g>

  <!-- Gradients -->
  <defs>
    <radialGradient id="globe-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e3047"/>
      <stop offset="85%" stop-color="#0a1d2e"/>
      <stop offset="100%" stop-color="#020813"/>
    </radialGradient>
    <radialGradient id="atmo-shell-glow" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="90%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chart-temp-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Warming Greenhouse Atmosphere Ring -->
  <circle cx="200" cy="180" r="102" fill="url(#atmo-shell-glow)"/>

  <!-- Earth Globe base circle -->
  <circle cx="200" cy="180" r="90" fill="url(#globe-glow)" stroke="rgba(16, 185, 129, 0.12)" stroke-width="1.5"/>

  <!-- Continents abstract silhouettes shapes -->
  <g fill="#166534" opacity="0.35" transform="translate(110, 90) scale(0.9)">
    <!-- North America -->
    <path d="M 20 20 Q 35 15, 50 30 T 70 20 T 75 55 T 45 75 Z"/>
    <!-- South America -->
    <path d="M 45 75 Q 55 95, 65 125 T 85 170 Q 75 180, 70 170 T 50 120 T 40 85 Z"/>
    <!-- Africa/Europe -->
    <path d="M 110 30 Q 130 10, 150 20 T 175 45 T 165 95 T 120 120 Q 100 80, 110 30 Z"/>
  </g>

  <!-- Polar Ice Caps -->
  <path d="M 155 105 Q 200 125, 245 105 A 90 90 0 0 0 155 105" fill="#f8fafc" opacity="0.8"/>
  <path d="M 155 255 Q 200 235, 245 255 A 90 90 0 0 1 155 255" fill="#f8fafc" opacity="0.85"/>

  <!-- Dynamic Line Graph: Temperature Anomaly rising -->
  <!-- Underlay gradient shape -->
  <path d="M 40 280 L 100 270 L 160 260 L 220 220 L 280 160 L 340 100 L 360 80 L 360 300 L 40 300 Z" fill="url(#chart-temp-glow)"/>
  
  <!-- Main projection lines -->
  <path d="M 40 280 L 100 270 L 160 260 L 220 220 L 280 160 L 340 100 L 360 80" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 40 290 L 100 285 L 160 275 L 220 245 L 280 205 L 340 150 L 360 128" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Grid divisions tick on chart -->
  <line x1="220" y1="80" x2="220" y2="300" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="220" cy="220" r="3.5" fill="#ef4444"/>

  <!-- Green Mitigation icons overlay -->
  <!-- Wind Turbine (Top Left overlay) -->
  <g stroke="#10b981" stroke-width="1.5" fill="none" transform="translate(60, 60)" opacity="0.85">
    <line x1="15" y1="35" x2="15" y2="10"/>
    <path d="M 15 10 L 5 2 L 15 10 L 25 2 L 15 10 L 15 22 Z"/>
    <circle cx="15" cy="10" r="2" fill="#10b981"/>
  </g>

  <!-- Green Leaf icon (Bottom Right overlay) -->
  <g fill="#10b981" transform="translate(300, 260) scale(0.9)" opacity="0.8">
    <path d="M 10 30 Q 15 10, 30 10 Q 30 25, 20 35 Q 16 33, 10 30 Z"/>
    <line x1="10" y1="30" x2="20" y2="20" stroke="#064e3b" stroke-width="1.5"/>
  </g>

  <!-- Floating CO2 Molecules schematic dots -->
  <g fill="#ffa500" opacity="0.8">
    <!-- CO2 1 -->
    <circle cx="280" cy="90" r="3"/>
    <circle cx="273" cy="90" r="2" fill="#475569"/>
    <circle cx="287" cy="90" r="2" fill="#475569"/>
    <!-- CO2 2 -->
    <circle cx="120" cy="250" r="3"/>
    <circle cx="113" cy="250" r="2" fill="#475569"/>
    <circle cx="127" cy="250" r="2" fill="#475569"/>
  </g>

  <!-- Labels -->
  <text x="200" y="380" font-family="'Fira Code', monospace" font-size="11" fill="#10b981" font-weight="700" letter-spacing="2" text-anchor="middle">CLIMATE CHANGE</text>
  <text x="200" y="393" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" letter-spacing="1.2" text-anchor="middle">POLICY &amp; PROJECTION HUB</text>
  
  <!-- Outer glass border HUD frame -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" rx="8"/>
</svg>
