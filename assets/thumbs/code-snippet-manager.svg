<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111827" stop-opacity="1" />
      <stop offset="100%" stop-color="#080a14" stop-opacity="1" />
    </radialGradient>
    
    <!-- Code Syntax Colors -->
    <linearGradient id="code-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="code-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="code-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="code-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4"/>

  <!-- Simulated Grid overlay -->
  <g stroke="rgba(255,255,255,0.015)" stroke-width="1">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Mock Editor Window Layout -->
  <g transform="translate(48, 64)">
    <!-- Window Frame -->
    <rect width="416" height="384" rx="16" fill="#03060c" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />
    
    <!-- Top Window bar -->
    <rect width="416" height="40" rx="16" fill="rgba(255, 255, 255, 0.02)" />
    <!-- Window circles buttons -->
    <circle cx="24" cy="20" r="6" fill="#ef4444" />
    <circle cx="44" cy="20" r="6" fill="#fbbf24" />
    <circle cx="64" cy="20" r="6" fill="#10b981" />
    
    <!-- Active File tab -->
    <path d="M120 40 L130 14 H220 L230 40 Z" fill="#080a13" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    <text x="175" y="30" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">script.js</text>

    <!-- Sidebar vertical layout line -->
    <line x1="100" y1="40" x2="100" y2="384" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />
    
    <!-- Sidebar content (Folder lists icons) -->
    <g transform="translate(0, 40)" fill="rgba(255,255,255,0.2)" stroke="none">
      <rect x="15" y="20" width="70" height="10" rx="3" />
      <rect x="25" y="40" width="60" height="8" rx="2" fill="rgba(56, 189, 248, 0.4)" />
      <rect x="25" y="56" width="60" height="8" rx="2" />
      <rect x="15" y="80" width="70" height="10" rx="3" />
      <rect x="25" y="100" width="60" height="8" rx="2" />
      <rect x="25" y="116" width="60" height="8" rx="2" />
    </g>

    <!-- Code Editor Section Lines (neon block variables) -->
    <g transform="translate(120, 60)" stroke-linecap="round" stroke-width="6">
      <!-- Line 1: function binarySearch(arr) -->
      <line x1="10" y1="20" x2="80" y2="20" stroke="url(#code-pink)" />
      <line x1="90" y1="20" x2="180" y2="20" stroke="url(#code-cyan)" />
      <line x1="190" y1="20" x2="220" y2="20" stroke="#ffffff" opacity="0.8" />
      
      <!-- Line 2: indent let left = 0; -->
      <line x1="30" y1="45" x2="60" y2="45" stroke="url(#code-pink)" />
      <line x1="70" y1="45" x2="110" y2="45" stroke="url(#code-cyan)" />
      <line x1="120" y1="45" x2="140" y2="45" stroke="url(#code-yellow)" />

      <!-- Line 3: indent while (left <= right) -->
      <line x1="30" y1="70" x2="70" y2="70" stroke="url(#code-pink)" />
      <line x1="80" y1="70" x2="200" y2="70" stroke="#ffffff" opacity="0.8" />

      <!-- Line 4: double indent mid = Math.floor() -->
      <line x1="50" y1="95" x2="80" y2="95" stroke="url(#code-pink)" />
      <line x1="90" y1="95" x2="130" y2="95" stroke="url(#code-cyan)" />
      <line x1="140" y1="95" x2="240" y2="95" stroke="url(#code-green)" />

      <!-- Line 5: double indent if (arr[mid] === target) -->
      <line x1="50" y1="120" x2="70" y2="120" stroke="url(#code-pink)" />
      <line x1="80" y1="120" x2="220" y2="120" stroke="#ffffff" opacity="0.8" />
    </g>

    <!-- Console separator horizontal layout line -->
    <line x1="100" y1="240" x2="416" y2="240" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />
    <rect x="110" y="248" width="60" height="14" rx="3" fill="rgba(56, 189, 248, 0.1)" />
    <text x="140" y="259" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">Console</text>

    <!-- Terminal logs simulated standard outputs -->
    <g transform="translate(120, 276)" font-family="monospace" font-size="10" fill="#a8ff60">
      <text x="0" y="12">&gt; Initializing Go sandbox compiler...</text>
      <text x="0" y="28">&gt; Standard Output: Hello Sandbox!</text>
      <text x="0" y="44" fill="rgba(255,255,255,0.4)">&gt; Process finished with exit code 0</text>
    </g>

    <!-- Large glowing code brackets icon floating on top -->
    <g transform="translate(320, 90)">
      <circle cx="45" cy="45" r="45" fill="#080a13" stroke="url(#code-cyan)" stroke-width="4" filter="url(#neon-glow)" />
      <text x="45" y="54" font-family="monospace" font-weight="900" font-size="28" fill="#38bdf8" text-anchor="middle">&lt;/&gt;</text>
    </g>
  </g>
</svg>
