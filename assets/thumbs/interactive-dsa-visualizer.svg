<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913"/>
      <stop offset="50%" stop-color="#0b1021"/>
      <stop offset="100%" stop-color="#03050a"/>
    </linearGradient>
    
    <!-- Colors -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <filter id="glow-active" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#a855f7" flood-opacity="0.4"/>
    </filter>
    
    <filter id="glow-success" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Subtle Grid -->
  <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>

  <!-- Left Sidebar Panel Mockup -->
  <rect x="0" y="0" width="70" height="300" rx="20" fill="rgba(11, 15, 27, 0.5)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <g transform="translate(35, 40)">
    <circle cx="0" cy="0" r="10" fill="url(#blueGrad)"/>
    <text x="0" y="3" font-family="'Outfit', sans-serif" font-weight="900" font-size="10" fill="#ffffff" text-anchor="middle">f</text>
  </g>
  <circle cx="35" cy="95" r="4" fill="#a855f7"/>
  <circle cx="35" cy="130" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="35" cy="165" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="35" cy="200" r="4" fill="rgba(255,255,255,0.2)"/>

  <!-- Header Info -->
  <text x="90" y="42" font-family="'Outfit', sans-serif" font-weight="800" font-size="18" fill="#ffffff">DSA Visualizer</text>
  <text x="90" y="58" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="9.5" fill="#64748b">Interactive algorithm telemetries</text>

  <!-- Speed tag mockup -->
  <rect x="380" y="24" width="95" height="36" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <text x="395" y="46" font-family="'Outfit', sans-serif" font-size="11">⏱️</text>
  <text x="412" y="36" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="7.5" fill="#64748b">INTERVAL</text>
  <text x="412" y="48" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="#a855f7">800ms</text>

  <!-- Main Canvas Card: BST Visualizer Tree Mockup -->
  <g transform="translate(90, 80)">
    <!-- Card Frame -->
    <rect width="250" height="195" rx="14" fill="rgba(17, 24, 39, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <text x="16" y="24" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Tree Traversal: Preorder</text>

    <!-- BST Tree Nodes drawing (Level 0, 1, 2) -->
    <g transform="translate(125, 45)">
      <!-- Root Node 50 -->
      <!-- Left line -->
      <line x1="0" y1="0" x2="-45" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      <!-- Right line -->
      <line x1="0" y1="0" x2="45" y2="40" stroke="#10b981" stroke-width="2.5"/>

      <!-- Node 30 Left branch lines -->
      <line x1="-45" y1="40" x2="-75" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
      <line x1="-45" y1="40" x2="-15" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

      <!-- Node 70 Right branch lines -->
      <line x1="45" y1="40" x2="15" y2="80" stroke="#10b981" stroke-width="2.5"/>
      <line x1="45" y1="40" x2="75" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

      <!-- Root Circle -->
      <circle cx="0" cy="0" r="14" fill="url(#purpleGrad)"/>
      <text x="0" y="3" font-family="'Outfit', sans-serif" font-weight="700" font-size="8.5" fill="#ffffff" text-anchor="middle">50</text>

      <!-- Level 1 Nodes -->
      <!-- Left child 30 -->
      <circle cx="-45" cy="40" r="14" fill="rgba(30, 41, 59, 0.9)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <text x="-45" y="43" font-family="'Outfit', sans-serif" font-weight="700" font-size="8.5" fill="#ffffff" text-anchor="middle">30</text>

      <!-- Right child 70 (Visiting highlight) -->
      <circle cx="45" cy="40" r="14" fill="url(#blueGrad)" filter="url(#glow-active)"/>
      <text x="45" y="43" font-family="'Outfit', sans-serif" font-weight="700" font-size="8.5" fill="#ffffff" text-anchor="middle">70</text>

      <!-- Level 2 Nodes -->
      <circle cx="-75" cy="80" r="12" fill="rgba(30, 41, 59, 0.9)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <text x="-75" y="83" font-family="'Outfit', sans-serif" font-size="7.5" fill="#ffffff" text-anchor="middle">20</text>
      
      <circle cx="-15" cy="80" r="12" fill="rgba(30, 41, 59, 0.9)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <text x="-15" y="83" font-family="'Outfit', sans-serif" font-size="7.5" fill="#ffffff" text-anchor="middle">40</text>
      
      <!-- Right visited target node 60 -->
      <circle cx="15" cy="80" r="12" fill="url(#greenGrad)" filter="url(#glow-success)"/>
      <text x="15" y="83" font-family="'Outfit', sans-serif" font-weight="700" font-size="7.5" fill="#ffffff" text-anchor="middle">60</text>
      
      <circle cx="75" cy="80" r="12" fill="rgba(30, 41, 59, 0.9)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <text x="75" y="83" font-family="'Outfit', sans-serif" font-size="7.5" fill="#ffffff" text-anchor="middle">80</text>
    </g>

    <!-- Trace text at bottom -->
    <rect x="15" y="152" width="220" height="28" rx="6" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)"/>
    <text x="24" y="169" font-family="'Fira Code', monospace" font-size="7.5" fill="#10b981">> Node [60] visited. Traversal idx: 3</text>
  </g>

  <!-- Right Code Trace Telemetry panel mockup -->
  <g transform="translate(355, 80)">
    <rect width="120" height="195" rx="14" fill="rgba(17, 24, 39, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <text x="14" y="24" font-family="'Outfit', sans-serif" font-weight="700" font-size="10.5" fill="#ffffff">Pseudo-code</text>

    <!-- Code trace lines mockup -->
    <g transform="translate(14, 40)">
      <rect x="0" y="0" width="92" height="12" rx="3" fill="rgba(234, 179, 8, 0.08)" stroke="rgba(234, 179, 8, 0.2)"/>
      <text x="6" y="8" font-family="'Fira Code', monospace" font-size="6.5" fill="#eab308">visit(root);</text>

      <text x="6" y="22" font-family="'Fira Code', monospace" font-size="6.5" fill="#64748b">traverse(root.left);</text>
      <text x="6" y="34" font-family="'Fira Code', monospace" font-size="6.5" fill="#64748b">traverse(root.right);</text>
    </g>

    <!-- complexity table mockup -->
    <g transform="translate(14, 100)">
      <text x="0" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="8" fill="#64748b">COMPLEXITIES</text>
      <line x1="0" y1="16" x2="92" y2="16" stroke="rgba(255,255,255,0.04)"/>
      
      <text x="0" y="28" font-family="'Plus Jakarta Sans', sans-serif" font-size="7" fill="#94a3b8">Search</text>
      <text x="92" y="28" font-family="'Fira Code', monospace" font-size="7" fill="#3b82f6" text-anchor="end">O(log N)</text>

      <text x="0" y="40" font-family="'Plus Jakarta Sans', sans-serif" font-size="7" fill="#94a3b8">Insert</text>
      <text x="92" y="40" font-family="'Fira Code', monospace" font-size="7" fill="#3b82f6" text-anchor="end">O(log N)</text>

      <text x="0" y="52" font-family="'Plus Jakarta Sans', sans-serif" font-size="7" fill="#94a3b8">Traverse</text>
      <text x="92" y="52" font-family="'Fira Code', monospace" font-size="7" fill="#3b82f6" text-anchor="end">O(N)</text>
    </g>
  </g>
</svg>
