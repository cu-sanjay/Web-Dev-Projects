<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03040a" />
      <stop offset="100%" stop-color="#0a0b16" />
    </linearGradient>
    
    <!-- Accent Indigo/Violet Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>

    <!-- Success Green Gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Background glows -->
  <circle cx="270" cy="50" r="50" fill="#6366f1" opacity="0.1" filter="url(#glow)" />
  <circle cx="50" cy="150" r="45" fill="#10b981" opacity="0.06" filter="url(#glow)" />

  <!-- LEFT CARD: Database Cylinder Diagram & Relations -->
  <g transform="translate(25, 30)">
    <!-- Card Frame -->
    <rect width="115" height="115" rx="8" fill="rgba(12, 14, 30, 0.5)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Header tabs -->
    <circle cx="10" cy="10" r="3" fill="#ef4444" opacity="0.8" />
    <circle cx="18" cy="10" r="3" fill="#f59e0b" opacity="0.8" />
    <circle cx="26" cy="10" r="3" fill="#10b981" opacity="0.8" />
    <rect x="75" y="6" width="30" height="8" rx="3" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="0.5" />
    <text x="90" y="12" font-family="'Inter', sans-serif" font-size="5" fill="#a78bfa" text-anchor="middle" font-weight="700">DATABASE</text>

    <!-- Cylinder DB Icon -->
    <g transform="translate(38, 25)">
      <!-- Top lid -->
      <ellipse cx="20" cy="12" rx="18" ry="6" fill="url(#accent-grad)" filter="url(#glow)" opacity="0.8" />
      <ellipse cx="20" cy="12" rx="18" ry="6" fill="none" stroke="#ffffff" stroke-width="1" />
      
      <!-- Middle cylinder tier -->
      <path d="M2,12 L2,27 A18,6 0 0,0 38,27 L38,12" fill="rgba(99,102,241,0.2)" stroke="#ffffff" stroke-width="1" />
      <path d="M2,27 A18,6 0 0,0 38,27" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 2" />

      <!-- Bottom cylinder tier -->
      <path d="M2,27 L2,42 A18,6 0 0,0 38,42 L38,27" fill="rgba(99,102,241,0.2)" stroke="#ffffff" stroke-width="1" />
    </g>

    <!-- Schema Tables connecting links -->
    <g transform="translate(15, 80)">
      <rect width="36" height="20" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8" />
      <text x="18" y="12" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#9ca3af" text-anchor="middle">students</text>

      <rect x="50" y="0" width="36" height="20" rx="3" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8" />
      <text x="68" y="12" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#9ca3af" text-anchor="middle">courses</text>
      
      <!-- Connective path lines -->
      <path d="M36,10 L50,10" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="2 2" />
      <circle cx="43" cy="10" r="2.5" fill="#f59e0b" />
    </g>
  </g>

  <!-- MIDDLE CONNECTIVE ELEMENT: Compile sparkles -->
  <g transform="translate(142, 80)">
    <path d="M-2,10 L30,10" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" stroke-dasharray="3 3" />
    <path d="M10,-10 L13,-4 L19,-1 L13,2 L10,8 L7,2 L1,-1 L7,-4 Z" fill="url(#green-grad)" filter="url(#glow)" opacity="0.8" />
  </g>

  <!-- RIGHT CARD: Dynamic Quiz Lesson Checker -->
  <g transform="translate(185, 25)">
    <!-- Card Frame -->
    <rect width="115" height="115" rx="8" fill="rgba(12, 14, 30, 0.5)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Header tabs -->
    <circle cx="10" cy="10" r="3" fill="#ef4444" opacity="0.8" />
    <circle cx="18" cy="10" r="3" fill="#f59e0b" opacity="0.8" />
    <circle cx="26" cy="10" r="3" fill="#10b981" opacity="0.8" />
    <rect x="75" y="6" width="30" height="8" rx="3" fill="rgba(16, 185, 129, 0.15)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="0.5" />
    <text x="90" y="12" font-family="'Inter', sans-serif" font-size="5" fill="#34d399" text-anchor="middle" font-weight="700">REPORT</text>

    <!-- Quiz text checklist -->
    <!-- Lesson 1 Passed -->
    <circle cx="15" cy="28" r="4.5" fill="url(#green-grad)" />
    <path d="M13.5,28 L14.5,29 L16.5,27" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round" />
    <text x="24" y="30.5" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#f3f4f6">SELECT &amp; FROM</text>

    <!-- Lesson 2 Passed -->
    <circle cx="15" cy="48" r="4.5" fill="url(#green-grad)" />
    <path d="M13.5,48 L14.5,49 L16.5,47" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round" />
    <text x="24" y="50.5" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#f3f4f6">WHERE FILTER</text>

    <!-- Lesson 3 Active -->
    <circle cx="15" cy="68" r="4.5" fill="none" stroke="#6366f1" stroke-width="1.2" />
    <text x="24" y="70.5" font-family="'Inter', sans-serif" font-size="6" font-weight="700" fill="#6366f1">ORDER BY SORT</text>

    <!-- Progress Indicator badge -->
    <rect x="8" y="90" width="99" height="18" rx="3" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.8" />
    <text x="57" y="101" font-family="'Inter', sans-serif" font-size="6" font-weight="800" fill="#34d399" text-anchor="middle">LEVEL 2 PASSED (UNLOCK LEVEL 3)</text>
  </g>

  <!-- BRANDING / TEXT LABELS -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="0.5">
      SQL<tspan fill="#6366f1">earn</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="600" text-anchor="middle" fill="#9ca3af" letter-spacing="1" opacity="0.8">
      SQL QUERY LEARNING SANDBOX
    </text>
  </g>
</svg>
