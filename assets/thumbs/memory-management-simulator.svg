<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="18%" stop-color="#e8f5e9"/>
      <stop offset="18%" stop-color="#2e7d32"/>
      <stop offset="30%" stop-color="#2e7d32"/>
      <stop offset="30%" stop-color="#e8f5e9"/>
      <stop offset="55%" stop-color="#e8f5e9"/>
      <stop offset="55%" stop-color="#2e7d32"/>
      <stop offset="72%" stop-color="#2e7d32"/>
      <stop offset="72%" stop-color="#d32f2f"/>
      <stop offset="82%" stop-color="#d32f2f"/>
      <stop offset="82%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="#f4f7f5" rx="8"/>

  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#e2ebd9" stroke-width="2" rx="8"/>

  <text x="200" y="48" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="18" font-weight="800" fill="#1b3a24" letter-spacing="2">MEM-SPROUT</text>

  <text x="200" y="70" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#557a61" letter-spacing="2">Memory Management Simulator</text>

  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="340" height="64" rx="4" fill="url(#bar-grad)" stroke="#c8e6c9" stroke-width="1"/>

    <line x1="61" y1="0" x2="61" y2="64" stroke="#c8e6c9" stroke-width="1"/>
    <line x1="102" y1="0" x2="102" y2="64" stroke="#c8e6c9" stroke-width="1"/>
    <line x1="187" y1="0" x2="187" y2="64" stroke="#c8e6c9" stroke-width="1"/>
    <line x1="245" y1="0" x2="245" y2="64" stroke="#c8e6c9" stroke-width="1"/>
    <line x1="279" y1="0" x2="279" y2="64" stroke="#c8e6c9" stroke-width="1"/>

    <text x="8" y="38" font-family="monospace" font-size="8" fill="#557a61">0x0000</text>
    <text x="68" y="38" font-family="monospace" font-size="8" fill="#557a61">0x0064</text>
    <text x="110" y="38" font-family="monospace" font-size="8" fill="#fff">P1</text>
    <text x="130" y="38" font-family="monospace" font-size="8" fill="#557a61">0x0258</text>
    <text x="165" y="38" font-family="monospace" font-size="8" fill="#fff">P2</text>
    <text x="230" y="38" font-family="monospace" font-size="8" fill="#557a61">0x03E8</text>
    <text x="252" y="38" font-family="monospace" font-size="7" fill="#fff">W</text>
    <text x="288" y="38" font-family="monospace" font-size="8" fill="#557a61">0x0514</text>
    <text x="320" y="38" font-family="monospace" font-size="8" fill="#557a61">0x06A4</text>
  </g>

  <g transform="translate(30, 186)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1b3a24">Memory Block States</text>

    <rect x="0" y="10" width="14" height="14" rx="2" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
    <text x="20" y="22" font-family="Arial, sans-serif" font-size="11" fill="#557a61">Free</text>

    <rect x="80" y="10" width="14" height="14" rx="2" fill="#2e7d32"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="11" fill="#557a61">Allocated</text>

    <rect x="180" y="10" width="14" height="14" rx="2" fill="#d32f2f"/>
    <text x="200" y="22" font-family="Arial, sans-serif" font-size="11" fill="#557a61">Fragmented</text>
  </g>

  <g transform="translate(30, 240)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1b3a24">Allocation Algorithms</text>

    <rect x="0" y="12" width="100" height="26" rx="4" fill="#4caf50" opacity="0.9"/>
    <text x="50" y="30" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#fff">FIRST FIT</text>

    <rect x="110" y="12" width="96" height="26" rx="4" fill="#009688" opacity="0.9"/>
    <text x="158" y="30" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#fff">BEST FIT</text>

    <rect x="216" y="12" width="100" height="26" rx="4" fill="#8d6e63" opacity="0.9"/>
    <text x="266" y="30" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#fff">WORST FIT</text>
  </g>

  <g transform="translate(30, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1b3a24">Key Metrics</text>

    <rect x="0" y="10" width="100" height="44" rx="4" fill="#fff" stroke="#e2ebd9" stroke-width="1"/>
    <text x="50" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#557a61">Utilization</text>
    <text x="50" y="46" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#2e7d32">47.1%</text>

    <rect x="110" y="10" width="100" height="44" rx="4" fill="#fff" stroke="#e2ebd9" stroke-width="1"/>
    <text x="160" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#557a61">Internal Frag</text>
    <text x="160" y="46" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#d32f2f">120 KB</text>

    <rect x="220" y="10" width="100" height="44" rx="4" fill="#fff" stroke="#e2ebd9" stroke-width="1"/>
    <text x="270" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#557a61">Free Space</text>
    <text x="270" y="46" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#557a61">860 KB</text>
  </g>
