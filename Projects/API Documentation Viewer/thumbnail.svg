<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080a11" />
      <stop offset="100%" stop-color="#0e1325" />
    </linearGradient>

    <!-- Accent / Indigo Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Emerald / GET Badge Gradient -->
    <linearGradient id="get-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Blue / POST Badge Gradient -->
    <linearGradient id="post-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Ambient Glow Orbs -->
  <circle cx="280" cy="40" r="50" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="40" cy="160" r="40" fill="#a855f7" opacity="0.08" filter="url(#glow)" />

  <!-- Layout: 3 Columns Grid Representation -->
  
  <!-- Column 1 (Left): Endpoint Tree Directory representation -->
  <g transform="translate(18, 30)">
    <rect width="76" height="116" rx="6" fill="rgba(255, 255, 255, 0.015)" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    
    <!-- Search Bar mock -->
    <rect x="6" y="6" width="64" height="10" rx="3" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.05)" stroke-width="0.75" />
    <circle cx="12" cy="11" r="2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.75" />
    
    <!-- Sidebar link 1 (GET) -->
    <g transform="translate(6, 24)">
      <rect width="20" height="9" rx="2" fill="url(#get-grad)" />
      <text x="10" y="7" font-family="'Inter', sans-serif" font-size="5.5" font-weight="800" fill="#fff" text-anchor="middle">GET</text>
      <line x1="25" y1="4.5" x2="64" y2="4.5" stroke="rgba(255,255,255,0.15)" stroke-width="2.5" stroke-linecap="round" />
    </g>
    
    <!-- Sidebar link 2 (POST - Active) -->
    <g transform="translate(6, 39)">
      <rect width="20" height="9" rx="2" fill="url(#post-grad)" filter="url(#glow)" />
      <text x="10" y="7" font-family="'Inter', sans-serif" font-size="5.5" font-weight="800" fill="#fff" text-anchor="middle">POST</text>
      <line x1="25" y1="4.5" x2="64" y2="4.5" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
      <path d="M-6, 4.5 L-2, 4.5" stroke="#6366f1" stroke-width="1.5" />
    </g>
    
    <!-- Sidebar link 3 (DELETE) -->
    <g transform="translate(6, 54)">
      <rect width="20" height="9" rx="2" fill="#ef4444" opacity="0.4" />
      <text x="10" y="7" font-family="'Inter', sans-serif" font-size="5.5" font-weight="800" fill="#fff" text-anchor="middle" opacity="0.6">DEL</text>
      <line x1="25" y1="4.5" x2="55" y2="4.5" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Column 2 (Middle): API Documentation View -->
  <g transform="translate(102, 30)">
    <rect width="108" height="116" rx="6" fill="rgba(255, 255, 255, 0.025)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    
    <!-- Path Header -->
    <rect x="8" y="8" width="22" height="9" rx="2" fill="url(#post-grad)" />
    <text x="19" y="14.5" font-family="'Inter', sans-serif" font-size="5" font-weight="800" fill="#fff" text-anchor="middle">POST</text>
    <text x="34" y="15.5" font-family="'SFMono-Regular', Consolas, monospace" font-size="6.5" font-weight="600" fill="#fff">/pets</text>
    
    <line x1="8" y1="24" x2="100" y2="24" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
    
    <!-- Parameters list representation -->
    <text x="8" y="34" font-family="'Outfit', sans-serif" font-size="7" font-weight="700" fill="#6366f1">Request Body</text>
    
    <!-- Parameter list node -->
    <g transform="translate(12, 42)">
      <rect x="0" y="2" width="4" height="4" rx="1" fill="#6366f1" />
      <text x="8" y="7" font-family="'SFMono-Regular', Consolas, monospace" font-size="6.5" font-weight="600" fill="#f8fafc">name</text>
      <text x="32" y="7" font-family="'Inter', sans-serif" font-size="5.5" font-style="italic" fill="#94a3b8">string</text>
      <text x="56" y="7" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#ef4444">*</text>
    </g>
    <g transform="translate(12, 53)">
      <rect x="0" y="2" width="4" height="4" rx="1" fill="#6366f1" />
      <text x="8" y="7" font-family="'SFMono-Regular', Consolas, monospace" font-size="6.5" font-weight="600" fill="#f8fafc">status</text>
      <text x="38" y="7" font-family="'Inter', sans-serif" font-size="5.5" font-style="italic" fill="#94a3b8">enum</text>
    </g>

    <!-- Response details -->
    <text x="8" y="76" font-family="'Outfit', sans-serif" font-size="7" font-weight="700" fill="#10b981">Responses</text>
    <rect x="8" y="83" width="16" height="8" rx="2" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.5" />
    <text x="16" y="89" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#10b981" text-anchor="middle">200</text>
    <line x1="28" y1="87" x2="100" y2="87" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Column 3 (Right): Try It Out Console sandbox representation -->
  <g transform="translate(218, 30)">
    <rect width="84" height="116" rx="6" fill="rgba(10, 12, 26, 0.8)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    
    <!-- Try it out header -->
    <circle cx="8" cy="8" r="2" fill="#ff5f56" />
    <circle cx="14" cy="8" r="2" fill="#ffbd2e" />
    <circle cx="20" cy="8" r="2" fill="#27c93f" />
    <rect x="58" y="5" width="20" height="6" rx="2" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.5" />
    <text x="68" y="9.5" font-family="'Inter', sans-serif" font-size="4" font-weight="700" fill="#10b981" text-anchor="middle">MOCK</text>
    
    <!-- Code Editor mock -->
    <rect x="6" y="18" width="72" height="42" rx="4" fill="#05060b" stroke="rgba(255,255,255,0.04)" stroke-width="0.75" />
    <!-- Curl input snippet representation -->
    <text x="12" y="27" font-family="'SFMono-Regular', Consolas, monospace" font-size="5" font-weight="500" fill="#f8fafc">$ curl -X POST</text>
    <text x="12" y="34" font-family="'SFMono-Regular', Consolas, monospace" font-size="5" font-weight="500" fill="#94a3b8">"http://api/pets"</text>
    <text x="12" y="41" font-family="'SFMono-Regular', Consolas, monospace" font-size="5" font-weight="500" fill="#94a3b8">-d '{"name":"fido"}'</text>

    <!-- Send Request Button Mock -->
    <rect x="6" y="66" width="72" height="12" rx="3" fill="url(#accent-grad)" filter="url(#glow)" />
    <text x="42" y="74.5" font-family="'Outfit', sans-serif" font-size="5.5" font-weight="700" fill="#ffffff" text-anchor="middle">Send Request</text>

    <!-- Mock Response Status code pill -->
    <rect x="6" y="85" width="72" height="25" rx="4" fill="#05060b" stroke="rgba(255,255,255,0.04)" stroke-width="0.75" />
    <rect x="12" y="89" width="30" height="7" rx="1.5" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.5" />
    <text x="27" y="94.5" font-family="'Inter', sans-serif" font-size="4.5" font-weight="800" fill="#10b981" text-anchor="middle">201 Created</text>
    <line x1="12" y1="102" x2="68" y2="102" stroke="rgba(16, 185, 129, 0.4)" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Title Logo / Brand Area -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', sans-serif" font-size="14.5" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="-0.2">
      API<tspan fill="#6366f1">Doc</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="0.2">
      Interactive OpenAPI Document Reader
    </text>
  </g>
</svg>
