<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for gradients, filters and markers -->
  <defs>
    <!-- Dark slate background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#151d30" />
    </linearGradient>

    <!-- Card glass gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c263f" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#141b2d" stop-opacity="0.8" />
    </linearGradient>

    <!-- Process gradients -->
    <linearGradient id="p1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ea2f1" />
      <stop offset="100%" stop-color="#0a59b3" />
    </linearGradient>
    
    <linearGradient id="p2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12d87e" />
      <stop offset="100%" stop-color="#087541" />
    </linearGradient>
    
    <linearGradient id="p3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a4dff" />
      <stop offset="100%" stop-color="#561f9d" />
    </linearGradient>

    <linearGradient id="csGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="100%" stop-color="#9d1f1f" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />

  <!-- Abstract Grid Network for Tech vibe -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="500" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="300" y1="0" x2="300" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="500" y1="0" x2="500" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="700" y1="0" x2="700" y2="500" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
  </g>

  <!-- Header Title -->
  <g transform="translate(40, 55)">
    <rect x="-8" y="-22" width="36" height="36" rx="8" fill="#1ea2f1" fill-opacity="0.15" />
    <!-- Cpu Microchip Icon representation -->
    <rect x="-1" y="-15" width="22" height="22" rx="4" fill="none" stroke="#1ea2f1" stroke-width="2.5" />
    <line x1="10" y1="-20" x2="10" y2="-15" stroke="#1ea2f1" stroke-width="2" />
    <line x1="10" y1="7" x2="10" y2="12" stroke="#1ea2f1" stroke-width="2" />
    <line x1="-6" y1="-4" x2="-1" y2="-4" stroke="#1ea2f1" stroke-width="2" />
    <line x1="21" y1="-4" x2="26" y2="-4" stroke="#1ea2f1" stroke-width="2" />
    
    <text x="45" y="7" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#ffffff" letter-spacing="0.5">SchedOS Pro</text>
    <text x="200" y="5" font-family="'Outfit', sans-serif" font-weight="500" font-size="13" fill="#1ea2f1" letter-spacing="1">PROCESS SCHEDULER SIMULATOR</text>
  </g>

  <!-- Central Visual Section: Timeline/Gantt Simulator Layout -->
  
  <!-- CPU Core Visual Card -->
  <g transform="translate(40, 110)" filter="url(#cardGlow)">
    <rect width="230" height="240" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="32" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" fill="#ffffff">Running CPU</text>
    
    <!-- Status badge -->
    <rect x="150" y="18" width="60" height="20" rx="4" fill="#12d87e" fill-opacity="0.2" />
    <text x="180" y="32" font-family="'Outfit', sans-serif" font-weight="700" font-size="9" fill="#12d87e" text-anchor="middle" letter-spacing="0.5">ACTIVE</text>
    
    <!-- Central executing node -->
    <circle cx="115" cy="125" r="45" fill="#0b101c" stroke="#1ea2f1" stroke-width="3" filter="url(#glow)" />
    <!-- Progress ring gap -->
    <circle cx="115" cy="125" r="45" fill="none" stroke="#1c263f" stroke-width="3" />
    <circle cx="115" cy="125" r="45" fill="none" stroke="#1ea2f1" stroke-dasharray="210, 70" stroke-width="3.5" transform="rotate(-90 115 125)" />
    
    <text x="115" y="122" font-family="'Outfit', sans-serif" font-weight="800" font-size="20" fill="#1ea2f1" text-anchor="middle">P1</text>
    <text x="115" y="140" font-family="'Fira Code', monospace" font-style="medium" font-size="10" fill="#a0aec0" text-anchor="middle">Rem: 4t</text>
    
    <!-- Running Telemetry values inside card -->
    <line x1="20" y1="195" x2="210" y2="195" stroke="#223052" stroke-width="1" />
    <text x="40" y="220" font-family="'Fira Code', monospace" font-size="10" fill="#a0aec0" text-anchor="middle">Burst</text>
    <text x="40" y="232" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">6 ticks</text>
    
    <text x="115" y="220" font-family="'Fira Code', monospace" font-size="10" fill="#a0aec0" text-anchor="middle">Priority</text>
    <text x="115" y="232" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">Lvl 2</text>

    <text x="190" y="220" font-family="'Fira Code', monospace" font-size="10" fill="#a0aec0" text-anchor="middle">State</text>
    <text x="190" y="232" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#12d87e" text-anchor="middle">Running</text>
  </g>

  <!-- Ready Queue Visual Card -->
  <g transform="translate(290, 110)" filter="url(#cardGlow)">
    <rect width="470" height="110" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="32" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" fill="#ffffff">Ready Queue (FIFO)</text>
    <rect x="415" y="18" width="30" height="20" rx="10" fill="#223052" />
    <text x="430" y="32" font-family="'Fira Code', monospace" font-weight="700" font-size="11" fill="#718096" text-anchor="middle">3</text>

    <!-- Queue lists -->
    <g transform="translate(24, 52)">
      <!-- Process card P2 -->
      <g>
        <rect width="115" height="42" rx="6" fill="#0b101c" stroke="#12d87e" stroke-width="1" />
        <rect width="3.5" height="42" rx="1.75" fill="#12d87e" />
        <text x="14" y="20" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff">P2</text>
        <text x="14" y="34" font-family="'Fira Code', monospace" font-size="9" fill="#718096">Burst: 5t</text>
        <rect x="75" y="12" width="32" height="18" rx="4" fill="#1c263f" />
        <text x="91" y="24" font-family="'Fira Code', monospace" font-size="9" fill="#12d87e" text-anchor="middle">Q0</text>
      </g>
      
      <!-- Process card P3 -->
      <g transform="translate(130, 0)">
        <rect width="115" height="42" rx="6" fill="#0b101c" stroke="#9a4dff" stroke-width="1" />
        <rect width="3.5" height="42" rx="1.75" fill="#9a4dff" />
        <text x="14" y="20" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff">P3</text>
        <text x="14" y="34" font-family="'Fira Code', monospace" font-size="9" fill="#718096">Burst: 3t</text>
        <rect x="75" y="12" width="32" height="18" rx="4" fill="#1c263f" />
        <text x="91" y="24" font-family="'Fira Code', monospace" font-size="9" fill="#9a4dff" text-anchor="middle">Q0</text>
      </g>

      <!-- Process card P4 -->
      <g transform="translate(260, 0)">
        <rect width="115" height="42" rx="6" fill="#0b101c" stroke="#ff8800" stroke-width="1" stroke-opacity="0.4" />
        <rect width="3.5" height="42" rx="1.75" fill="#ff8800" fill-opacity="0.5" />
        <text x="14" y="20" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff" fill-opacity="0.6">P4</text>
        <text x="14" y="34" font-family="'Fira Code', monospace" font-size="9" fill="#718096" fill-opacity="0.6">Burst: 2t</text>
        <rect x="75" y="12" width="32" height="18" rx="4" fill="#1c263f" fill-opacity="0.5" />
        <text x="91" y="24" font-family="'Fira Code', monospace" font-size="9" fill="#ff8800" text-anchor="middle" fill-opacity="0.6">Q0</text>
      </g>
    </g>
  </g>

  <!-- Blocked I/O Queue Visual Card -->
  <g transform="translate(290, 240)" filter="url(#cardGlow)">
    <rect width="470" height="110" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="32" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" fill="#ffffff">Blocked Queue (I/O Wait)</text>
    <rect x="415" y="18" width="30" height="20" rx="10" fill="#223052" />
    <text x="430" y="32" font-family="'Fira Code', monospace" font-weight="700" font-size="11" fill="#718096" text-anchor="middle">1</text>

    <!-- Blocked List -->
    <g transform="translate(24, 52)">
      <!-- Process card Blocked P5 -->
      <g>
        <rect width="210" height="42" rx="6" fill="#0b101c" stroke="#ff8800" stroke-width="1" />
        <rect width="3.5" height="42" rx="1.75" fill="#ff8800" />
        <text x="14" y="20" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#ffffff">P5 <tspan font-weight="400" font-size="10" fill="#718096">waiting disk read</tspan></text>
        <text x="14" y="34" font-family="'Fira Code', monospace" font-size="9" fill="#ff8800">I/O remaining: 2 ticks</text>
        
        <!-- Timer symbol icon -->
        <circle cx="185" cy="21" r="7" fill="none" stroke="#718096" stroke-width="1.5" />
        <polyline points="185,17 185,21 189,21" fill="none" stroke="#718096" stroke-width="1.5" />
      </g>
    </g>
  </g>

  <!-- Gantt Chart Timeline representation -->
  <g transform="translate(40, 370)" filter="url(#cardGlow)">
    <rect width="720" height="100" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="28" font-family="'Outfit', sans-serif" font-weight="600" font-size="13" fill="#ffffff">Simulation Timeline (Gantt Chart)</text>
    
    <!-- Legend items -->
    <g transform="translate(450, 18)">
      <!-- executing -->
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#1ea2f1" />
      <text x="14" y="8" font-family="'Outfit', sans-serif" font-size="10" fill="#a0aec0">Executing</text>
      <!-- CS -->
      <rect x="80" y="0" width="8" height="8" rx="2" fill="#ff4d4d" />
      <text x="94" y="8" font-family="'Outfit', sans-serif" font-size="10" fill="#a0aec0">Context Switch</text>
      <!-- Idle -->
      <rect x="180" y="0" width="8" height="8" rx="2" fill="#223052" />
      <text x="194" y="8" font-family="'Outfit', sans-serif" font-size="10" fill="#a0aec0">Idle</text>
    </g>

    <!-- Gantt Block components -->
    <g transform="translate(24, 42)">
      <!-- Ruler top ticks line -->
      <line x1="0" y1="0" x2="672" y2="0" stroke="#223052" stroke-width="1" />
      
      <!-- P1 block -->
      <g transform="translate(0, 8)">
        <rect width="130" height="30" rx="4" fill="url(#p1Grad)" />
        <text x="65" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">P1</text>
        <!-- Bottom tick numbers -->
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="start">0</text>
      </g>

      <!-- Context switch block -->
      <g transform="translate(130, 8)">
        <rect width="35" height="30" rx="4" fill="url(#csGrad)" />
        <text x="17.5" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="9" fill="#ffffff" text-anchor="middle">CS</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">5</text>
      </g>

      <!-- P2 block -->
      <g transform="translate(165, 8)">
        <rect width="110" height="30" rx="4" fill="url(#p2Grad)" />
        <text x="55" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">P2</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">6</text>
      </g>

      <!-- Idle block -->
      <g transform="translate(275, 8)">
        <rect width="50" height="30" rx="4" fill="#0b101c" stroke="#223052" stroke-width="1" />
        <text x="25" y="19" font-family="'Outfit', sans-serif" font-weight="500" font-size="10" fill="#718096" text-anchor="middle">IDLE</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">10</text>
      </g>

      <!-- P3 block -->
      <g transform="translate(325, 8)">
        <rect width="90" height="30" rx="4" fill="url(#p3Grad)" />
        <text x="45" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">P3</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">12</text>
      </g>

      <!-- Context switch block 2 -->
      <g transform="translate(415, 8)">
        <rect width="35" height="30" rx="4" fill="url(#csGrad)" />
        <text x="17.5" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="9" fill="#ffffff" text-anchor="middle">CS</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">16</text>
      </g>

      <!-- P1 resumes block -->
      <g transform="translate(450, 8)">
        <rect width="180" height="30" rx="4" fill="url(#p1Grad)" />
        <text x="90" y="19" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle">P1 (Resumed)</text>
        <text x="0" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="middle">17</text>
        <!-- Last end tick number -->
        <text x="180" y="42" font-family="'Fira Code', monospace" font-size="9" fill="#718096" text-anchor="end">24</text>
      </g>
    </g>
  </g>
</svg>
