<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Output — NSOC'26</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div style="font-size: 24px; font-weight: 600;">🧩 Guess Output</div>
            <div class="badge">Score: <span id="score">0</span></div>
        </div>

        <div class="badge" id="category" style="margin-bottom: 15px; display: inline-block;">Topic</div>

        <pre id="codeSnippet"></pre>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type the output here..." autocomplete="off">
            <button id="submitBtn">Check</button>
        </div>

        <div id="feedbackBox" class="feedback">
            <div id="statusText" style="font-weight: bold;">Correct!</div>
            <div id="explanationText" class="explanation"></div>
            <button id="nextBtn" style="margin-top: 15px; background: transparent; color: white; border: 1px solid white; height: 36px; padding: 0 15px;">Next Challenge</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
