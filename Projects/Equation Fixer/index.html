<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equation Fixer — Chameleon Math</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div id="game-overlay" class="overlay">
                <h1>Equation Fixer</h1>
                <p style="margin-bottom: 30px; opacity: 0.8;">Swap any two tokens to make the equation true.</p>
                <button class="btn-main" onclick="startGame()">Start Puzzle</button>
            </div>

            <div class="stats">
                <span>Level: <span id="level-val">1</span></span>
                <span>Score: <span id="score-val">0</span></span>
            </div>

            <div class="instruction">The equation below is false!</div>
            
            <div class="equation-row" id="eq-row">
                <!-- Tokens injected here -->
            </div>

            <p id="feedback" style="font-weight: 600; height: 24px;"></p>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
