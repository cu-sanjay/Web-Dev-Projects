<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#05070c"/>
  <rect x="10" y="10" width="300" height="180" rx="8" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- topbar -->
  <rect x="14" y="14" width="292" height="26" rx="6" fill="rgba(5,7,12,0.85)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="22" y="32" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#e2e8f0">Flashcard</text>
  <text x="68" y="32" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">Study Deck</text>
  <rect x="200" y="18" width="50" height="18" rx="4" fill="#00f0ff"/>
  <text x="225" y="31" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#05070c" text-anchor="middle">+ Add</text>
  <rect x="254" y="18" width="44" height="18" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="276" y="31" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">Reset</text>
  <!-- progress bar -->
  <rect x="14" y="44" width="292" height="3" rx="2" fill="rgba(255,255,255,0.04)"/>
  <rect x="14" y="44" width="146" height="3" rx="2" fill="#00f0ff"/>
  <!-- stats -->
  <text x="120" y="56" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">2 / 4</text>
  <text x="170" y="56" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">50%</text>
  <text x="215" y="56" font-family="system-ui, sans-serif" font-size="5" fill="#64748b" text-anchor="middle">4 cards</text>
  <!-- card 3d viewport -->
  <rect x="60" y="66" width="200" height="96" rx="12" fill="rgba(30,41,59,0.4)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="160" y="84" font-family="system-ui, sans-serif" font-size="4" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">QUESTION</text>
  <text x="160" y="104" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#e2e8f0" text-anchor="middle">What does CSS</text>
  <text x="160" y="116" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#e2e8f0" text-anchor="middle">stand for?</text>
  <!-- mini flip arrow -->
  <path d="M 160 128 L 155 134 L 165 134 Z" fill="#00f0ff" opacity="0.4"/>
  <!-- backface hint -->
  <rect x="60" y="66" width="200" height="96" rx="12" fill="rgba(30,41,59,0.2)" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <text x="160" y="104" font-family="system-ui, sans-serif" font-size="6" fill="#64748b" text-anchor="middle" opacity="0.3">Cascading Style Sheets</text>
  <!-- controls -->
  <rect x="74" y="170" width="56" height="18" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="183" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#64748b" text-anchor="middle">Prev</text>
  <rect x="138" y="170" width="44" height="18" rx="5" fill="rgba(0,240,255,0.06)" stroke="rgba(0,240,255,0.12)" stroke-width="1"/>
  <text x="160" y="183" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#00f0ff" text-anchor="middle">Flip</text>
  <rect x="190" y="170" width="56" height="18" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="218" y="183" font-family="system-ui, sans-serif" font-size="5" font-weight="600" fill="#64748b" text-anchor="middle">Next</text>
</svg>
