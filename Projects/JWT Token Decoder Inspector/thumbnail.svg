<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f" />
      <stop offset="100%" stop-color="#0a0b18" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />

  <!-- Background decorative glows -->
  <circle cx="50" cy="50" r="50" fill="#ef4444" opacity="0.08" filter="url(#glow)" />
  <circle cx="270" cy="150" r="60" fill="#3b82f6" opacity="0.1" filter="url(#glow)" />

  <!-- Graphic 1: Decoded split card Header vs Payload -->
  <g transform="translate(25, 22)">
    <!-- Header Block (Red) -->
    <g transform="translate(0, 0)">
      <rect width="125" height="66" rx="8" fill="rgba(15, 17, 38, 0.7)" stroke="rgba(239, 68, 68, 0.25)" stroke-width="1" filter="url(#glow)" />
      <circle cx="12" cy="12" r="3" fill="#ef4444" />
      <text x="22" y="15" fill="#ef4444" font-family="'Outfit', sans-serif" font-weight="700" font-size="7.5">HEADER: METADATA</text>
      <!-- Mock JSON -->
      <text x="12" y="32" fill="#a78bfa" font-family="monospace" font-size="7">"alg"</text>
      <text x="36" y="32" fill="#f3f4f6" font-family="monospace" font-size="7">:</text>
      <text x="42" y="32" fill="#34d399" font-family="monospace" font-size="7">"HS256"</text>
      <text x="12" y="44" fill="#a78bfa" font-family="monospace" font-size="7">"typ"</text>
      <text x="36" y="44" fill="#f3f4f6" font-family="monospace" font-size="7">:</text>
      <text x="42" y="44" fill="#34d399" font-family="monospace" font-size="7">"JWT"</text>
    </g>

    <!-- Payload Block (Blue) -->
    <g transform="translate(0, 78)">
      <rect width="125" height="78" rx="8" fill="rgba(15, 17, 38, 0.7)" stroke="rgba(59, 130, 246, 0.25)" stroke-width="1" filter="url(#glow)" />
      <circle cx="12" cy="12" r="3" fill="#3b82f6" />
      <text x="22" y="15" fill="#3b82f6" font-family="'Outfit', sans-serif" font-weight="700" font-size="7.5">PAYLOAD: CLAIMS</text>
      <!-- Mock JSON -->
      <text x="12" y="32" fill="#a78bfa" font-family="monospace" font-size="7">"sub"</text>
      <text x="36" y="32" fill="#f3f4f6" font-family="monospace" font-size="7">:</text>
      <text x="42" y="32" fill="#34d399" font-family="monospace" font-size="7">"dev-sujal"</text>
      <text x="12" y="44" fill="#a78bfa" font-family="monospace" font-size="7">"name"</text>
      <text x="36" y="44" fill="#f3f4f6" font-family="monospace" font-size="7">:</text>
      <text x="42" y="44" fill="#34d399" font-family="monospace" font-size="7">"Sujal K"</text>
      <text x="12" y="56" fill="#a78bfa" font-family="monospace" font-size="7">"exp"</text>
      <text x="36" y="56" fill="#f3f4f6" font-family="monospace" font-size="7">:</text>
      <text x="42" y="56" fill="#f59e0b" font-family="monospace" font-size="7">1783822</text>
    </g>
  </g>

  <!-- Graphic 2: Claims Timeline (Right Top) -->
  <g transform="translate(166, 22)">
    <rect width="128" height="66" rx="8" fill="rgba(15, 17, 38, 0.5)" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <text x="10" y="14" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="7.5" font-weight="700">TIMELINE INSPECT</text>
    
    <!-- Timeline node 1 (Issued At) -->
    <g transform="translate(10, 24)">
      <circle cx="4" cy="8" r="3" fill="#0d9488" />
      <line x1="4" y1="11" x2="4" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="2" />
      <text x="12" y="7" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="7" font-weight="600">Issued At (iat)</text>
      <text x="12" y="15" fill="#f3f4f6" font-family="monospace" font-size="6.5">Jun 15, 03:00</text>
    </g>

    <!-- Timeline node 2 (Expiration) -->
    <g transform="translate(10, 46)">
      <circle cx="4" cy="8" r="3" fill="#ef4444" />
      <text x="12" y="7" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="7" font-weight="600">Expiration (exp)</text>
      <text x="12" y="15" fill="#f3f4f6" font-family="monospace" font-size="6.5">Jun 15, 05:00</text>
    </g>
  </g>

  <!-- Graphic 3: Signature Status (Right Bottom) -->
  <g transform="translate(166, 100)">
    <rect width="128" height="56" rx="8" fill="rgba(15, 17, 38, 0.5)" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    <text x="10" y="14" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="7.5" font-weight="700">HS256 CRYPTO KEY</text>
    
    <!-- Verify Badge -->
    <g transform="translate(10, 24)">
      <rect width="108" height="22" rx="4" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.25)" stroke-width="1" />
      <circle cx="12" cy="11" r="4" fill="#10b981" />
      <!-- checkmark -->
      <path d="M10 11 L11.5 12.5 L14 9.5" stroke="#ffffff" stroke-width="1.2" fill="none" />
      <text x="22" y="14" fill="#10b981" font-family="'Outfit', sans-serif" font-size="7.5" font-weight="800">Signature Verified</text>
    </g>
  </g>
</svg>
