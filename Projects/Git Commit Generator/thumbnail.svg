<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080916" />
      <stop offset="100%" stop-color="#0f1225" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Emerald / Feat Gradient -->
    <linearGradient id="feat-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Danger / Fix Gradient -->
    <linearGradient id="fix-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />

  <!-- Background Decorative Glowing Orbs -->
  <circle cx="270" cy="50" r="55" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="150" r="45" fill="#ec4899" opacity="0.08" filter="url(#glow)" />

  <!-- Simulated Git History Timeline (Left Side) -->
  <g transform="translate(30, 25)">
    <!-- Branch Line -->
    <line x1="15" y1="10" x2="15" y2="120" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />
    
    <!-- Commit Node 1 (docs) -->
    <circle cx="15" cy="25" r="5" fill="#3b82f6" stroke="#080916" stroke-width="2" filter="url(#glow)" />
    <line x1="25" y1="25" x2="65" y2="25" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1.5" stroke-dasharray="2 2" />
    
    <!-- Commit Node 2 (fix) -->
    <circle cx="15" cy="55" r="6" fill="url(#fix-grad)" stroke="#080916" stroke-width="2.5" filter="url(#glow)" />
    <line x1="25" y1="55" x2="65" y2="55" stroke="rgba(239, 68, 68, 0.2)" stroke-width="1.5" stroke-dasharray="2 2" />

    <!-- Commit Node 3 (feat - Active) -->
    <circle cx="15" cy="95" r="8" fill="url(#feat-grad)" stroke="#080916" stroke-width="3" filter="url(#glow)" />
    <!-- Connector to the preview card -->
    <path d="M27,95 L95,95" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" />
  </g>

  <!-- Commit Code Preview Card (Right Side) -->
  <g transform="translate(100, 32)">
    <!-- Card Frame -->
    <rect x="0" y="0" width="185" height="110" rx="8" fill="rgba(10, 12, 26, 0.75)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    
    <!-- Code Editor Topbar dots -->
    <circle cx="12" cy="12" r="3" fill="#ff5f56" />
    <circle cx="22" cy="12" r="3" fill="#ffbd2e" />
    <circle cx="32" cy="12" r="3" fill="#27c93f" />
    <rect x="135" y="8" width="38" height="9" rx="2.5" fill="rgba(255,255,255,0.05)" />
    
    <!-- Clipboard Copy Icon Inside Topbar -->
    <path d="M140,11 L142,11 M142,10 L145,10 L145,13 L142,13 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.75" />

    <!-- Commit Message Syntax Rendered -->
    <!-- Type & Scope Badge -->
    <rect x="15" y="32" width="54" height="13" rx="3" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.75" />
    <text x="42" y="41" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700" fill="#10b981" text-anchor="middle">feat(ui)</text>
    
    <!-- Subject line -->
    <text x="75" y="41" font-family="'SFMono-Regular', Consolas, monospace" font-size="8" font-weight="500" fill="#f8fafc">
      : add dark theme
    </text>

    <!-- Body Text Lines Mock -->
    <line x1="15" y1="58" x2="165" y2="58" stroke="rgba(148, 163, 184, 0.4)" stroke-width="2.5" stroke-linecap="round" />
    <line x1="15" y1="68" x2="140" y2="68" stroke="rgba(148, 163, 184, 0.4)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Footer / Issues Trackers Mock -->
    <rect x="15" y="82" width="45" height="11" rx="2.5" fill="rgba(99, 102, 241, 0.08)" stroke="rgba(99, 102, 241, 0.15)" stroke-width="0.75" />
    <text x="37.5" y="90.5" font-family="'Inter', sans-serif" font-size="6.5" font-weight="600" fill="#6366f1" text-anchor="middle">Closes #14</text>
  </g>

  <!-- Title Logo Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', sans-serif" font-size="14.5" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="-0.2">
      Git<tspan fill="#6366f1">Commit</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="0.2">
      Conventional Commits Generator
    </text>
  </g>
</svg>
