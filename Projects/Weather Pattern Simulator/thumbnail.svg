<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark main background -->
  <rect width="400" height="400" fill="#06080e" rx="12"/>

  <!-- Background grid lines -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.04">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
  </g>

  <!-- Gradients -->
  <defs>
    <radialGradient id="low-p-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b380ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightning-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Simulated Grid Cells (underlay heatmap pattern) -->
  <g opacity="0.35">
    <!-- Row 1 -->
    <rect x="80" y="80" width="40" height="40" fill="#3b82f6"/>
    <rect x="120" y="80" width="40" height="40" fill="#60a5fa"/>
    <rect x="160" y="80" width="40" height="40" fill="#93c5fd"/>
    <rect x="200" y="80" width="40" height="40" fill="#fca5a5"/>
    <rect x="240" y="80" width="40" height="40" fill="#f87171"/>
    <rect x="280" y="80" width="40" height="40" fill="#ef4444"/>

    <!-- Row 2 -->
    <rect x="80" y="120" width="40" height="40" fill="#2563eb"/>
    <rect x="120" y="120" width="40" height="40" fill="#3b82f6"/>
    <rect x="160" y="120" width="40" height="40" fill="#cbd5e1"/>
    <rect x="200" y="120" width="40" height="40" fill="#fef08a"/>
    <rect x="240" y="120" width="40" height="40" fill="#f97316"/>
    <rect x="280" y="120" width="40" height="40" fill="#ef4444"/>

    <!-- Row 3 -->
    <rect x="80" y="160" width="40" height="40" fill="#1d4ed8"/>
    <rect x="120" y="160" width="40" height="40" fill="#1e3a8a"/>
    <rect x="160" y="160" width="40" height="40" fill="#334155"/>
    <rect x="200" y="160" width="40" height="40" fill="#78350f"/>
    <rect x="240" y="160" width="40" height="40" fill="#f59e0b"/>
    <rect x="280" y="160" width="40" height="40" fill="#f97316"/>
    
    <!-- Row 4 -->
    <rect x="80" y="200" width="40" height="40" fill="#1e3b8b"/>
    <rect x="120" y="200" width="40" height="40" fill="#0f172a"/>
    <rect x="160" y="200" width="40" height="40" fill="#06b6d4"/>
    <rect x="200" y="200" width="40" height="40" fill="#0891b2"/>
    <rect x="240" y="200" width="40" height="40" fill="#b45309"/>
    <rect x="280" y="200" width="40" height="40" fill="#d97706"/>

    <!-- Row 5 -->
    <rect x="80" y="240" width="40" height="40" fill="#020617"/>
    <rect x="120" y="240" width="40" height="40" fill="#06b6d4"/>
    <rect x="160" y="240" width="40" height="40" fill="#22d3ee"/>
    <rect x="200" y="240" width="40" height="40" fill="#06b6d4"/>
    <rect x="240" y="240" width="40" height="40" fill="#b45309"/>
    <rect x="280" y="240" width="40" height="40" fill="#d97706"/>
  </g>

  <!-- Coastal division dash line -->
  <line x1="160" y1="80" x2="160" y2="280" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Low Pressure eye glow -->
  <circle cx="180" cy="180" r="65" fill="url(#low-p-glow)"/>

  <!-- Swirling Wind Vectors (Coriolis vortex lines) -->
  <g stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round">
    <!-- Spiral Arm 1 -->
    <path d="M 180 180 A 15 15 0 0 1 175 160 A 30 30 0 0 1 200 145 A 50 50 0 0 1 225 185 A 70 70 0 0 1 170 235 A 90 90 0 0 1 100 190"/>
    <!-- Spiral Arm 2 -->
    <path d="M 180 180 A 15 15 0 0 0 185 200 A 30 30 0 0 0 160 215 A 50 50 0 0 0 135 175 A 70 70 0 0 0 190 125 A 90 90 0 0 0 260 170"/>
  </g>

  <!-- Swirl wind vector arrowheads -->
  <path d="M 100 190 L 102 195 L 96 193 Z" fill="#00e5ff"/>
  <path d="M 260 170 L 258 165 L 264 167 Z" fill="#00e5ff"/>

  <!-- Selected cell glowing highlight cursor -->
  <rect x="200" y="160" width="40" height="40" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.9"/>
  <circle cx="200" cy="160" r="3" fill="#00e5ff"/>

  <!-- Sun overlay (Top Left) -->
  <circle cx="70" cy="70" r="25" fill="url(#sun-glow)"/>

  <!-- Lightning discharge (Top Right) -->
  <path d="M 330 60 L 305 105 L 325 105 L 295 150" fill="none" stroke="url(#lightning-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Rain Drops -->
  <line x1="280" y1="160" x2="275" y2="175" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
  <line x1="290" y1="170" x2="285" y2="185" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
  <line x1="305" y1="155" x2="300" y2="170" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>

  <!-- Snow Flakes -->
  <circle cx="95" cy="115" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="115" cy="105" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="102" cy="130" r="1.8" fill="#ffffff" opacity="0.8"/>

  <!-- Radar sweep overlay dial -->
  <circle cx="180" cy="180" r="115" fill="none" stroke="rgba(0, 229, 255, 0.08)" stroke-width="1.2"/>
  <circle cx="180" cy="180" r="130" fill="none" stroke="rgba(0, 229, 255, 0.04)" stroke-width="0.8"/>

  <!-- Labels -->
  <text x="200" y="380" font-family="'Fira Code', monospace" font-size="11" fill="#00e5ff" font-weight="700" letter-spacing="2" text-anchor="middle">WEATHER PATTERN</text>
  <text x="200" y="393" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" letter-spacing="1.2" text-anchor="middle">ATMOSPHERIC SIMULATOR</text>
  
  <!-- Outer glass border HUD frame -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" rx="8"/>
</svg>
