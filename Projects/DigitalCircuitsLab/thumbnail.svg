<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0b1329" />
    </linearGradient>

    <!-- Wire Glow Gradients -->
    <linearGradient id="wire-active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="1" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="1" />
    </linearGradient>

    <!-- Gate Body Gradient -->
    <linearGradient id="gate-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-grad)" />

  <!-- Grid overlay -->
  <g opacity="0.04">
    <path d="M0,40 H800 M0,80 H800 M0,120 H800 M0,160 H800 M0,200 H800 M0,240 H800 M0,280 H800 M0,320 H800 M0,360 H800 M0,400 H800 M0,440 H800 M0,480 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M40,0 V500 M80,0 V500 M120,0 V500 M160,0 V500 M200,0 V500 M240,0 V500 M280,0 V500 M320,0 V500 M360,0 V500 M400,0 V500 M440,0 V500 M480,0 V500 M520,0 V500 M560,0 V500 M600,0 V500 M640,0 V500 M680,0 V500 M720,0 V500 M760,0 V500" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title typography -->
  <text x="50" y="75" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="800" fill="#f8fafc" letter-spacing="1">Digital Circuits Lab</text>
  <text x="50" y="110" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#00f2fe" letter-spacing="2">LOGIC SIMULATOR & EDUCATION HUB</text>

  <!-- Schematic Illustration -->
  <g transform="translate(150, 100)">
    <!-- Active Wire Line (Cyan Glow) -->
    <path d="M 100,240 L 260,240" fill="none" stroke="url(#wire-active)" stroke-width="5" filter="drop-shadow(0 0 8px #00f2fe)" stroke-linecap="round" />
    
    <!-- Inactive Wire Line (Grey) -->
    <path d="M 100,160 L 260,160" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    
    <!-- Output Wire Line -->
    <path d="M 370,200 L 460,200" fill="none" stroke="url(#wire-active)" stroke-width="5" filter="drop-shadow(0 0 8px #00f2fe)" stroke-linecap="round" />

    <!-- Input Switch 1 (Active High) -->
    <g transform="translate(60, 220)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#1e293b" stroke="#00f2fe" stroke-width="2" />
      <circle cx="20" cy="20" r="8" fill="#00f2fe" />
    </g>

    <!-- Input Switch 2 (Active Low) -->
    <g transform="translate(60, 140)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
      <circle cx="20" cy="20" r="8" fill="#475569" />
    </g>

    <!-- AND Logic Gate (Standard shapes outline) -->
    <g transform="translate(260, 150)">
      <!-- Gate Body -->
      <path d="M 10,10 H 50 C 90,10 100,20 100,50 C 100,80 90,90 50,90 H 10 Z" fill="url(#gate-grad)" stroke="#475569" stroke-width="2" />
      <text x="50" y="58" font-family="'Outfit', sans-serif" font-size="24" font-weight="700" fill="#f8fafc" text-anchor="middle">AND</text>
      <!-- Connection Terminals -->
      <circle cx="10" cy="10" r="4" fill="#475569" />
      <circle cx="10" cy="90" r="4" fill="#00f2fe" />
      <circle cx="100" cy="50" r="4" fill="#00f2fe" />
    </g>

    <!-- Output LED Light Bulb -->
    <g transform="translate(460, 180)">
      <circle cx="20" cy="20" r="24" fill="#00f2fe" fill-opacity="0.1" stroke="#00f2fe" stroke-width="2" />
      <circle cx="20" cy="20" r="14" fill="#00f2fe" filter="drop-shadow(0 0 10px #00f2fe)" />
    </g>
  </g>
</svg>
