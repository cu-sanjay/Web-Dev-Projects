<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Definitions of gradients and shadows -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b11" />
      <stop offset="50%" stop-color="#0e1320" />
      <stop offset="100%" stop-color="#06080d" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-grad)" />

  <!-- Background Grid lines for tech vibe -->
  <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250 M 0,300 L 600,300 M 0,350 L 600,350" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400 M 400,0 L 400,400 M 450,0 L 450,400 M 500,0 L 500,400 M 550,0 L 550,400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />

  <!-- Node Networks / Constellations in background -->
  <circle cx="80" cy="80" r="3" fill="#4facfe" opacity="0.3" />
  <circle cx="520" cy="100" r="2" fill="#00FF87" opacity="0.4" />
  <circle cx="480" cy="320" r="4" fill="#4facfe" opacity="0.2" />
  <circle cx="120" cy="300" r="3" fill="#00f2fe" opacity="0.3" />
  <line x1="80" y1="80" x2="120" y2="300" stroke="rgba(79, 172, 254, 0.1)" stroke-width="1" />

  <!-- Connection Links between blocks -->
  <line x1="175" y1="200" x2="275" y2="200" stroke="url(#accent-grad)" stroke-width="3" stroke-dasharray="6,4" filter="url(#glow)" />
  <line x1="375" y1="200" x2="475" y2="200" stroke="url(#accent-grad)" stroke-width="3" stroke-dasharray="6,4" filter="url(#glow)" />

  <!-- Block 0 (Genesis Block) -->
  <rect x="75" y="140" width="100" height="120" rx="12" fill="#121826" stroke="#00FF87" stroke-width="2" filter="url(#glow)" />
  <text x="125" y="170" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">GENESIS</text>
  <text x="125" y="195" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">Index: 0</text>
  <text x="125" y="215" fill="#9ca3af" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">Nonce: 82</text>
  <rect x="90" y="230" width="70" height="15" rx="3" fill="rgba(0, 255, 135, 0.1)" stroke="rgba(0, 255, 135, 0.2)" stroke-width="1" />
  <text x="125" y="241" fill="#00FF87" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">SECURE</text>

  <!-- Block 1 -->
  <rect x="250" y="140" width="100" height="120" rx="12" fill="#121826" stroke="#00FF87" stroke-width="2" filter="url(#glow)" />
  <text x="300" y="170" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">BLOCK #1</text>
  <text x="300" y="195" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">Index: 1</text>
  <text x="300" y="215" fill="#9ca3af" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">Nonce: 194</text>
  <rect x="265" y="230" width="70" height="15" rx="3" fill="rgba(0, 255, 135, 0.1)" stroke="rgba(0, 255, 135, 0.2)" stroke-width="1" />
  <text x="300" y="241" fill="#00FF87" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">SECURE</text>

  <!-- Block 2 -->
  <rect x="425" y="140" width="100" height="120" rx="12" fill="#121826" stroke="#00FF87" stroke-width="2" filter="url(#glow)" />
  <text x="475" y="170" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">BLOCK #2</text>
  <text x="475" y="195" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle">Index: 2</text>
  <text x="475" y="215" fill="#9ca3af" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">Nonce: 241</text>
  <rect x="440" y="230" width="70" height="15" rx="3" fill="rgba(0, 255, 135, 0.1)" stroke="rgba(0, 255, 135, 0.2)" stroke-width="1" />
  <text x="475" y="241" fill="#00FF87" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">SECURE</text>

  <!-- Title Text -->
  <text x="300" y="70" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="-0.5">BLOC<tspan fill="url(#primary-grad)">KRAFT</tspan></text>
  <text x="300" y="95" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="1">BLOCKCHAIN EXPLORER SIMULATOR</text>
  
  <!-- Interactive Dashboard Deco elements -->
  <path d="M 180,310 L 230,310" stroke="url(#primary-grad)" stroke-width="2" />
  <circle cx="180" cy="310" r="3" fill="#4facfe" />
  <text x="240" y="314" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="10">P2P Network Synced</text>

  <path d="M 420,310 L 370,310" stroke="url(#primary-grad)" stroke-width="2" />
  <circle cx="420" cy="310" r="3" fill="#4facfe" />
  <text x="360" y="314" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">Difficulty: 00...</text>
</svg>
