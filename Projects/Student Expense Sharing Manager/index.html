<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Expense Sharing Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>💸 SplitEasy</h1>
      <p>Track group expenses and see who owes what.</p>
    </header>

    <main class="main-content">
      <div class="left-col">
        
        <!-- Members Section -->
        <section class="card members-section">
          <h2>1. Group Members</h2>
          <div class="input-row">
            <input type="text" id="member-input" placeholder="Enter friend's name...">
            <button id="add-member-btn" class="btn primary-btn">+</button>
          </div>
          <div id="members-list" class="members-chips">
            <!-- Chips rendered here -->
          </div>
        </section>

        <!-- Expense Section -->
        <section class="card expense-section">
          <h2>2. Add an Expense</h2>
          <form id="expense-form">
            <div class="form-group">
              <label for="expense-desc">Description</label>
              <input type="text" id="expense-desc" required placeholder="e.g. Dinner at Joe's">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="expense-amount">Amount ($)</label>
                <input type="number" id="expense-amount" min="1" step="0.01" required placeholder="0.00">
              </div>
              <div class="form-group">
                <label for="expense-payer">Who Paid?</label>
                <select id="expense-payer" required>
                  <option value="" disabled selected>Select payer</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn success-btn" id="submit-expense-btn" disabled>Split Bill Evenly</button>
          </form>
        </section>

      </div>

      <div class="right-col">
        
        <!-- Balances Section -->
        <section class="card balances-section">
          <h2>Balances</h2>
          <div id="balances-list" class="balances-list">
            <div class="empty-state">Add members and expenses to see balances.</div>
          </div>
        </section>

        <!-- History Section -->
        <section class="card history-section">
          <h2>Recent Activity</h2>
          <div id="history-list" class="history-list">
            <div class="empty-state">No expenses logged yet.</div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
