<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Definitions of gradients and filters -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090e" />
      <stop offset="50%" stop-color="#121827" />
      <stop offset="100%" stop-color="#06080d" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="warn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-grad)" />

  <!-- Background Grid lines for tech vibe -->
  <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250 M 0,300 L 600,300 M 0,350 L 600,350" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400 M 400,0 L 400,400 M 450,0 L 450,400 M 500,0 L 500,400 M 550,0 L 550,400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />

  <!-- Title Text -->
  <text x="300" y="75" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="-0.5">DB<tspan fill="url(#primary-grad)">KRAFT</tspan></text>
  <text x="300" y="100" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="1">QUERY EXECUTION PLANNER</text>

  <!-- Left Column: Database Tables & Schema Mockup -->
  <g transform="translate(60, 130)">
    <!-- Table Grid container -->
    <rect width="200" height="190" rx="8" fill="rgba(10, 14, 23, 0.9)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Table Header -->
    <rect width="200" height="25" rx="8" fill="rgba(20, 27, 45, 0.9)" />
    <text x="15" y="17" fill="#c7d2fe" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold">TABLE: users</text>
    
    <!-- Grid Rows -->
    <!-- Row 1 (Header row labels) -->
    <rect x="5" y="30" width="190" height="20" fill="rgba(255,255,255,0.03)" />
    <text x="12" y="43" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">id</text>
    <text x="60" y="43" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">name</text>
    <text x="120" y="43" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">age</text>
    <text x="160" y="43" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">country</text>

    <!-- Row 2 -->
    <rect x="5" y="55" width="190" height="20" fill="rgba(255,255,255,0.01)" />
    <text x="12" y="68" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">1</text>
    <text x="60" y="68" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Alice</text>
    <text x="120" y="68" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">28</text>
    <text x="160" y="68" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">USA</text>

    <!-- Row 3 (FLASHING / SCANNED row mockup in yellow/amber) -->
    <rect x="5" y="80" width="190" height="20" fill="rgba(245, 158, 11, 0.2)" stroke="#f59e0b" stroke-width="1" />
    <text x="12" y="93" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="bold">2</text>
    <text x="60" y="93" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="bold">Bob</text>
    <text x="120" y="93" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="bold">34</text>
    <text x="160" y="93" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="bold">UK</text>

    <!-- Row 4 (MATCHED row mockup in green) -->
    <rect x="5" y="105" width="190" height="20" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="1" />
    <text x="12" y="118" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">3</text>
    <text x="60" y="118" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Charlie</text>
    <text x="120" y="118" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">22</text>
    <text x="160" y="118" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Canada</text>

    <!-- Row 5 -->
    <rect x="5" y="130" width="190" height="20" fill="rgba(255,255,255,0.01)" />
    <text x="12" y="143" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">4</text>
    <text x="60" y="143" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">David</text>
    <text x="120" y="143" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">45</text>
    <text x="160" y="143" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Germany</text>
    
    <!-- Table Footer cost info overlay -->
    <rect x="5" y="155" width="190" height="30" rx="4" fill="rgba(6, 8, 14, 0.9)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    <text x="12" y="167" fill="#6b7280" font-family="'Outfit', sans-serif" font-size="7" font-weight="bold">SCAN SPEED</text>
    <text x="12" y="179" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="8">Seq Scan: 10 rows read</text>
  </g>

  <!-- Connective arrow in center -->
  <g transform="translate(285, 220)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="url(#primary-grad)" stroke-width="3" stroke-dasharray="4,2" />
    <polygon points="26,-6 38,0 26,6" fill="#60efff" filter="url(#glow)" />
  </g>

  <!-- Right Column: Query Plan Tree Layout -->
  <g transform="translate(340, 130)">
    <!-- Frame -->
    <rect width="200" height="190" rx="8" fill="rgba(20, 27, 45, 0.4)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    
    <!-- Title -->
    <rect width="200" height="25" rx="8" fill="rgba(30, 41, 67, 0.5)" />
    <text x="100" y="16" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" text-anchor="middle">EXPLAIN ANALYZE PLAN</text>

    <!-- Node 1 (Top): Projection -->
    <g transform="translate(30, 40)">
      <rect width="140" height="30" rx="4" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1" />
      <text x="70" y="18" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">PROJECTION</text>
    </g>

    <!-- Connector lines -->
    <line x1="100" y1="70" x2="100" y2="90" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

    <!-- Node 2 (Middle): Filter -->
    <g transform="translate(30, 90)">
      <rect width="140" height="30" rx="4" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="1" filter="url(#glow)" />
      <text x="70" y="18" fill="#f59e0b" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">FILTER: age &gt; 25</text>
    </g>

    <!-- Connector lines -->
    <line x1="100" y1="120" x2="100" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

    <!-- Node 3 (Bottom): Scan -->
    <g transform="translate(30, 140)">
      <rect width="140" height="30" rx="4" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="1" />
      <text x="70" y="18" fill="#10b981" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">SEQ SCAN: users</text>
    </g>
  </g>
</svg>
