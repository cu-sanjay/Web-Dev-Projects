<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#050a1e" />
      <stop offset="65%" stop-color="#020308" />
      <stop offset="100%" stop-color="#000002" />
    </radialGradient>

    <!-- Glowing Blue Nebula -->
    <radialGradient id="nebulaBlue" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Glowing Purple Nebula -->
    <radialGradient id="nebulaPurple" cx="80%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Earth Radial Shader -->
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="70%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>

    <!-- Earth Atmosphere Glow -->
    <radialGradient id="earthAtmosphere" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="#0f172a" stop-opacity="0" />
      <stop offset="95%" stop-color="#38bdf8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>

    <!-- Moon Surface Radial Shader -->
    <radialGradient id="moonBodyGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="70%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#475569" />
    </radialGradient>

    <!-- Filters for Neon Glow -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="vectorGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background space -->
  <rect width="800" height="500" fill="url(#spaceBg)" />
  <rect width="800" height="500" fill="url(#nebulaBlue)" />
  <rect width="800" height="500" fill="url(#nebulaPurple)" />

  <!-- Stars Field -->
  <g fill="#ffffff">
    <circle cx="95" cy="75" r="0.9" opacity="0.5" />
    <circle cx="160" cy="115" r="1.3" opacity="0.8" />
    <circle cx="280" cy="55" r="0.6" opacity="0.4" />
    <circle cx="410" cy="130" r="1.5" opacity="0.75" />
    <circle cx="670" cy="70" r="1.1" opacity="0.6" />
    <circle cx="740" cy="115" r="1.6" opacity="0.8" />
    
    <circle cx="140" cy="420" r="1" opacity="0.6" />
    <circle cx="230" cy="340" r="0.7" opacity="0.3" />
    <circle cx="490" cy="440" r="1.4" opacity="0.7" />
    <circle cx="610" cy="390" r="0.9" opacity="0.5" />
    <circle cx="780" cy="330" r="1.2" opacity="0.75" />
  </g>

  <!-- ================= LEFT: ORBITAL TRAJECTORY PANE ================= -->
  <g transform="translate(20, 0)">
    <!-- Parallel Solar Rays vector lines -->
    <g stroke="rgba(255, 204, 0, 0.15)" stroke-width="1">
      <line x1="10" y1="120" x2="380" y2="120" />
      <line x1="10" y1="200" x2="380" y2="200" />
      <line x1="10" y1="280" x2="380" y2="280" />
      <line x1="10" y1="360" x2="380" y2="360" />
    </g>

    <!-- Elliptical Orbit Trail -->
    <ellipse cx="180" cy="240" rx="135" ry="90" fill="none" stroke="#38bdf8" stroke-width="1.8" filter="url(#neonGlow)" />
    
    <!-- Line of Apsides (tilted minor) -->
    <line x1="30" y1="240" x2="330" y2="240" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.6" />
    <text x="50" y="232" fill="#a855f7" font-family="Share Tech Mono" font-size="8.5" opacity="0.85">LINE OF APSIDES</text>

    <!-- Apogee & Perigee nodes -->
    <circle cx="45" cy="240" r="3" fill="#a855f7" />
    <text x="35" y="254" fill="#a855f7" font-family="Share Tech Mono" font-size="8" text-anchor="middle">APOGEE</text>
    
    <circle cx="315" cy="240" r="3" fill="#a855f7" />
    <text x="325" y="254" fill="#a855f7" font-family="Share Tech Mono" font-size="8" text-anchor="middle">PERIGEE</text>

    <!-- Central Earth -->
    <g transform="translate(195, 240)">
      <circle cx="0" cy="0" r="34" fill="url(#earthAtmosphere)" />
      <circle cx="0" cy="0" r="26" fill="url(#earthGrad)" />
      <!-- Small green continents overlay -->
      <path d="M -8,-12 Q -2,-15 5,-8 T 15,-5 Q 8,5 0,2 T -8,-5 Z" fill="#10b981" opacity="0.8" />
      <path d="M -15,5 Q -5,2 5,12 T 8,18 Q -8,25 -12,12 Z" fill="#10b981" opacity="0.8" />
    </g>

    <!-- Moon sphere on orbit trail (Top left) -->
    <g transform="translate(112, 162)">
      <circle cx="0" cy="0" r="7" fill="#64748b" stroke="#94a3b8" stroke-width="0.5" />
      <!-- Moon shadow mask (facing solar rays from left) -->
      <path d="M 0,-7 A 7 7 0 0 1 0 7 A 7 7 0 0 1 0 -7" fill="#090d16" />
    </g>

    <text x="180" y="45" fill="#94a3b8" font-family="Share Tech Mono" font-size="9.5" text-anchor="middle" letter-spacing="0.5">ORBITAL VIEW</text>
  </g>

  <!-- ================= RIGHT: LIBRATIONAL OBSERVATION PANE ================= -->
  <g transform="translate(560, 230)">
    <!-- Atmospheric bloom -->
    <circle cx="0" cy="0" r="120" fill="url(#earthAtmosphere)" opacity="0.25" />
    
    <!-- Moon Body Spheroid -->
    <circle cx="0" cy="0" r="95" fill="url(#moonBodyGrad)" />
    
    <!-- Orthographic coordinate grids (Tilted slightly to reflect Libration) -->
    <g stroke="rgba(30, 41, 59, 0.18)" stroke-width="0.8" fill="none">
      <!-- Longitudes -->
      <ellipse cx="0" cy="0" rx="82" ry="95" transform="rotate(-6)" />
      <ellipse cx="0" cy="0" rx="47" ry="95" transform="rotate(-6)" />
      <ellipse cx="0" cy="0" rx="0" ry="95" transform="rotate(-6)" />
      <!-- Latitudes -->
      <line x1="-92" y1="-25" x2="92" y2="-25" />
      <line x1="-95" y1="0" x2="95" y2="0" />
      <line x1="-92" y1="25" x2="92" y2="25" />
    </g>

    <!-- Lunar Craters / Maria (Projected) -->
    <!-- Mare Imbrium (large dark region top left) -->
    <ellipse cx="-20" cy="-35" rx="30" ry="20" fill="rgba(56, 85, 110, 0.35)" transform="rotate(-5)" />
    <!-- Mare Serenitatis (middle right) -->
    <ellipse cx="25" cy="-22" rx="22" ry="18" fill="rgba(56, 85, 110, 0.35)" transform="rotate(2)" />
    <!-- Mare Crisium (far right edge) -->
    <ellipse cx="62" cy="-10" rx="14" ry="11" fill="rgba(56, 85, 110, 0.3)" />
    
    <!-- Tycho Crater with rays (bottom middle) -->
    <circle cx="-12" cy="45" r="4.5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
    <!-- Copernicus Crater (middle left) -->
    <circle cx="-32" cy="-5" r="5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" />

    <!-- Phase Shading Terminator (Overlaid Waxing Crescent Shadow) -->
    <!-- Semicircular shadow mask on the left half, with Bezier arc transition -->
    <path d="M 0,-95 A 95 95 0 0 0 0 95 A 35 95 0 0 1 0 -95 Z" fill="#020306" fill-opacity="0.85" />

    <!-- Libration Displacement Vector Arrow (Amplified) -->
    <g stroke="#ff007f" stroke-width="2" fill="#ff007f" filter="url(#vectorGlow)">
      <line x1="0" y1="0" x2="28" y2="-22" />
      <circle cx="28" cy="-22" r="3.5" />
      <text x="35" y="-28" fill="#ff007f" font-family="Share Tech Mono" font-size="8.5" font-weight="bold">LIBRATION WOBBLE</text>
    </g>

    <text x="0" y="-112" fill="#94a3b8" font-family="Share Tech Mono" font-size="9.5" text-anchor="middle" letter-spacing="0.5">OBSERVER LIBRATION VIEW</text>
  </g>

  <!-- Dossier Telemetry Dashboard Overlay Card -->
  <g transform="translate(285, 395)" opacity="0.9">
    <rect width="230" height="80" rx="8" fill="#030712" fill-opacity="0.8" stroke="#1e293b" stroke-width="1.5" />
    <text x="14" y="22" fill="#94a3b8" font-family="Outfit" font-size="9" font-weight="600" letter-spacing="0.5">OBSERVATORY DOSSIER</text>
    <text x="14" y="42" fill="#38bdf8" font-family="Share Tech Mono" font-size="12" font-weight="bold">DISTANCE: 363,300 KM (PERIGEE)</text>
    <text x="14" y="60" fill="#10b981" font-family="Share Tech Mono" font-size="12" font-weight="bold">PHASE: WAXING CRESCENT (35%)</text>
    <!-- Phase status tag -->
    <rect x="172" y="10" width="45" height="15" rx="3" fill="#ff007f" fill-opacity="0.2" stroke="#ff007f" stroke-width="0.8" />
    <text x="195" y="21" fill="#ff007f" font-family="Share Tech Mono" font-size="8" text-anchor="middle" font-weight="bold">LOCKED</text>
  </g>

  <!-- Top-Left badge -->
  <g transform="translate(25, 25)" opacity="0.9">
    <rect width="130" height="28" rx="4" fill="#030712" fill-opacity="0.8" stroke="#1e293b" stroke-width="1" />
    <circle cx="14" cy="14" r="3" fill="#10b981" filter="url(#vectorGlow)" />
    <text x="24" y="17" fill="#f8fafc" font-family="Share Tech Mono" font-size="9" font-weight="bold">OBSERVATION MODE</text>
  </g>

  <path d="M 0,0 L 800,0 L 800,500 L 0,500 Z" fill="none" stroke="#1e293b" stroke-width="2" />
</svg>
