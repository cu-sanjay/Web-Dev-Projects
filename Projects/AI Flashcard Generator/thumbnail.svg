<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070e" />
      <stop offset="100%" stop-color="#0e111d" />
    </linearGradient>
    
    <!-- Accent Fuchsia Gradient -->
    <linearGradient id="fuchsia-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Accent Violet Gradient -->
    <linearGradient id="violet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

  <!-- Ambient Glows -->
  <circle cx="270" cy="50" r="50" fill="#d946ef" opacity="0.12" filter="url(#glow)" />
  <circle cx="50" cy="150" r="60" fill="#8b5cf6" opacity="0.08" filter="url(#glow)" />

  <!-- Back Card Stack Visual -->
  <g transform="translate(68, 48)">
    <rect x="-10" y="-10" width="120" height="80" rx="10" fill="#0f172a" stroke="rgba(255,255,255,0.04)" stroke-width="1.2" transform="rotate(-5)" opacity="0.5" />
    <rect x="-5" y="-5" width="120" height="80" rx="10" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1.2" transform="rotate(3)" opacity="0.8" />
  </g>

  <!-- Main Front Card Face Visual (3D Look) -->
  <g transform="translate(68, 48)">
    <rect width="120" height="80" rx="10" fill="#0f172a" stroke="url(#fuchsia-grad)" stroke-width="1.5" filter="url(#glow)" />
    
    <!-- Header items -->
    <text x="12" y="18" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#64748b" letter-spacing="0.5">FRONT (Q)</text>
    
    <!-- Question lines -->
    <text x="60" y="44" font-family="'Outfit', 'Inter', sans-serif" font-size="10.5" font-weight="700" fill="#ffffff" text-anchor="middle">What is a Closure?</text>

    <!-- Flip Arrow Indicator -->
    <g transform="translate(60, 62)">
      <!-- Circle backdrop -->
      <circle cx="0" cy="0" r="8" fill="rgba(217, 70, 239, 0.12)" />
      <!-- Swirling arrow paths -->
      <path d="M-4,-2 A4,4 0 0,1 4,-2 M4,2 A4,4 0 0,1 -4,2" fill="none" stroke="#d946ef" stroke-width="1" stroke-linecap="round" />
      <polygon points="4,-2 2,-4 5,-4" fill="#d946ef" />
      <polygon points="-4,2 -2,4 -5,4" fill="#d946ef" />
    </g>
  </g>

  <!-- Mastery progress dial (Right Corner) -->
  <g transform="translate(245, 88)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="4" />
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#fuchsia-grad)" stroke-width="4" stroke-dasharray="150" stroke-dashoffset="35" stroke-linecap="round" />
    
    <text x="0" y="3" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">78%</text>
    <text x="0" y="12" font-family="'Inter', sans-serif" font-size="5" font-weight="600" fill="#d946ef" text-anchor="middle">MASTERY</text>
  </g>

  <!-- Telemetry Badge (Success Mastery check) -->
  <g transform="translate(245, 140)">
    <rect x="-35" y="-9" width="70" height="18" rx="9" fill="rgba(16, 185, 129, 0.12)" stroke="#10b981" stroke-width="0.8" />
    <circle cx="-22" cy="0" r="5" fill="#10b981" />
    <path d="M-24,0 L-22.5,1.5 L-20,-1.5" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" />
    <text x="8" y="3.5" font-family="'Inter', sans-serif" font-size="7" font-weight="700" fill="#10b981" text-anchor="middle">MASTERED</text>
  </g>

  <!-- Title Branding text -->
  <g transform="translate(160, 175)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="14.5" font-weight="800" text-anchor="middle" fill="#ffffff">
      Flash<tspan fill="#d946ef">AI</tspan>
    </text>
    <text y="11" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="0.5">
      AI Flashcard Generator &amp; Study Arena
    </text>
  </g>
</svg>
