<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0e" />
      <stop offset="100%" stop-color="#12141c" />
    </linearGradient>
    
    <!-- Accent Gradient (Teal/Indigo) -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(99, 102, 241, 0.2)" />
      <stop offset="100%" stop-color="rgba(99, 102, 241, 0)" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

  <!-- Background decorative glows -->
  <circle cx="280" cy="150" r="50" fill="#10b981" opacity="0.12" filter="url(#glow)" />
  <circle cx="40" cy="50" r="60" fill="#6366f1" opacity="0.15" filter="url(#glow)" />

  <!-- Mini Invoice Sheet Representation -->
  <g transform="translate(35, 35)">
    <!-- Main Sheet Shadow Backdrop -->
    <rect x="0" y="0" width="85" height="115" rx="6" fill="#1c1e2a" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    
    <!-- Colored Header Band -->
    <rect x="0" y="0" width="85" height="14" rx="6" fill="#6366f1" opacity="0.8" />
    <rect x="0" y="8" width="85" height="6" fill="#6366f1" opacity="0.8" />

    <!-- Invoice Text Elements -->
    <rect x="10" y="24" width="22" height="4" rx="1" fill="#f3f4f6" />
    <rect x="10" y="34" width="30" height="3" rx="1" fill="#9ca3af" opacity="0.5" />
    
    <!-- Line Item Tracks -->
    <line x1="10" y1="52" x2="75" y2="52" stroke="#4b5563" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="62" x2="60" y2="62" stroke="#4b5563" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="72" x2="75" y2="72" stroke="#4b5563" stroke-width="2" stroke-linecap="round" />

    <!-- Total calculations badge -->
    <rect x="45" y="88" width="30" height="16" rx="4" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="1" />
    <circle cx="53" cy="96" r="3" fill="#10b981" />
    <line x1="60" y1="96" x2="70" y2="96" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Financial Income Chart Representation -->
  <g transform="translate(160, 45)">
    <!-- Chart Background Grid -->
    <line x1="0" y1="80" x2="120" y2="80" stroke="#272a3a" stroke-width="1.5" />
    <line x1="0" y1="50" x2="120" y2="50" stroke="#272a3a" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="0" y1="20" x2="120" y2="20" stroke="#272a3a" stroke-width="1" stroke-dasharray="2 2" />

    <!-- Chart fill and line -->
    <path d="M 0 75 L 20 60 L 40 68 L 60 35 L 80 48 L 100 15 L 120 25 L 120 80 L 0 80 Z" fill="url(#glow-grad)" />
    <path d="M 0 75 L 20 60 L 40 68 L 60 35 L 80 48 L 100 15 L 120 25" fill="none" stroke="url(#primary-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

    <!-- Node circles -->
    <circle cx="100" cy="15" r="4.5" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="60" cy="35" r="3" fill="#6366f1" />
  </g>

  <!-- Text Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="800" text-anchor="middle" fill="#ffffff">
      Flow<tspan fill="#10b981">Invoice</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="8.5" font-weight="500" text-anchor="middle" fill="#9ca3af" letter-spacing="0.5">
      Freelancer Invoice Manager
    </text>
  </g>
</svg>
