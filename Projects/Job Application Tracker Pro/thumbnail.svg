<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glow-applied" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="12" fill="url(#bg-grad)" />
  <rect width="318" height="198" x="1" y="1" rx="11" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Grid Pattern overlay -->
  <g opacity="0.05">
    <path d="M0,40 H320 M0,80 H320 M0,120 H320 M0,160 H320" stroke="#ffffff" stroke-width="1"/>
    <path d="M64,0 V200 M128,0 V200 M192,0 V200 M256,0 V200" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Header -->
  <g transform="translate(15, 12)">
    <!-- Briefcase Icon -->
    <path d="M3,6 A2,2 0 0,1 5,4 H9 A2,2 0 0,1 11,6 V7 H13 A1,1 0 0,1 14,8 V13 A1,1 0 0,1 13,14 H1 A1,1 0 0,1 0,13 V8 A1,1 0 0,1 1,7 H3 Z M4,7 H10 V6 A1,1 0 0,0 9,5 H5 A1,1 0 0,0 4,6 Z" fill="#0ea5e9" transform="scale(0.8) translate(0, 1)" />
    <!-- Logo Text -->
    <text x="16" y="9" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="url(#logo-grad)">JobTrack<tspan font-weight="400" fill="#9ca3af">Pro</tspan></text>
    <!-- Small sub badge -->
    <rect x="75" y="1" width="38" height="9" rx="3" fill="#1f2937" stroke="#374151" stroke-width="0.5" />
    <text x="94" y="7" font-family="'Inter', sans-serif" font-weight="600" font-size="5" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">KANBAN</text>
  </g>

  <!-- Header stats widgets -->
  <g transform="translate(200, 12)">
    <!-- Offers badge -->
    <rect x="0" y="0" width="45" height="10" rx="3" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.5" />
    <circle cx="5" cy="5" r="2" fill="#10b981" />
    <text x="10" y="7" font-family="'Inter', sans-serif" font-weight="600" font-size="5.5" fill="#10b981">Offers: 1</text>

    <!-- Interviews badge -->
    <rect x="50" y="0" width="55" height="10" rx="3" fill="rgba(245, 158, 11, 0.1)" stroke="rgba(245, 158, 11, 0.2)" stroke-width="0.5" />
    <circle cx="55" cy="5" r="2" fill="#f59e0b" />
    <text x="60" y="7" font-family="'Inter', sans-serif" font-weight="600" font-size="5.5" fill="#f59e0b">Interviews: 1</text>
  </g>

  <!-- Kanban Grid Columns (5 lanes) -->
  <!-- Lane 1: Wishlist -->
  <g transform="translate(10, 32)">
    <rect width="56" height="152" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="56" height="15" rx="3" fill="rgba(99, 102, 241, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#6366f1" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#a5b4fc">Wishlist</text>
    <rect x="44" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="48" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="48" height="34" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <text x="4" y="8" font-family="'Inter', sans-serif" font-weight="700" font-size="4.5" fill="#9ca3af">VERCEL</text>
      <text x="4" y="15" font-family="'Outfit', sans-serif" font-weight="600" font-size="5" fill="#ffffff">DevRel Eng</text>
      <!-- Meta details -->
      <text x="4" y="24" font-family="'Inter', sans-serif" font-weight="500" font-size="4" fill="#e5e7eb">$130k</text>
      <!-- progress bar -->
      <rect x="4" y="28" width="40" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="28" width="0" height="2" rx="1" fill="#0ea5e9" />
    </g>
  </g>

  <!-- Lane 2: Applied -->
  <g transform="translate(71, 32)">
    <rect width="56" height="152" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="56" height="15" rx="3" fill="rgba(14, 165, 233, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#0ea5e9" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#7dd3fc">Applied</text>
    <rect x="44" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="48" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="48" height="34" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <text x="4" y="8" font-family="'Inter', sans-serif" font-weight="700" font-size="4.5" fill="#9ca3af">NETFLIX</text>
      <text x="4" y="15" font-family="'Outfit', sans-serif" font-weight="600" font-size="5" fill="#ffffff">UI Eng</text>
      <!-- Meta details -->
      <text x="4" y="24" font-family="'Inter', sans-serif" font-weight="500" font-size="4" fill="#e5e7eb">$190k</text>
      <!-- progress bar -->
      <rect x="4" y="28" width="40" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="28" width="20" height="2" rx="1" fill="#0ea5e9" />
    </g>
  </g>

  <!-- Lane 3: Interviewing -->
  <g transform="translate(132, 32)">
    <rect width="56" height="152" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="56" height="15" rx="3" fill="rgba(245, 158, 11, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#f59e0b" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#fde047">Interview</text>
    <rect x="44" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="48" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 -->
    <g transform="translate(4, 20)">
      <rect width="48" height="34" rx="4" fill="#090d16" stroke="#374151" stroke-width="0.5" />
      <text x="4" y="8" font-family="'Inter', sans-serif" font-weight="700" font-size="4.5" fill="#9ca3af">STRIPE</text>
      <text x="4" y="15" font-family="'Outfit', sans-serif" font-weight="600" font-size="5" fill="#ffffff">JS Architect</text>
      <!-- Meta details -->
      <text x="4" y="24" font-family="'Inter', sans-serif" font-weight="500" font-size="4" fill="#e5e7eb">$185k</text>
      <!-- progress bar -->
      <rect x="4" y="28" width="40" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="28" width="20" height="2" rx="1" fill="#0ea5e9" />
    </g>
  </g>

  <!-- Lane 4: Offer -->
  <g transform="translate(193, 32)">
    <rect width="56" height="152" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="56" height="15" rx="3" fill="rgba(16, 185, 129, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#10b981" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#6ee7b7">Offer</text>
    <rect x="44" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="48" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">1</text>
    
    <!-- Card 1 (Glowing active offer) -->
    <g transform="translate(4, 20)">
      <rect width="48" height="34" rx="4" fill="#111827" stroke="#10b981" stroke-width="0.8" filter="url(#glow-applied)" />
      <text x="4" y="8" font-family="'Inter', sans-serif" font-weight="700" font-size="4.5" fill="#10b981">GOOGLE</text>
      <text x="4" y="15" font-family="'Outfit', sans-serif" font-weight="600" font-size="5" fill="#ffffff">Frontend Eng</text>
      <!-- Meta details -->
      <text x="4" y="24" font-family="'Inter', sans-serif" font-weight="500" font-size="4" fill="#6ee7b7">$145k</text>
      <!-- progress bar -->
      <rect x="4" y="28" width="40" height="2" rx="1" fill="#1f2937" />
      <rect x="4" y="28" width="40" height="2" rx="1" fill="#10b981" />
    </g>
  </g>

  <!-- Lane 5: Rejected -->
  <g transform="translate(254, 32)">
    <rect width="56" height="152" rx="6" fill="#111827" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
    <!-- Header -->
    <rect width="56" height="15" rx="3" fill="rgba(239, 68, 68, 0.15)" />
    <line x1="0" y1="0" x2="0" y2="15" stroke="#ef4444" stroke-width="2" />
    <text x="6" y="10" font-family="'Outfit', sans-serif" font-weight="700" font-size="6" fill="#fca5a5">Rejected</text>
    <rect x="44" y="4" width="8" height="7" rx="3" fill="#000000" opacity="0.3" />
    <text x="48" y="9" font-family="'Inter', sans-serif" font-size="5.5" font-weight="600" fill="#ffffff" text-anchor="middle">0</text>
    
    <!-- Empty lane indicator -->
    <text x="28" y="70" font-family="'Inter', sans-serif" font-size="4.5" fill="#4b5563" text-anchor="middle">Empty</text>
  </g>
</svg>
