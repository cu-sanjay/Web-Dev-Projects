<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080a10" />
      <stop offset="50%" stop-color="#121827" />
      <stop offset="100%" stop-color="#06080c" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60efff" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="danger-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#ff8a8a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-grad)" />

  <!-- Background Grid lines for tech vibe -->
  <path d="M 0,50 L 600,50 M 0,100 L 600,100 M 0,150 L 600,150 M 0,200 L 600,200 M 0,250 L 600,250 M 0,300 L 600,300 M 0,350 L 600,350" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400 M 400,0 L 400,400 M 450,0 L 450,400 M 500,0 L 500,400 M 550,0 L 550,400" stroke="rgba(255,255,255,0.02)" stroke-width="1" />

  <!-- Title Text -->
  <text x="300" y="75" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="-0.5">TX<tspan fill="url(#primary-grad)">KRAFT</tspan></text>
  <text x="300" y="100" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="1">TRANSACTION &amp; RECOVERY SIMULATOR</text>

  <!-- Left: RAM vs Disk Storage comparison mockup -->
  <g transform="translate(60, 130)">
    <rect width="210" height="195" rx="8" fill="rgba(10, 14, 23, 0.9)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Header -->
    <rect width="210" height="25" rx="8" fill="rgba(20, 27, 45, 0.9)" />
    <text x="15" y="17" fill="#c7d2fe" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold">STORAGE STORAGE COMPARATOR</text>
    
    <!-- RAM Buffer (Volatile) -->
    <rect x="10" y="35" width="90" height="110" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
    <text x="55" y="50" fill="#6b7280" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">RAM BUFFER</text>
    
    <!-- RAM row 1 (Exclusive Lock highlight in Red) -->
    <rect x="15" y="60" width="80" height="20" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1" />
    <text x="20" y="73" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Alice</text>
    <text x="75" y="73" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">$800</text>
    
    <!-- RAM row 2 -->
    <rect x="15" y="85" width="80" height="20" fill="rgba(255,255,255,0.01)" />
    <text x="20" y="98" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Bob</text>
    <text x="75" y="98" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">$500</text>

    <!-- Hard Disk (Non-Volatile) -->
    <rect x="110" y="35" width="90" height="110" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" />
    <text x="155" y="50" fill="#6b7280" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" text-anchor="middle">HARD DISK</text>
    
    <!-- Disk row 1 (Old committed value) -->
    <rect x="115" y="60" width="80" height="20" fill="rgba(255,255,255,0.01)" />
    <text x="120" y="73" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">Alice</text>
    <text x="185" y="73" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">$1000</text>

    <!-- Disk row 2 -->
    <rect x="115" y="85" width="80" height="20" fill="rgba(255,255,255,0.01)" />
    <text x="120" y="98" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8">Bob</text>
    <text x="185" y="98" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="end">$500</text>

    <!-- WAL logging entry log preview bottom -->
    <rect x="10" y="155" width="190" height="30" rx="4" fill="rgba(6, 8, 14, 0.9)" stroke="rgba(96, 239, 255, 0.2)" stroke-width="1" />
    <text x="18" y="167" fill="#60efff" font-family="'JetBrains Mono', monospace" font-size="7">WAL: &lt;TxA, Alice, bal, 1000, 800&gt;</text>
    <text x="18" y="179" fill="#10b981" font-family="'JetBrains Mono', monospace" font-size="7">State: UNCOMMITTED (RAM ONLY)</text>
  </g>

  <!-- Connective arrow in center -->
  <g transform="translate(285, 225)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="url(#primary-grad)" stroke-width="3" stroke-dasharray="4,2" />
    <polygon points="26,-6 38,0 26,6" fill="#60efff" filter="url(#glow)" />
  </g>

  <!-- Right: Padlocks Lock manager & Crash Recover options -->
  <g transform="translate(340, 130)">
    <rect width="200" height="195" rx="8" fill="rgba(20, 27, 45, 0.4)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />
    
    <!-- Title -->
    <rect width="200" height="25" rx="8" fill="rgba(30, 41, 67, 0.5)" />
    <text x="100" y="16" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" text-anchor="middle">CONCURRENCY &amp; RECOVERY</text>

    <!-- Lock symbol icon widget -->
    <g transform="translate(40, 40)">
      <!-- Exclusive Lock badge -->
      <rect width="120" height="50" rx="6" fill="rgba(239, 68, 68, 0.1)" stroke="url(#danger-grad)" stroke-width="1.5" filter="url(#glow)" />
      <!-- Lock Padlock graphics -->
      <rect x="18" y="22" width="16" height="14" rx="2" fill="#ef4444" />
      <path d="M 21,22 L 21,16 C 21,13.5 23,12 26,12 C 29,12 31,13.5 31,16 L 31,22" stroke="#ef4444" stroke-width="2.5" fill="none" />
      <text x="44" y="32" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold">EXCLUSIVE LOCK</text>
      <text x="44" y="44" fill="#6b7280" font-family="'JetBrains Mono', monospace" font-size="8">Held by Tx A</text>
    </g>

    <!-- Crash recovery button visuals -->
    <g transform="translate(30, 110)">
      <!-- REDO/UNDO gear graphic visualizer -->
      <rect x="10" y="10" width="140" height="30" rx="4" fill="url(#accent-grad)" filter="url(#glow)" opacity="0.8" />
      <text x="80" y="29" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">RECOVER ENGINE</text>
      
      <rect x="10" y="48" width="140" height="20" rx="4" fill="rgba(255, 8, 68, 0.1)" stroke="#ff0844" stroke-width="1" />
      <text x="80" y="61" fill="#ff0844" font-family="'Outfit', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">CRASH DATABASE</text>
    </g>
  </g>
</svg>
