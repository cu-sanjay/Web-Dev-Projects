<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a0f" />
      <stop offset="100%" stop-color="#12141d" />
    </linearGradient>
    
    <!-- Accent Gradient (Indigo/Rose) -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Teal Accent Gradient -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

  <!-- Background decorative glows -->
  <circle cx="50" cy="50" r="50" fill="#f43f5e" opacity="0.12" filter="url(#glow)" />
  <circle cx="270" cy="150" r="60" fill="#6366f1" opacity="0.15" filter="url(#glow)" />

  <!-- Graphic 1: Pomodoro Clock Progress (Left) -->
  <g transform="translate(45, 45)">
    <!-- Outer ring track -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6" />
    <circle cx="40" cy="40" r="36" fill="none" stroke="url(#primary-grad)" stroke-width="6" stroke-dasharray="226" stroke-dashoffset="65" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Timer triangle play icon -->
    <polygon points="36,30 50,40 36,50" fill="#ffffff" filter="url(#glow)" />
    
    <!-- Floating ticks -->
    <rect x="38" y="0" width="4" height="6" rx="1" fill="#f43f5e" opacity="0.8" />
    <rect x="38" y="74" width="4" height="6" rx="1" fill="#f43f5e" opacity="0.8" />
  </g>

  <!-- Graphic 2: 3D Flashcards contour (Right) -->
  <g transform="translate(180, 45)">
    <!-- Back Card (Outline) -->
    <g transform="translate(12, -8) rotate(6)">
      <rect x="0" y="0" width="70" height="85" rx="6" fill="#1c1e2a" stroke="#26293c" stroke-width="1.5" />
      <rect x="10" y="15" width="50" height="4" rx="1" fill="#4b5563" opacity="0.4" />
      <rect x="10" y="25" width="40" height="4" rx="1" fill="#4b5563" opacity="0.4" />
    </g>

    <!-- Front Card (Solid) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="70" height="85" rx="6" fill="#1c1e2a" stroke="url(#teal-grad)" stroke-width="1.5" filter="url(#glow)" />
      
      <!-- Card content simulation -->
      <circle cx="35" cy="20" r="8" fill="url(#teal-grad)" opacity="0.8" />
      <rect x="10" y="44" width="50" height="4" rx="1.5" fill="#f3f4f6" />
      <rect x="15" y="56" width="40" height="3" rx="1" fill="#9ca3af" opacity="0.6" />
      <rect x="20" y="66" width="30" height="3" rx="1" fill="#9ca3af" opacity="0.6" />
    </g>
  </g>

  <!-- Text Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="850" text-anchor="middle" fill="#ffffff">
      Focus<tspan fill="#f43f5e">Flow</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="8.5" font-weight="500" text-anchor="middle" fill="#9ca3af" letter-spacing="0.5">
      Study Session Manager &amp; Flashcards
    </text>
  </g>
</svg>
