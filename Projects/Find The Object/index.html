<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide & Seek — Memory Challenge</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div id="overlay" class="overlay">
            <h1 id="overlay-title">Hide & Seek 💎</h1>
            <p style="margin-bottom: 30px; color: var(--text-muted);">10 items appear. One will vanish. Can you remember?</p>
            <button class="btn-start" onclick="startGame()">Start Game</button>
        </div>

        <div class="stats">
            <div class="badge">Round: <span id="round">1</span>/10</div>
            <div class="badge" style="color: var(--secondary)">Score: <span id="score">0</span></div>
        </div>

        <div class="progress-timer"><div id="timer-bar" class="progress-fill"></div></div>
        <div id="phase-label" class="phase-text">Memorize!</div>

        <div class="object-grid" id="grid"></div>

        <div id="options" class="options-container hidden"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
