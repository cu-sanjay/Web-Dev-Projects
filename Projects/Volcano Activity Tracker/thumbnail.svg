<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#0f172a"/></linearGradient><linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="60" y="50" font-family="ui-monospace,monospace" font-size="20" font-weight="800" fill="#f8fafc" letter-spacing="1">VOLCANO ACTIVITY TRACKER</text>
  <text x="60" y="72" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">Global Volcanic Activity Monitoring</text>
  <rect x="60" y="95" width="240" height="50" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="80" y="122" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">All Risk Levels</text>
  <rect x="250" y="95" width="240" height="50" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="270" y="122" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">All Regions</text>
  <rect x="60" y="160" width="430" height="505" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
  <g transform="translate(75,175)">
    <rect x="0" y="0" width="398" height="54" rx="6" fill="rgba(249,115,22,.06)" stroke="rgba(249,115,22,.2)" stroke-width="1"/><text x="12" y="24" font-family="ui-monospace,monospace" font-size="16">🌋</text><text x="34" y="24" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#f97316">Mount Merapi</text><text x="34" y="40" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">Java, Indonesia</text><text x="390" y="22" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#ef4444">Critical</text>
    <rect x="0" y="60" width="398" height="54" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="84" font-family="ui-monospace,monospace" font-size="16">🌋</text><text x="34" y="84" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">Mauna Loa</text><text x="34" y="100" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">Hawaii, USA</text><text x="390" y="82" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#f59e0b">Moderate</text>
    <rect x="0" y="120" width="398" height="54" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="12" y="144" font-family="ui-monospace,monospace" font-size="16">🗻</text><text x="34" y="144" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">Mount Fuji</text><text x="34" y="160" font-family="ui-monospace,monospace" font-size="9" fill="#64748b">Honshu, Japan</text><text x="390" y="142" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#f59e0b">Moderate</text>
    <text x="0" y="200" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">🌋 Mount Vesuvius</text><text x="390" y="200" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#ef4444">Critical</text>
    <text x="0" y="226" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">🌋 Krakatoa</text><text x="390" y="226" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#f97316">High</text>
    <text x="0" y="252" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">🌋 Mount Etna</text><text x="390" y="252" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#f59e0b">Moderate</text>
    <text x="0" y="278" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">♨️ Yellowstone Caldera</text><text x="390" y="278" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#f97316">High</text>
    <text x="0" y="304" font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#cbd5e1">❄️ Mount Erebus</text><text x="390" y="304" text-anchor="end" font-family="ui-monospace,monospace" font-size="10" font-weight="700" fill="#22c55e">Low</text>
  </g>
  <rect x="520" y="160" width="700" height="505" rx="10" fill="#111827" stroke="#334155" stroke-width="1"/>
  <g transform="translate(545,185)">
    <text font-family="ui-monospace,monospace" font-size="32">🌋</text><text x="50" y="8" font-family="ui-monospace,monospace" font-size="18" font-weight="700" fill="#f8fafc">Mount Merapi</text><text x="50" y="26" font-family="ui-monospace,monospace" font-size="10" fill="#64748b">Java, Indonesia · Stratovolcano · 2,930m</text>
    <text y="50" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">OVERVIEW</text>
    <text y="70" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">Indonesia's most active volcano. Its frequent eruptions</text>
    <text y="87" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">pose a constant threat to the densely populated</text>
    <text y="104" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1">surrounding areas.</text>
    <text y="130" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">ACTIVITY STATUS</text>
    <rect x="0" y="142" width="100" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="50" y="164" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="700" fill="#ef4444">Critical</text><text x="50" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">RISK LEVEL</text>
    <rect x="108" y="142" width="120" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="168" y="164" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="700" fill="#f97316">2023</text><text x="168" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">LAST ERUPTION</text>
    <rect x="236" y="142" width="80" height="55" rx="6" fill="#1f2937" stroke="#334155" stroke-width="1"/><text x="276" y="164" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" font-weight="700" fill="#f97316">Active</text><text x="276" y="186" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#64748b">STATUS</text>
    <text y="225" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing=".5">ERUPTION HISTORY</text>
    <text y="248" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1"><tspan fill="#f97316" font-weight="700">2010</tspan> VEI 4 — Major eruption, 350+ fatalities</text>
    <text y="268" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1"><tspan fill="#f97316" font-weight="700">2006</tspan> VEI 3 — Large eruption with pyroclastic flows</text>
    <text y="288" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1"><tspan fill="#f97316" font-weight="700">1930</tspan> VEI 3 — Large eruption, 1,300+ deaths</text>
    <text y="308" font-family="ui-monospace,monospace" font-size="11" fill="#cbd5e1"><tspan fill="#f97316" font-weight="700">1006</tspan> VEI 4 — May have destroyed Mataram kingdom</text>
  </g>
  <rect x="0" y="718" width="1280" height="2" fill="url(#accent)" opacity=".4"/>
</svg>
