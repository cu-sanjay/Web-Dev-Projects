<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060f"/>
      <stop offset="100%" stop-color="#0b1021"/>
    </linearGradient>

    <!-- Layer Gradients -->
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="transGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Subtle networking grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="550" y1="0" x2="550" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="650" y1="0" x2="650" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Title & Subtitle -->
  <text x="40" y="70" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#ffffff">
    NETWORK PACKET <tspan fill="#06b6d4">SIMULATOR</tspan>
  </text>
  <text x="40" y="100" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#94a3b8" letter-spacing="1">
    OSI ENCAPSULATION &amp; SWITCHING SIMULATION
  </text>

  <!-- Nested Encapsulation Bars Structure -->
  <g transform="translate(100, 150)">
    <!-- 1. Data Link Frame (Ethernet) - Outer -->
    <rect width="600" height="180" rx="14" fill="#0c1224" stroke="#10b981" stroke-width="2.5" filter="url(#glowCyan)"/>
    <rect x="0" y="0" width="120" height="180" rx="14" fill="url(#linkGrad)" opacity="0.85"/>
    <rect x="0" y="0" width="120" height="180" rx="14" fill="none" stroke="#6ee7b7" stroke-width="1"/>
    <text x="60" y="85" font-family="'Outfit', sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">L2 ETHERNET</text>
    <text x="60" y="105" font-family="'Fira Code', monospace" font-size="10" fill="#a7f3d0" text-anchor="middle">MAC Header</text>
    
    <!-- 2. Network Frame (IP) -->
    <g transform="translate(130, 10)">
      <rect width="460" height="160" rx="12" fill="#0e172a" stroke="#ec4899" stroke-width="2"/>
      <rect x="0" y="0" width="100" height="160" rx="12" fill="url(#netGrad)" opacity="0.85"/>
      <text x="50" y="75" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">L3 IP</text>
      <text x="50" y="95" font-family="'Fira Code', monospace" font-size="9" fill="#fbcfe8" text-anchor="middle">IP Address</text>
    </g>

    <!-- 3. Transport Segment (TCP) -->
    <g transform="translate(240, 20)">
      <rect width="340" height="140" rx="10" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.8" filter="url(#glowPurple)"/>
      <rect x="0" y="0" width="90" height="140" rx="10" fill="url(#transGrad)" opacity="0.85"/>
      <text x="45" y="65" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">L4 TCP/UDP</text>
      <text x="45" y="85" font-family="'Fira Code', monospace" font-size="9" fill="#ddd6fe" text-anchor="middle">Ports/Seq</text>
    </g>

    <!-- 4. Application Payload (HTTP/Data) -->
    <g transform="translate(340, 30)">
      <rect width="230" height="120" rx="8" fill="url(#appGrad)"/>
      <text x="115" y="55" font-family="'Outfit', sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">L5 APPLICATION</text>
      <text x="115" y="75" font-family="'Fira Code', monospace" font-size="10" fill="#bfdbfe" text-anchor="middle">HTTP DATA / PAYLOAD</text>
      <line x1="30" y1="95" x2="200" y2="95" stroke="#ffffff" stroke-width="2" stroke-dasharray="3 3"/>
    </g>
  </g>

  <!-- Flow Arrows underneath -->
  <g stroke="#06b6d4" stroke-width="3" fill="none" opacity="0.8">
    <!-- Curved arrows pointing packet encapsulation down -->
    <path d="M 60,370 V 430 H 120" marker-end="url(#arrow)"/>
    <path d="M 440,370 V 430 H 380" marker-end="url(#arrow-left)"/>
  </g>

  <!-- Labels -->
  <text x="250" y="435" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#06b6d4" text-anchor="middle" letter-spacing="1">ENCAPSULATION</text>
  <text x="550" y="435" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#06b6d4" text-anchor="middle" letter-spacing="1">DECAPSULATION</text>

  <!-- Markers -->
  <svg>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#06b6d4"/>
      </marker>
      <marker id="arrow-left" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#06b6d4"/>
      </marker>
    </defs>
  </svg>
</svg>
