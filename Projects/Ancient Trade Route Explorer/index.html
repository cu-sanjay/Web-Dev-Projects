<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ancient Trade Route Explorer</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="app-container">
  <header><div class="brand"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><div><h1>ANCIENT TRADE ROUTE EXPLORER</h1><p>Silk Road · Spice Route · Interactive Map</p></div></div></header>
  <div class="main-layout">
    <aside class="route-panel">
      <h3>Trade Routes</h3>
      <button class="route-btn active" data-route="silk">Silk Road 🏯</button>
      <button class="route-btn" data-route="spice">Spice Route 🌶️</button>
      <button class="route-btn" data-route="incense">Incense Route 🪔</button>
      <button class="route-btn" data-route="amber">Amber Road 💎</button>
      <hr class="divider">
      <div class="route-info" id="route-info"><h4 id="route-name">Silk Road</h4><p id="route-desc">Connected China to the Mediterranean, facilitating trade of silk, spices, and ideas for over 1,500 years.</p><div class="route-stats"><div><span>Distance</span><span id="route-dist">6,400 km</span></div><div><span>Era</span><span id="route-era">130 BCE - 1453 CE</span></div><div><span>Goods</span><span id="route-goods">Silk, Spices, Paper</span></div></div></div>
    </aside>
    <main class="map-area">
      <div class="map-container"><svg id="route-map" viewBox="0 0 700 400" width="700" height="400">
        <rect width="700" height="400" fill="#0a1020" rx="6"/>
        <!-- continents outline -->
        <path d="M100 200 Q150 100 250 80 Q350 70 400 120 Q450 150 500 100 Q580 60 620 150 Q650 200 600 280 Q550 340 500 360 Q400 380 300 360 Q200 340 150 300 Q100 260 100 200 Z" fill="none" stroke="#1a2a30" stroke-width="2"/>
        <!-- route path -->
        <path id="route-path" d="M120 220 Q200 180 280 160 Q360 140 420 170 Q480 200 540 160 Q600 130 640 180" fill="none" stroke="#eab308" stroke-width="3" stroke-dasharray="8 4" class="route-line"/>
        <!-- cities -->
        <circle cx="120" cy="220" r="5" fill="#ef4444"/><text x="110" y="210" font-size="8" fill="#64748b">Chang'an</text>
        <circle cx="280" cy="160" r="5" fill="#ef4444"/><text x="275" y="150" font-size="8" fill="#64748b">Samarkand</text>
        <circle cx="420" cy="170" r="5" fill="#ef4444"/><text x="415" y="160" font-size="8" fill="#64748b">Baghdad</text>
        <circle cx="540" cy="160" r="5" fill="#ef4444"/><text x="535" y="150" font-size="8" fill="#64748b">Constantinople</text>
        <circle cx="640" cy="180" r="5" fill="#ef4444"/><text x="640" y="170" font-size="8" fill="#64748b">Rome</text>
        <text x="350" y="370" text-anchor="middle" font-size="10" fill="#64748b">🔄 Drag to explore</text>
      </svg></div>
    </main>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
