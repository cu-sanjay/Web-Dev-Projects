<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8338ec;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="256" height="256" fill="url(#bgGradient)"/>
  
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#glowGradient)" stroke-width="2" opacity="0.3"/>
  
  <g transform="translate(128, 128)">
    <text x="0" y="-50" font-size="32" font-weight="bold" text-anchor="middle" fill="#00d4ff" font-family="monospace">SQL</text>
    
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#00d4ff" stroke-width="2"/>
    
    <line x1="-45" y1="-10" x2="-35" y2="-10" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="35" y1="-10" x2="45" y2="-10" stroke="#00d4ff" stroke-width="1.5"/>
    
    <line x1="-45" y1="0" x2="-35" y2="0" stroke="#8338ec" stroke-width="1.5"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#8338ec" stroke-width="1.5"/>
    <line x1="35" y1="0" x2="45" y2="0" stroke="#8338ec" stroke-width="1.5"/>
    
    <line x1="-45" y1="10" x2="-35" y2="10" stroke="#ff006e" stroke-width="1.5"/>
    <line x1="-15" y1="10" x2="15" y2="10" stroke="#ff006e" stroke-width="1.5"/>
    <line x1="35" y1="10" x2="45" y2="10" stroke="#ff006e" stroke-width="1.5"/>
    
    <path d="M -50 25 L 50 25 L 50 55 L -50 55 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
    
    <text x="-35" y="45" font-size="12" fill="#00d4ff" font-family="monospace">SELECT</text>
    <text x="5" y="45" font-size="12" fill="#8338ec" font-family="monospace">FROM</text>
    
    <path d="M -30 60 L 30 60" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="3,3"/>
    
    <circle cx="0" cy="75" r="3" fill="#00d4ff"/>
    <text x="0" y="85" font-size="10" fill="#a0a0a0" text-anchor="middle" font-family="monospace">RESULT</text>
  </g>
  
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#glowGradient)" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
</svg>
