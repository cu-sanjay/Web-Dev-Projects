<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Comparison · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-bar">
    <div class="top-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5">
        <circle cx="12" cy="12" r="5" stroke="#00e5ff" fill="none"/>
        <ellipse cx="12" cy="12" rx="9" ry="4" stroke="#ffb800" fill="none" transform="rotate(-20 12 12)"/>
        <circle cx="5" cy="8" r="1.5" fill="#00e676"/>
        <circle cx="19" cy="14" r="1" fill="#ff1744"/>
      </svg>
      <div>
        <h1 class="top-title">Planet Comparison · Dashboard</h1>
        <span class="top-sub">deep space telemetry laboratory v1.0</span>
      </div>
      <span class="top-badge" id="topBadge">COMPARISON ACTIVE</span>
    </div>
  </header>

  <main class="workspace">

    <!-- SELECTORS -->
    <div class="selectors-row">
      <div class="selector-block">
        <span class="sel-label">Primary Celestial Body</span>
        <div class="sel-buttons" id="selPrimary">
          <button class="sel-btn active" data-planet="earth">🌍 Earth</button>
          <button class="sel-btn" data-planet="mars">🌑 Mars</button>
          <button class="sel-btn" data-planet="jupiter">🟠 Jupiter</button>
          <button class="sel-btn" data-planet="venus">☀️ Venus</button>
          <button class="sel-btn" data-planet="saturn">🪐 Saturn</button>
        </div>
      </div>
      <div class="selector-block">
        <span class="sel-label">Secondary Celestial Body</span>
        <div class="sel-buttons" id="selSecondary">
          <button class="sel-btn" data-planet="earth">🌍 Earth</button>
          <button class="sel-btn active" data-planet="mars">🌑 Mars</button>
          <button class="sel-btn" data-planet="jupiter">🟠 Jupiter</button>
          <button class="sel-btn" data-planet="venus">☀️ Venus</button>
          <button class="sel-btn" data-planet="saturn">🪐 Saturn</button>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- LEFT: CANVAS -->
      <section class="canvas-section">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
          <span>Volumetric Sizing &amp; Orbital Track</span>
          <span class="panel-hint" id="canvasHint">LIVE</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="mainCanvas"></canvas>
        </div>
      </section>

      <!-- RIGHT: TELEMETRY -->
      <section class="telemetry-section">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/></svg>
          <span>Telemetry Comparison</span>
          <span class="panel-hint" id="telemHint">ACTIVE</span>
        </div>
        <div class="telem-body" id="telemBody"></div>
      </section>

    </div>

    <!-- ATMOSPHERIC SPECTRUM -->
    <section class="atmosphere-section">
      <div class="panel-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><path d="M4 20h16"/><path d="M6 16l2-4h8l2 4"/><path d="M8 12l2-4h4l2 4"/></svg>
        <span>Atmospheric Gas Spectrum</span>
        <span class="panel-hint" id="atmoHint">COMPARISON</span>
      </div>
      <div class="atmo-grid" id="atmoGrid"></div>
    </section>

    <!-- ACTIONS -->
    <footer class="action-bar">
      <button class="foot-btn foot-run" id="btnGravity">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 010 20"/></svg>
        Execute Gravitational Jump Test
      </button>
      <button class="foot-btn foot-preset" id="btnSync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Synchronize Planetary Alignment
      </button>
      <button class="foot-btn foot-reset" id="btnPurge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Purge Selection Vectors
      </button>
    </footer>

  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
