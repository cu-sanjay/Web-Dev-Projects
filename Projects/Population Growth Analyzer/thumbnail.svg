<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark main background -->
  <rect width="400" height="400" fill="#05070c" rx="12"/>

  <!-- Background grid lines -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.04">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bar-m-glow" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0.1)"/>
      <stop offset="100%" stop-color="rgba(0, 229, 255, 0.8)"/>
    </linearGradient>
    <linearGradient id="bar-f-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 0, 127, 0.1)"/>
      <stop offset="100%" stop-color="rgba(255, 0, 127, 0.8)"/>
    </linearGradient>
    <linearGradient id="pop-trend-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background Growth Curve (Green) -->
  <path d="M 40 270 Q 140 280, 200 240 T 300 130 T 360 80 L 360 300 L 40 300 Z" fill="url(#pop-trend-glow)"/>
  <path d="M 40 270 Q 140 280, 200 240 T 300 130 T 360 80" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Center Axis line of Pyramid -->
  <line x1="200" y1="65" x2="200" y2="295" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.2"/>

  <!-- Population Pyramid Bars (8 cohorts layout) -->
  <!-- Males (Left, Cyan) & Females (Right, Pink) -->
  <g stroke-width="1">
    <!-- Cohort 80+ -->
    <rect x="180" y="80" width="10" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="80" width="12" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 70-79 -->
    <rect x="165" y="102" width="25" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="102" width="28" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 60-69 -->
    <rect x="145" y="124" width="45" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="124" width="47" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 50-59 -->
    <rect x="135" y="146" width="55" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="146" width="57" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 40-49 -->
    <rect x="125" y="168" width="65" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="168" width="65" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 30-39 -->
    <rect x="115" y="190" width="75" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="190" width="74" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 20-29 -->
    <rect x="105" y="212" width="85" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="212" width="83" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 10-19 -->
    <rect x="95" y="234" width="95" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="234" width="93" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>

    <!-- Cohort 0-9 -->
    <rect x="80" y="256" width="110" height="16" fill="url(#bar-m-glow)" stroke="rgba(0, 229, 255, 0.3)" rx="1"/>
    <rect x="210" y="256" width="107" height="16" fill="url(#bar-f-glow)" stroke="rgba(255, 0, 127, 0.3)" rx="1"/>
  </g>

  <!-- Male Symbol (Top Left) -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" transform="translate(60, 60)">
    <circle cx="10" cy="15" r="5"/>
    <line x1="14" y1="11" x2="20" y2="5"/>
    <line x1="15" y1="5" x2="20" y2="5"/>
    <line x1="20" y1="5" x2="20" y2="10"/>
  </g>

  <!-- Female Symbol (Top Right) -->
  <g stroke="#ff007f" stroke-width="2" fill="none" transform="translate(310, 60)">
    <circle cx="15" cy="10" r="5"/>
    <line x1="15" y1="15" x2="15" y2="23"/>
    <line x1="11" y1="19" x2="19" y2="19"/>
  </g>

  <!-- Chart labels representation ticks -->
  <line x1="80" y1="285" x2="320" y2="285" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <line x1="80" y1="285" x2="80" y2="290" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <line x1="200" y1="285" x2="200" y2="290" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <line x1="320" y1="285" x2="320" y2="290" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>

  <!-- Labels -->
  <text x="200" y="380" font-family="'Fira Code', monospace" font-size="11" fill="#00e5ff" font-weight="700" letter-spacing="2" text-anchor="middle">POPULATION GROWTH</text>
  <text x="200" y="393" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" letter-spacing="1.2" text-anchor="middle">COHORT PROJECTION SOLVER</text>
  
  <!-- Outer glass border HUD frame -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" rx="8"/>
</svg>
