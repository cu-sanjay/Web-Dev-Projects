<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060e" />
      <stop offset="60%" stop-color="#0b0e1a" />
      <stop offset="100%" stop-color="#121833" />
    </linearGradient>

    <!-- Docker Blue Glow Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2496ed" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>

    <!-- Green Success Glow Gradient -->
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Radial Ambient Glow -->
    <radialGradient id="glow-radial-1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#2496ed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#2496ed" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="glow-radial-2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadows and Filters -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow-filter" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="500" fill="url(#bg-grad)" />

  <!-- Ambient Glow Orbs -->
  <circle cx="150" cy="120" r="300" fill="url(#glow-radial-1)" />
  <circle cx="650" cy="380" r="320" fill="url(#glow-radial-2)" />

  <!-- Grid Decoration overlay -->
  <g stroke="#ffffff" stroke-opacity="0.015" stroke-width="1">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" />
    <path d="M 50,0 L 50,500 M 100,0 L 100,500 M 150,0 L 150,500 M 200,0 L 200,500 M 250,0 L 250,500 M 300,0 L 300,500 M 350,0 L 350,500 M 400,0 L 400,500 M 450,0 L 450,500 M 500,0 L 500,500 M 550,0 L 550,500 M 600,0 L 600,500 M 650,0 L 650,500 M 700,0 L 700,500 M 750,0 L 750,500" />
  </g>

  <!-- Isometric Docker Whale Container Composition -->
  <g transform="translate(480, 230)" filter="url(#shadow-filter)">
    <!-- Whale Body Blocks Stack (Isometric Projection) -->
    
    <!-- Row 1 (Bottom of Whale stack) -->
    <!-- Block 1 -->
    <g transform="translate(-100, 40)">
      <!-- Left Side -->
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <!-- Right Side -->
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.6" />
      <!-- Top Side -->
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00d2ff" opacity="0.8" />
    </g>

    <!-- Block 2 -->
    <g transform="translate(-40, 70)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.6" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00d2ff" opacity="0.8" />
    </g>

    <!-- Row 2 -->
    <!-- Block 3 -->
    <g transform="translate(-130, -5)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.6" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00d2ff" opacity="0.8" />
    </g>
    <!-- Block 4 -->
    <g transform="translate(-70, 25)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1182c6" stroke="#2496ed" stroke-opacity="0.6" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#2496ed" stroke-opacity="0.8" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00e5ff" />
    </g>
    <!-- Block 5 -->
    <g transform="translate(-10, 55)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.6" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00d2ff" opacity="0.8" />
    </g>

    <!-- Row 3 -->
    <!-- Block 6 -->
    <g transform="translate(-100, -20)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.6" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00d2ff" opacity="0.8" />
    </g>
    <!-- Block 7 -->
    <g transform="translate(-40, 10)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1182c6" stroke="#2496ed" stroke-opacity="0.6" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#2496ed" stroke-opacity="0.8" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00e5ff" />
    </g>
    <!-- Block 8 (Active Green Container) -->
    <g transform="translate(20, 40)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#087f5b" stroke="#10b981" stroke-opacity="0.6" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#10b981" stroke="#10b981" stroke-opacity="0.8" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#12b886" filter="url(#glow-filter)" />
    </g>

    <!-- Row 4 (Top row / Whale blowspout stack) -->
    <g transform="translate(-70, -35)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1182c6" stroke="#2496ed" stroke-opacity="0.6" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#2496ed" stroke-opacity="0.8" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00e5ff" />
    </g>
    <g transform="translate(-10, -5)">
      <path d="M 0,0 L -30,-15 L -30,15 L 0,30 Z" fill="#1182c6" stroke="#2496ed" stroke-opacity="0.6" />
      <path d="M 0,0 L 30,-15 L 30,15 L 0,30 Z" fill="#2496ed" stroke="#2496ed" stroke-opacity="0.8" />
      <path d="M 0,0 L -30,-15 L 0,-30 L 30,-15 Z" fill="#00e5ff" />
    </g>

    <!-- Water spout lines (Digital Networking bridge paths) -->
    <path d="M -70,-50 C -70,-80 -90,-100 -120,-90" fill="none" stroke="#2496ed" stroke-width="2.5" stroke-dasharray="4,4" opacity="0.8" />
    <path d="M -70,-50 C -60,-85 -40,-105 -10,-100" fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-dasharray="4,4" opacity="0.8" />
    <path d="M -70,-50 C -70,-90 -65,-115 -60,-120" fill="none" stroke="#10b981" stroke-width="2" opacity="0.5" />
    
    <!-- Whale tail block (floating behind) -->
    <g transform="translate(-200, -25)">
      <path d="M 0,0 L -20,-10 L -20,10 L 0,20 Z" fill="#1b5a8f" stroke="#2496ed" stroke-opacity="0.4" />
      <path d="M 0,0 L 20,-10 L 20,10 L 0,20 Z" fill="#2496ed" stroke="#00d2ff" stroke-opacity="0.5" />
      <path d="M 0,0 L -20,-10 L 0,-20 L 20,-10 Z" fill="#00d2ff" opacity="0.7" />
    </g>
    <g transform="translate(-230, -40)">
      <path d="M 0,0 L -15,-7.5 L -15,7.5 L 0,15 Z" fill="#1b5a8f" opacity="0.5" />
      <path d="M 0,0 L 15,-7.5 L 15,7.5 L 0,15 Z" fill="#2496ed" opacity="0.5" />
      <path d="M 0,0 L -15,-7.5 L 0,-15 L 15,-7.5 Z" fill="#00d2ff" opacity="0.5" />
    </g>
  </g>

  <!-- Brand Typography and UI elements -->
  <g transform="translate(80, 150)">
    <!-- Terminal window container decoration -->
    <rect x="-20" y="-50" width="360" height="300" rx="12" fill="url(#glass-grad)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" backdrop-filter="blur(20px)" />
    
    <!-- Terminal Header dots -->
    <circle cx="0" cy="-30" r="5" fill="#ff5f56" />
    <circle cx="15" cy="-30" r="5" fill="#ffbd2e" />
    <circle cx="30" cy="-30" r="5" fill="#27c93f" />
    <text x="320" y="-27" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.3" text-anchor="end">bash - dockersim</text>

    <line x1="-20" y1="-15" x2="340" y2="-15" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />

    <!-- Brand Name -->
    <text x="0" y="45" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="44" fill="#ffffff" letter-spacing="-1">DockerSim</text>
    
    <!-- Subtitle tag -->
    <rect x="0" y="65" width="232" height="24" rx="4" fill="#2496ed" fill-opacity="0.15" stroke="#2496ed" stroke-opacity="0.3" stroke-width="1" />
    <text x="10" y="81" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#2496ed" letter-spacing="1.5" text-transform="uppercase">Containerization Lab</text>

    <!-- Retro Terminal Lines -->
    <g font-family="monospace" font-size="12" xml:space="preserve">
      <!-- Echo command -->
      <text x="0" y="130" fill="#50fa7b" font-weight="bold">user@dockersim:~$ <tspan fill="#8be9fd">docker run -d nginx</tspan></text>
      <!-- Hash response -->
      <text x="0" y="155" fill="#f8f8f2" fill-opacity="0.5">d981c2f1f3a2b5e7... (detached node)</text>
      
      <!-- Status success message -->
      <text x="0" y="190" fill="#10b981" font-weight="bold"><tspan fill="#10b981">●</tspan> Daemon active</text>
      <text x="130" y="190" fill="#f8f8f2" fill-opacity="0.4">|  Level 5/5 ready</text>
    </g>

    <!-- Accent decorative code bracket symbol in background -->
    <path d="M 310,80 L 330,100 L 310,120" fill="none" stroke="#2496ed" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    <path d="M -5,225 L -15,215 L -5,205" fill="none" stroke="#2496ed" stroke-width="2" stroke-linecap="round" opacity="0.3" />
  </g>

  <!-- Footer Info badge -->
  <g transform="translate(60, 445)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" font-weight="500">Interactive Game CLI Simulator &amp; Architecture Map</text>
  </g>
</svg>
