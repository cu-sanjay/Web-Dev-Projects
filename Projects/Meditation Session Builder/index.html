<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation · Session Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-bar">
    <div class="top-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#7c4dff" stroke-width="1.5">
        <circle cx="12" cy="12" r="10" stroke="#7c4dff"/>
        <circle cx="12" cy="12" r="6" stroke="#7c4dff" stroke-width="0.8"/>
        <circle cx="12" cy="12" r="2" fill="#7c4dff"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#7c4dff" stroke-width="0.8"/>
      </svg>
      <div>
        <h1 class="top-title">Meditation · Session Builder</h1>
        <span class="top-sub">audio-visual focus cockpit v1.0</span>
      </div>
      <span class="top-badge" id="topBadge">STANDBY</span>
    </div>
    <div class="top-metrics">
      <span class="metric-chip" id="chipState">STATE <strong id="stateVal">READY</strong></span>
      <span class="metric-chip accent" id="chipPhase">PHASE <strong id="phaseVal">--</strong></span>
      <span class="metric-chip" id="chipCycle">CYCLES <strong id="cycleVal">0</strong></span>
    </div>
  </header>

  <main class="workspace">

    <!-- PRESETS -->
    <section class="preset-row">
      <button class="preset-btn" data-preset="zen">&#x2388; Zen Deep Focus</button>
      <button class="preset-btn" data-preset="box">&#x25A3; Box Breathing Training</button>
      <button class="preset-btn" data-preset="cosmic">&#x221E; Cosmic Transcendence</button>
    </section>

    <div class="main-grid">

      <!-- CONTROLS -->
      <aside class="ctrl-panel">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6"/></svg>
          <span>Parameter Matrix</span>
        </div>

        <div class="ctrl-body">

          <div class="ctrl-group">
            <label class="ctrl-label">Session Duration <span class="ctrl-val" id="valDuration">20</span> min</label>
            <input type="range" class="ctrl-slider" id="sliderDuration" min="1" max="60" value="20" step="1">
          </div>

          <div class="ctrl-group">
            <label class="ctrl-label">Breath Pace <span class="ctrl-val" id="valPace">4</span> s/breath</label>
            <input type="range" class="ctrl-slider" id="sliderPace" min="2" max="10" value="4" step="0.5">
          </div>

          <div class="ctrl-group">
            <label class="ctrl-label">Ambient Layer</label>
            <select class="ctrl-select" id="selectLayer">
              <option value="rain">Procedural White Rain</option>
              <option value="drone">Resonant Sine Drone</option>
              <option value="ocean">Oceanic Hum</option>
            </select>
          </div>

          <div class="ctrl-group">
            <label class="ctrl-label">Layer Gain <span class="ctrl-val" id="valGain">40</span> %</label>
            <input type="range" class="ctrl-slider" id="sliderGain" min="0" max="100" value="40" step="1">
          </div>

        </div>
      </aside>

      <!-- CANVAS AREA -->
      <section class="canvas-section">
        <div class="canvas-wrap">
          <canvas id="mainCanvas"></canvas>
        </div>
      </section>

    </div>

    <!-- ACTIONS -->
    <footer class="action-bar">
      <button class="foot-btn foot-run" id="btnStart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Initiate Meditation Session
      </button>
      <button class="foot-btn foot-preset" id="btnPause">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause Active Respiration Loop
      </button>
      <button class="foot-btn foot-reset" id="btnPurge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Purge Workspace &amp; Mute Audio
      </button>
    </footer>

  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
