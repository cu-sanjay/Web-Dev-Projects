<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key & Lock — The Golden Heart Quest</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <div id="win-screen" class="overlay hidden">
            <span style="font-size: 4rem;">💖</span>
            <h1>Kingdom Unlocked!</h1>
            <p>You collected all 4 keys and opened the Golden Heart!</p>
            <button class="btn-cute" onclick="location.reload()">Play Again 🎀</button>
        </div>

        <h1>Key & Lock 🗝️</h1>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">Solve puzzles to earn keys and unlock the heart!</p>

        <div class="inventory">
            <span id="slot-0" class="key-slot">🔑</span>
            <span id="slot-1" class="key-slot">🗝️</span>
            <span id="slot-2" class="key-slot">🔑</span>
            <span id="slot-3" class="key-slot">🗝️</span>
        </div>

        <div class="levels-map" id="map">
            <div class="level-node unlocked active" onclick="loadLevel(0)">1</div>
            <div class="level-node" id="node-1">2</div>
            <div class="level-node" id="node-2">3</div>
            <div class="level-node" id="node-3">4</div>
        </div>

        <div class="challenge-box" id="challenge-area">
            <!-- Puzzle content dynamically injected -->
        </div>

        <div id="feedback" style="font-weight: 700; min-height: 24px; margin-top: 10px;"></div>
    </div>
<script src="script.js"></script>
</body>
</html>
