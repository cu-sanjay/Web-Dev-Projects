<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121d"/>
      <stop offset="50%" stop-color="#0f2942"/>
      <stop offset="100%" stop-color="#06121d"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f2942"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e293b" stroke-width="0.3" opacity="0.3">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow orb -->
  <circle cx="600" cy="300" r="280" fill="url(#glowGrad)"/>

  <!-- Stylized continents -->
  <g fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1">
    <!-- North America -->
    <path d="M 120 150 L 170 145 L 220 148 L 260 155 L 275 170 L 280 190 L 275 210 L 265 220 L 255 235 L 245 245 L 235 250 L 220 248 L 210 255 L 195 250 L 180 240 L 170 230 L 155 220 L 140 210 L 130 195 L 120 175 Z"/>
    <!-- Central America -->
    <path d="M 235 255 L 250 252 L 260 260 L 265 275 L 260 285 L 250 290 L 240 285 L 235 270 Z"/>
    <!-- South America -->
    <path d="M 240 298 L 260 295 L 280 300 L 298 315 L 310 335 L 318 360 L 320 380 L 315 400 L 305 415 L 290 430 L 275 438 L 260 435 L 250 420 L 242 400 L 235 380 L 230 355 L 228 335 L 230 315 Z"/>
    <!-- Europe -->
    <path d="M 520 100 L 540 95 L 560 92 L 580 95 L 600 100 L 615 110 L 625 125 L 630 140 L 625 155 L 615 165 L 600 172 L 585 178 L 570 180 L 555 178 L 540 170 L 528 158 L 518 142 L 512 125 Z"/>
    <!-- Africa -->
    <path d="M 535 185 L 555 180 L 575 178 L 595 182 L 615 190 L 630 205 L 640 225 L 645 250 L 642 275 L 635 295 L 622 315 L 605 332 L 585 342 L 565 348 L 548 345 L 535 335 L 525 318 L 518 295 L 512 268 L 510 240 L 515 215 Z"/>
    <!-- Asia -->
    <path d="M 610 90 L 645 82 L 685 80 L 725 82 L 765 88 L 800 98 L 830 110 L 855 128 L 870 150 L 875 172 L 868 190 L 855 205 L 835 215 L 810 220 L 785 218 L 760 212 L 735 205 L 710 200 L 685 195 L 660 190 L 642 180 L 628 168 L 618 152 L 612 135 L 608 115 Z"/>
    <!-- India -->
    <path d="M 665 190 L 685 185 L 700 195 L 710 215 L 705 238 L 690 250 L 670 248 L 658 235 L 652 215 Z"/>
    <!-- SE Asia -->
    <path d="M 740 215 L 765 210 L 790 215 L 808 228 L 815 245 L 805 260 L 785 268 L 762 265 L 745 255 L 735 240 Z"/>
    <!-- Australia -->
    <path d="M 890 345 L 920 338 L 950 342 L 975 352 L 990 370 L 995 392 L 982 412 L 960 425 L 935 430 L 910 428 L 892 418 L 880 402 L 875 385 Z"/>
    <!-- Antarctica -->
    <path d="M 80 560 L 200 555 L 350 550 L 500 548 L 650 550 L 800 555 L 950 560 L 1080 568 L 1120 580 L 1100 600 L 950 610 L 800 618 L 650 622 L 500 625 L 350 622 L 200 618 L 80 610 L 40 598 Z"/>
    <!-- Greenland -->
    <path d="M 290 55 L 320 48 L 348 55 L 360 72 L 352 92 L 332 105 L 308 108 L 292 98 L 282 80 Z"/>
    <!-- Madagascar -->
    <path d="M 660 338 L 672 332 L 680 345 L 678 365 L 665 375 L 655 368 L 650 352 Z"/>
    <!-- British Isles -->
    <path d="M 510 108 L 522 102 L 530 112 L 525 128 L 515 135 L 505 128 L 502 118 Z"/>
    <!-- Japan -->
    <path d="M 852 118 L 864 112 L 872 122 L 875 142 L 868 155 L 858 150 L 850 138 Z"/>
  </g>

  <!-- Ocean highlight arcs -->
  <g stroke="#38bdf8" stroke-width="0.5" fill="none" opacity="0.15">
    <path d="M 400 150 Q 450 140 500 150 Q 550 140 600 150"/>
    <path d="M 400 220 Q 450 210 500 220 Q 550 210 600 220"/>
    <path d="M 350 400 Q 450 380 550 400"/>
  </g>

  <!-- Arctic ice cap -->
  <ellipse cx="580" cy="50" rx="220" ry="18" fill="#1e293b" opacity="0.25"/>

  <!-- Ecosystem icons -->

  <!-- Forest pin (Amazon) -->
  <g transform="translate(280, 370)">
    <circle r="8" fill="#22c55e" opacity="0.3"/>
    <circle r="4" fill="#22c55e"/>
    <text x="12" y="4" fill="#22c55e" font-size="8" font-family="system-ui" opacity="0.7">🌲</text>
  </g>

  <!-- Forest pin (Congo) -->
  <g transform="translate(590, 270)">
    <circle r="8" fill="#22c55e" opacity="0.3"/>
    <circle r="4" fill="#22c55e"/>
  </g>

  <!-- Desert pin (Sahara) -->
  <g transform="translate(580, 215)">
    <circle r="8" fill="#f59e0b" opacity="0.3"/>
    <circle r="4" fill="#f59e0b"/>
    <text x="12" y="4" fill="#f59e0b" font-size="8" font-family="system-ui" opacity="0.7">🏜️</text>
  </g>

  <!-- Mountain pin (Himalayas) -->
  <g transform="translate(780, 170)">
    <circle r="8" fill="#94a3b8" opacity="0.3"/>
    <circle r="4" fill="#94a3b8"/>
    <text x="12" y="4" fill="#94a3b8" font-size="8" font-family="system-ui" opacity="0.7">⛰️</text>
  </g>

  <!-- Ocean pin (Pacific) -->
  <g transform="translate(150, 260)">
    <circle r="8" fill="#0ea5e9" opacity="0.3"/>
    <circle r="4" fill="#0ea5e9"/>
    <text x="12" y="4" fill="#0ea5e9" font-size="8" font-family="system-ui" opacity="0.7">🌊</text>
  </g>

  <!-- Wetland pin (Pantanal) -->
  <g transform="translate(280, 330)">
    <circle r="8" fill="#06b6d4" opacity="0.3"/>
    <circle r="4" fill="#06b6d4"/>
    <text x="12" y="4" fill="#06b6d4" font-size="8" font-family="system-ui" opacity="0.7">🌿</text>
  </g>

  <!-- Polar pin (Antarctica) -->
  <g transform="translate(540, 585)">
    <circle r="8" fill="#e2e8f0" opacity="0.3"/>
    <circle r="4" fill="#e2e8f0"/>
    <text x="12" y="4" fill="#e2e8f0" font-size="8" font-family="system-ui" opacity="0.7">❄️</text>
  </g>

  <!-- Grassland pin -->
  <g transform="translate(420, 390)">
    <circle r="8" fill="#84cc16" opacity="0.3"/>
    <circle r="4" fill="#84cc16"/>
    <text x="12" y="4" fill="#84cc16" font-size="8" font-family="system-ui" opacity="0.7">🌾</text>
  </g>

  <!-- Additional marker dots for visual density -->
  <g fill="#38bdf8" opacity="0.4">
    <circle cx="350" cy="350" r="2"/>
    <circle cx="450" cy="250" r="2"/>
    <circle cx="650" cy="150" r="2"/>
    <circle cx="700" cy="300" r="2"/>
    <circle cx="550" cy="350" r="2"/>
    <circle cx="250" cy="200" r="2"/>
    <circle cx="500" cy="380" r="2"/>
    <circle cx="380" cy="180" r="2"/>
    <circle cx="820" cy="250" r="2"/>
    <circle cx="200" cy="300" r="2"/>
    <circle cx="650" cy="380" r="2"/>
    <circle cx="450" cy="320" r="2"/>
  </g>

  <!-- Discovery connection lines -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.12" fill="none">
    <path d="M 280 370 L 590 270 L 580 215"/>
    <path d="M 780 170 L 590 270 L 280 330"/>
    <path d="M 150 260 L 280 370 L 540 585"/>
    <path d="M 580 215 L 780 170 L 420 390"/>
  </g>

  <!-- Compass Rose -->
  <g transform="translate(1050, 100)">
    <circle r="30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    <polygon points="0,-24 5,-8 0,-12 -5,-8" fill="#38bdf8"/>
    <polygon points="0,24 5,8 0,12 -5,8" fill="#475569"/>
    <polygon points="-24,0 -8,5 -12,0 -8,-5" fill="#475569"/>
    <polygon points="24,0 8,5 12,0 8,-5" fill="#475569"/>
    <text x="0" y="-32" fill="#38bdf8" font-size="9" font-weight="700" text-anchor="middle" font-family="system-ui">N</text>
    <text x="0" y="40" fill="#64748b" font-size="7" font-weight="600" text-anchor="middle" font-family="system-ui">S</text>
    <text x="-34" y="4" fill="#64748b" font-size="7" font-weight="600" text-anchor="middle" font-family="system-ui">W</text>
    <text x="34" y="4" fill="#64748b" font-size="7" font-weight="600" text-anchor="middle" font-family="system-ui">E</text>
  </g>

  <!-- Title Section -->
  <g transform="translate(600, 510)">
    <rect x="-220" y="-50" width="440" height="100" rx="12" fill="#0f172a" opacity="0.85"/>

    <!-- Title gradient line -->
    <rect x="-200" y="-40" width="400" height="2" fill="url(#titleGrad)" opacity="0.3"/>

    <text x="0" y="-12" fill="#f8fafc" font-size="22" font-weight="800" text-anchor="middle" font-family="system-ui" letter-spacing="1">NATURE EXPLORER MAP</text>
    <text x="0" y="12" fill="#64748b" font-size="10" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="3" text-transform="uppercase">INTERACTIVE ECOSYSTEM DISCOVERY PLATFORM</text>

    <!-- Decorative markers under title -->
    <circle cx="-80" cy="28" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="-50" cy="28" r="3" fill="#f59e0b" opacity="0.6"/>
    <circle cx="-20" cy="28" r="3" fill="#94a3b8" opacity="0.6"/>
    <circle cx="10" cy="28" r="3" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="40" cy="28" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="70" cy="28" r="3" fill="#84cc16" opacity="0.6"/>
    <circle cx="100" cy="28" r="3" fill="#e2e8f0" opacity="0.6"/>
  </g>

  <!-- Stat badges -->
  <g transform="translate(140, 480)">
    <rect x="-60" y="-16" width="120" height="32" rx="6" fill="#0f172a" opacity="0.7" stroke="#1e293b" stroke-width="0.5"/>
    <text x="0" y="-2" fill="#38bdf8" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui">18</text>
    <text x="0" y="10" fill="#64748b" font-size="6" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="1">LOCATIONS</text>
  </g>
  <g transform="translate(1060, 480)">
    <rect x="-60" y="-16" width="120" height="32" rx="6" fill="#0f172a" opacity="0.7" stroke="#1e293b" stroke-width="0.5"/>
    <text x="0" y="-2" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui">7</text>
    <text x="0" y="10" fill="#64748b" font-size="6" font-weight="600" text-anchor="middle" font-family="system-ui" letter-spacing="1">ECOSYSTEMS</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#0f172a" opacity="0.5"/>
</svg>