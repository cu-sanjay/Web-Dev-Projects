<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradient for connecting paths -->
    <linearGradient id="cyanPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bgGrad)" />

  <!-- Background Grid lines -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
  </g>

  <!-- Connected Roadmap Nodes / Network graph -->
  <g stroke="url(#cyanPink)" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 30,130 L 90,95 L 160,115 L 220,60 L 290,50" />
    <path d="M 90,95 L 140,40 L 220,60" />
    <path d="M 160,115 L 210,135 L 290,95" />
  </g>

  <!-- Glowing Nodes (Dots) -->
  <circle cx="30" cy="130" r="3.5" fill="#0ea5e9" filter="url(#glowCyan)" />
  <circle cx="90" cy="95" r="4.5" fill="#0ea5e9" filter="url(#glowCyan)" />
  <circle cx="160" cy="115" r="4.5" fill="#ec4899" filter="url(#glowPink)" />
  <circle cx="220" cy="60" r="5" fill="#ec4899" filter="url(#glowPink)" />
  <circle cx="290" cy="50" r="3.5" fill="#0ea5e9" filter="url(#glowCyan)" />
  
  <circle cx="140" cy="40" r="3.5" fill="#0ea5e9" filter="url(#glowCyan)" opacity="0.8" />
  <circle cx="210" cy="135" r="3.5" fill="#ec4899" filter="url(#glowPink)" opacity="0.8" />
  <circle cx="290" cy="95" r="3.5" fill="#0ea5e9" filter="url(#glowCyan)" opacity="0.8" />

  <!-- Radial Gauge Icon overlay in center -->
  <g transform="translate(160, 85)" opacity="0.95">
    <!-- Outer radial ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="4" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="188.4" stroke-dashoffset="56.5" stroke-linecap="round" filter="url(#glowPink)" transform="rotate(-90)" />
    
    <!-- Inner matching percentage arc -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(14, 165, 233, 0.1)" stroke-width="3" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="138.2" stroke-dashoffset="34.5" stroke-linecap="round" filter="url(#glowCyan)" transform="rotate(-90)" />

    <!-- Center Graduation Cap Representation -->
    <path d="M -8,-4 L 0,-8 L 8,-4 L 0,0 Z" fill="#ffffff" />
    <path d="M -5,-2.5 L -5,2 C -5,4 0,6 0,6 C 0,6 5,4 5,2 L 5,-2.5" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
  </g>

  <!-- Typography / Text Branding -->
  <text x="160" y="152" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    PATH<tspan fill="#0ea5e9">ADVISOR</tspan>
  </text>
  <text x="160" y="168" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    AI Career Advisor Dashboard
  </text>
</svg>
