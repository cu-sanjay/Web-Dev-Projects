<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020308" />
      <stop offset="100%" stop-color="#0a0b16" />
    </linearGradient>
    
    <!-- Accent Indigo/Violet Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>

    <!-- Success Green Gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Background glows -->
  <circle cx="280" cy="50" r="50" fill="#6366f1" opacity="0.1" filter="url(#glow)" />
  <circle cx="40" cy="150" r="45" fill="#34d399" opacity="0.06" filter="url(#glow)" />

  <!-- LEFT CARD: Visual Regex Blocks Constructor -->
  <g transform="translate(20, 25)">
    <!-- Card Frame -->
    <rect width="115" height="120" rx="8" fill="rgba(11, 13, 27, 0.5)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Header tabs -->
    <circle cx="10" cy="10" r="3" fill="#ef4444" opacity="0.8" />
    <circle cx="18" cy="10" r="3" fill="#f59e0b" opacity="0.8" />
    <circle cx="26" cy="10" r="3" fill="#10b981" opacity="0.8" />
    <rect x="75" y="6" width="30" height="8" rx="3" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="0.5" />
    <text x="90" y="12" font-family="'Inter', sans-serif" font-size="5" fill="#a78bfa" text-anchor="middle" font-weight="700">BUILDER</text>

    <!-- Visual Blocks cards mockup -->
    <!-- Block 1: Word Char \w -->
    <g transform="translate(8, 24)">
      <rect width="99" height="26" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="0.8" />
      <text x="8" y="12" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#f3f4f6">Word Char</text>
      <text x="60" y="12" font-family="'Courier New', monospace" font-size="6" fill="#a78bfa">\w</text>
      <!-- Quantifier badge -->
      <rect x="8" y="16" width="45" height="7" rx="2" fill="rgba(99,102,241,0.15)" />
      <text x="12" y="21.5" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#a78bfa">Once or more (+)</text>
    </g>

    <!-- Block 2: Literal @ -->
    <g transform="translate(8, 56)">
      <rect width="99" height="26" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="0.8" />
      <text x="8" y="12" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#f3f4f6">Literal</text>
      <text x="45" y="12" font-family="'Courier New', monospace" font-size="6" fill="#a78bfa">@</text>
      <!-- Quantifier badge -->
      <rect x="8" y="16" width="30" height="7" rx="2" fill="rgba(255,255,255,0.06)" />
      <text x="12" y="21.5" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#9ca3af">Exactly 1 time</text>
    </g>

    <!-- Block 3: Range [a-z] -->
    <g transform="translate(8, 88)">
      <rect width="99" height="26" rx="4" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="0.8" />
      <text x="8" y="12" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#f3f4f6">Range</text>
      <text x="40" y="12" font-family="'Courier New', monospace" font-size="6" fill="#a78bfa">[a-z]</text>
      <!-- Quantifier badge -->
      <rect x="8" y="16" width="45" height="7" rx="2" fill="rgba(99,102,241,0.15)" />
      <text x="12" y="21.5" font-family="'Inter', sans-serif" font-size="5" font-weight="700" fill="#a78bfa">Once or more (+)</text>
    </g>
  </g>

  <!-- MIDDLE CONNECTIVE ELEMENT: Magic Wand sparkles -->
  <g transform="translate(142, 80)">
    <path d="M-2,10 L30,10" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" stroke-dasharray="3 3" />
    <path d="M10,-10 L13,-4 L19,-1 L13,2 L10,8 L7,2 L1,-1 L7,-4 Z" fill="url(#accent-grad)" filter="url(#glow)" opacity="0.8" />
  </g>

  <!-- RIGHT CARD: Regex Highlighter Tester Playground -->
  <g transform="translate(185, 25)">
    <!-- Card Frame -->
    <rect width="115" height="120" rx="8" fill="rgba(11, 13, 27, 0.5)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    
    <!-- Header tabs -->
    <circle cx="10" cy="10" r="3" fill="#ef4444" opacity="0.8" />
    <circle cx="18" cy="10" r="3" fill="#f59e0b" opacity="0.8" />
    <circle cx="26" cy="10" r="3" fill="#10b981" opacity="0.8" />
    <rect x="75" y="6" width="30" height="8" rx="3" fill="rgba(16, 185, 129, 0.15)" stroke="rgba(16, 185, 129, 0.3)" stroke-width="0.5" />
    <text x="90" y="12" font-family="'Inter', sans-serif" font-size="5" fill="#34d399" text-anchor="middle" font-weight="700">TESTER</text>

    <!-- Regex Display banner -->
    <rect x="8" y="20" width="99" height="12" rx="3" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5" />
    <text x="14" y="28" font-family="'Courier New', monospace" font-size="5.5" font-weight="700" fill="#6366f1">/\w+@\w+\.[a-z]+/<tspan fill="#f59e0b">gi</tspan></text>

    <!-- Simulated test text editor -->
    <rect x="8" y="38" width="99" height="52" rx="4" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" />
    
    <!-- Text row 1 with match highlighted -->
    <rect x="12" y="44" width="70" height="9" rx="2" fill="rgba(99,102,241,0.22)" stroke="rgba(99,102,241,0.5)" stroke-width="0.5" />
    <text x="14" y="51" font-family="'Courier New', monospace" font-size="6" fill="#f3f4f6">jane@test.com</text>

    <!-- Text row 2 -->
    <text x="12" y="64" font-family="'Courier New', monospace" font-size="6" fill="#4b5563">invalid_mail.net</text>

    <!-- Text row 3 with match highlighted -->
    <rect x="12" y="71" width="75" height="9" rx="2" fill="rgba(99,102,241,0.22)" stroke="rgba(99,102,241,0.5)" stroke-width="0.5" />
    <text x="14" y="78" font-family="'Courier New', monospace" font-size="6" fill="#f3f4f6">admin@domain.co</text>

    <!-- Inspector Match Badge success -->
    <rect x="8" y="96" width="99" height="16" rx="3" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="0.8" />
    <circle cx="16" cy="104" r="3.5" fill="url(#green-grad)" />
    <path d="M14.5,104 L15.5,105 L17.5,103" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round" />
    <text x="24" y="106" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#34d399">2 MATCHES VERIFIED</text>
  </g>

  <!-- BRANDING / TEXT LABELS -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="0.5">
      Reg<tspan fill="#6366f1">Builder</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="7" font-weight="600" text-anchor="middle" fill="#9ca3af" letter-spacing="1" opacity="0.8">
      REGEX BUILDER &amp; PLAYGROUND
    </text>
  </g>
</svg>
