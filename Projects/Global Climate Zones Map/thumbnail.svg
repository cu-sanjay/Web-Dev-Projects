<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f1d2e"/>
    </linearGradient>
    <linearGradient id="tropic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="desert" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="temp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="polar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g stroke="#1e3a5f" stroke-width="0.3" fill="none" opacity="0.25">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
  </g>

  <!-- Simplified world map -->
  <g fill="none" stroke="#1e3a5f" stroke-width="0.8" opacity="0.5">
    <path d="M 15,30 C 22,22 40,20 55,22 C 65,24 72,27 72,40 C 72,50 67,55 67,65 C 67,72 60,75 52,72 C 45,70 37,62 30,55 C 23,47 18,40 15,30 Z"/>
    <path d="M 57,77 C 67,75 75,77 80,87 C 85,97 85,112 77,130 C 72,142 65,152 57,145 C 52,137 50,120 50,100 C 50,87 52,80 57,77 Z"/>
    <path d="M 127,65 C 137,57 155,57 170,62 C 180,67 185,77 185,90 C 185,102 180,120 172,135 C 162,152 155,155 147,147 C 140,140 132,122 127,100 C 122,82 122,72 127,65 Z"/>
    <path d="M 125,25 C 135,17 155,17 167,22 C 175,27 175,40 170,50 C 165,57 155,60 145,60 C 135,60 127,55 123,47 C 117,40 117,32 125,25 Z"/>
    <path d="M 170,22 C 185,12 210,12 237,15 C 262,17 282,25 295,35 C 305,45 305,57 295,70 C 285,80 267,87 245,90 C 225,92 205,87 192,77 C 180,67 172,52 170,40 C 168,30 168,25 170,22 Z"/>
    <path d="M 280,120 C 292,112 310,112 325,120 C 335,127 337,142 327,155 C 317,167 302,170 292,160 C 282,150 275,135 280,120 Z"/>
  </g>

  <!-- Climate zone overlays -->
  <!-- Polar (top) -->
  <rect x="0" y="0" width="400" height="35" fill="#e0f2fe" opacity="0.15"/>
  <!-- Temperate (top) -->
  <rect x="0" y="35" width="400" height="45" fill="#38bdf8" opacity="0.08"/>
  <!-- Desert/tropical belt -->
  <rect x="0" y="80" width="400" height="40" fill="#22c55e" opacity="0.08"/>
  <rect x="130" y="75" width="140" height="30" fill="#f59e0b" opacity="0.15"/>
  <!-- Temperate (bottom) -->
  <rect x="0" y="120" width="400" height="45" fill="#38bdf8" opacity="0.08"/>
  <!-- Polar (bottom) -->
  <rect x="0" y="165" width="400" height="35" fill="#e0f2fe" opacity="0.15"/>

  <!-- Mountain symbols -->
  <g fill="#475569" opacity="0.3">
    <polygon points="115,95 120,82 125,95"/>
    <polygon points="118,95 123,85 128,95"/>
  </g>

  <!-- Temperature gradient strip -->
  <g>
    <rect x="30" y="230" width="180" height="6" rx="3" fill="url(#polar)" opacity="0.6"/>
    <rect x="30" y="230" width="45" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
    <rect x="75" y="230" width="45" height="6" fill="#93c5fd" opacity="0.3"/>
    <rect x="120" y="230" width="45" height="6" fill="#fcd34d" opacity="0.3"/>
    <rect x="165" y="230" width="45" height="6" rx="3" fill="#ef4444" opacity="0.3"/>
    <text x="30" y="226" fill="#64748b" font-family="monospace" font-size="5">Cold</text>
    <text x="175" y="226" fill="#64748b" font-family="monospace" font-size="5">Hot</text>
  </g>

  <!-- Legend dots -->
  <g transform="translate(230,220)">
    <circle cx="0" cy="0" r="3" fill="#22c55e"/><text x="6" y="1" fill="#64748b" font-family="monospace" font-size="5">Tropical</text>
    <circle cx="0" cy="8" r="3" fill="#f59e0b"/><text x="6" y="9" fill="#64748b" font-family="monospace" font-size="5">Desert</text>
    <circle cx="0" cy="16" r="3" fill="#38bdf8"/><text x="6" y="17" fill="#64748b" font-family="monospace" font-size="5">Temperate</text>
    <circle cx="0" cy="24" r="3" fill="#e0f2fe"/><text x="6" y="25" fill="#64748b" font-family="monospace" font-size="5">Polar</text>
  </g>

  <!-- Temperature icon -->
  <g transform="translate(340,228)" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6">
    <circle cx="0" cy="-5" r="3"/>
    <line x1="0" y1="-2" x2="0" y2="8"/>
  </g>

  <!-- Title -->
  <rect x="20" y="210" width="200" height="20" rx="10" fill="rgba(17,24,39,0.85)" stroke="#334155" stroke-width="0.5"/>
  <text x="120" y="224" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="10" font-weight="700">Global Climate Zones</text>
</svg>