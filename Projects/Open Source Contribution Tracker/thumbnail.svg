  <text x="90" y="58" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#64748b">Open source contribution telemetry</text>
  
  <!-- Top Streak Widget -->
  <rect x="360" y="22" width="115" height="38" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>
  <text x="375" y="45" font-family="'Outfit', sans-serif" font-weight="700" font-size="12" fill="#eab308">🔥</text>
  <text x="392" y="34" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="8" fill="#64748b">STREAK</text>
  <text x="392" y="48" font-family="'Outfit', sans-serif" font-weight="800" font-size="11" fill="#f97316">18 Days</text>
  
