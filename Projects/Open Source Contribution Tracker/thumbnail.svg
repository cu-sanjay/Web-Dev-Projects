<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="50%" stop-color="#0e1324"/>
      <stop offset="100%" stop-color="#04060c"/>
    </linearGradient>
    
    <!-- Heatmap Level Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Green Level Gradients for Heatmap -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Pink Review Gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Subtle Coding Grid -->
  <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300 M 400,0 L 400,300 M 450,0 L 450,300" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  
  <!-- Sidebar simulator (compact) -->
  <rect x="0" y="0" width="70" height="300" rx="20" fill="rgba(11, 15, 27, 0.5)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  <!-- Mini Git Graph Mock in Sidebar -->
  <g transform="translate(35, 40)">
    <circle cx="0" cy="0" r="10" fill="url(#primaryGrad)"/>
    <path d="M -4,-4 L 4,4 M -4,4 L 4,-4" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <circle cx="35" cy="95" r="4" fill="#a855f7"/>
  <circle cx="35" cy="130" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="35" cy="165" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="35" cy="200" r="4" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Main Header Info -->
