    <!-- Ledger mock values -->
    <rect x="16" y="130" width="222" height="48" rx="8" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)"/>
    <g transform="translate(24, 136)">
      <circle cx="10" cy="18" r="8" fill="url(#primaryGrad)"/>
      <text x="10" y="21" font-family="'Outfit', sans-serif" font-weight="900" font-size="8" fill="#ffffff" text-anchor="middle">PR</text>
      
      <text x="26" y="14" font-family="'Outfit', sans-serif" font-weight="700" font-size="8.5" fill="#ffffff">Merged: Add parsing engines</text>
      <text x="26" y="24" font-family="'Plus Jakarta Sans', sans-serif" font-size="6.5" fill="#64748b">nodejs/node • Today • +150 XP</text>
      
      <rect x="180" y="10" width="34" height="14" rx="3.5" fill="rgba(16, 185, 129, 0.1)"/>
      <text x="197" y="20" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="6.5" fill="#34d399" text-anchor="middle">Merged</text>
