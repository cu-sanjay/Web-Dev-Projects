        <rect x="23" y="0" width="20" height="20" rx="4.5" fill="rgba(59, 130, 246, 0.12)" stroke="rgba(59, 130, 246, 0.25)"/>
        <text x="33" y="13" font-family="'Outfit', sans-serif" font-size="9" text-anchor="middle">🚀</text>
        
        <rect x="46" y="0" width="20" height="20" rx="4.5" fill="rgba(234, 179, 8, 0.12)" stroke="rgba(234, 179, 8, 0.25)"/>
