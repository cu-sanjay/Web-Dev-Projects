    <rect width="115" height="195" rx="14" fill="rgba(17, 24, 39, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="14" y="24" font-family="'Outfit', sans-serif" font-weight="700" font-size="11" fill="#ffffff">Developer Stats</text>
    
    <!-- Level Circular Progress -->
    <g transform="translate(58, 70)">
      <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="5"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="url(#greenGrad)" stroke-width="5" stroke-dasharray="130, 46" stroke-linecap="round" transform="rotate(-90)"/>
      <text x="0" y="4" font-family="'Outfit', sans-serif" font-weight="800" font-size="12" fill="#ffffff" text-anchor="middle">Lvl 4</text>
    </g>
    
    <!-- XP Label -->
    <text x="58" y="115" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="8" fill="#64748b" text-anchor="middle">2,850 TOTAL XP</text>
    
    <!-- Badges Row -->
