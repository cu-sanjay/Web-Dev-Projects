<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" fill="#04060f"/>
  <!-- Decorative Grid / Glows -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity="0.3"/>
  <circle cx="200" cy="150" r="180" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="6 12" opacity="0.15"/>
  <!-- Subnet Box Divisions -->
  <rect x="50" y="60" width="140" height="180" rx="8" fill="rgba(6, 182, 212, 0.08)" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <rect x="210" y="60" width="140" height="85" rx="8" fill="rgba(139, 92, 246, 0.08)" stroke="#8b5cf6" stroke-width="2" opacity="0.8"/>
  <rect x="210" y="155" width="140" height="85" rx="8" fill="rgba(236, 72, 153, 0.08)" stroke="#ec4899" stroke-width="2" opacity="0.8"/>
  <!-- Labels and Bits -->
  <text x="120" y="155" font-family="'Outfit', sans-serif" font-size="24" font-weight="bold" fill="#06b6d4" text-anchor="middle">/25</text>
  <text x="280" y="105" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">/26</text>
  <text x="280" y="200" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#ec4899" text-anchor="middle">/26</text>
  <!-- Binary Bit Bar -->
  <g transform="translate(100, 260)">
    <rect width="200" height="15" rx="4" fill="#0f172a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Color coding network, subnet, host -->
    <rect x="0" y="0" width="120" height="15" rx="4" fill="#3b82f6" opacity="0.8"/>
    <rect x="120" y="0" width="40" height="15" fill="#06b6d4" opacity="0.8"/>
    <rect x="160" y="0" width="40" height="15" rx="4" fill="#ec4899" opacity="0.4"/>
  </g>
  <!-- Text Label -->
  <text x="200" y="40" font-family="'Outfit', sans-serif" font-size="18" font-weight="800" fill="#f3f4f6" text-anchor="middle" letter-spacing="0.5">SUBNET VISUALIZER</text>
</svg>
