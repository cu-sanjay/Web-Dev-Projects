<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for gradients, filters and markers -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d16" />
      <stop offset="100%" stop-color="#141a2c" />
    </linearGradient>

    <!-- Glassmorphic Card Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b253c" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#121929" stop-opacity="0.8" />
    </linearGradient>

    <!-- Vector gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ca2f1" />
      <stop offset="100%" stop-color="#095fb8" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a4dff" />
      <stop offset="100%" stop-color="#5b209e" />
    </linearGradient>

    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11d87f" />
      <stop offset="100%" stop-color="#067d46" />
    </linearGradient>

    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbb00" />
      <stop offset="100%" stop-color="#b88600" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    
    <!-- Arrow Marker for sequence path -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 7 5 L 0 8.5 z" fill="#ffbb00" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />

  <!-- Grid network overlay -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="500" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="300" y1="0" x2="300" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="500" y1="0" x2="500" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="700" y1="0" x2="700" y2="500" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
  </g>

  <!-- Header Title -->
  <g transform="translate(40, 55)">
    <rect x="-8" y="-22" width="36" height="36" rx="8" fill="#9a4dff" fill-opacity="0.15" />
    <!-- Vault/Shield Icon representation -->
    <path d="M 10 -15 L 22 -11 L 22 -3 L 10 5 L -2 -3 L -2 -11 Z" fill="none" stroke="#9a4dff" stroke-width="2.5" />
    <circle cx="10" cy="-4" r="3" fill="#9a4dff" />
    
    <text x="45" y="7" font-family="'Outfit', sans-serif" font-weight="800" font-size="24" fill="#ffffff" letter-spacing="0.5">BankerOS</text>
    <text x="175" y="5" font-family="'Outfit', sans-serif" font-weight="500" font-size="13" fill="#9a4dff" letter-spacing="1">DEADLOCK AVOIDANCE &amp; SAFETY VISUALIZER</text>
  </g>

  <!-- Main visual panels: System Vectors and Matrices -->

  <!-- Available vector card -->
  <g transform="translate(40, 110)" filter="url(#cardGlow)">
    <rect width="210" height="235" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="32" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" fill="#ffffff">System Vectors</text>
    
    <!-- Total vs Available -->
    <g transform="translate(24, 60)">
      <!-- Resource A -->
      <g>
        <text x="0" y="14" font-family="'Fira Code', monospace" font-weight="700" font-size="14" fill="#1ca2f1">Res A</text>
        <rect x="55" y="2" width="100" height="12" rx="3" fill="#0b101c" />
        <rect width="70" height="12" rx="3" fill="url(#blueGrad)" x="55" y="2" />
        <text x="162" y="13" font-family="'Fira Code', monospace" font-size="11" fill="#ffffff">7/10</text>
      </g>
      
      <!-- Resource B -->
      <g transform="translate(0, 45)">
        <text x="0" y="14" font-family="'Fira Code', monospace" font-weight="700" font-size="14" fill="#9a4dff">Res B</text>
        <rect x="55" y="2" width="100" height="12" rx="3" fill="#0b101c" />
        <rect width="40" height="12" rx="3" fill="url(#purpleGrad)" x="55" y="2" />
        <text x="162" y="13" font-family="'Fira Code', monospace" font-size="11" fill="#ffffff">2/5</text>
      </g>
      
      <!-- Resource C -->
      <g transform="translate(0, 90)">
        <text x="0" y="14" font-family="'Fira Code', monospace" font-weight="700" font-size="14" fill="#11d87f">Res C</text>
        <rect x="55" y="2" width="100" height="12" rx="3" fill="#0b101c" />
        <rect width="85" height="12" rx="3" fill="url(#emeraldGrad)" x="55" y="2" />
        <text x="162" y="13" font-family="'Fira Code', monospace" font-size="11" fill="#ffffff">6/7</text>
      </g>
    </g>

    <line x1="20" y1="185" x2="190" y2="185" stroke="#223052" stroke-width="1" />
    <text x="105" y="208" font-family="'Outfit', sans-serif" font-weight="500" font-size="11" fill="#a0aec0" text-anchor="middle">Available Vector [Work]</text>
    <text x="105" y="224" font-family="'Fira Code', monospace" font-weight="700" font-size="14" fill="#ffbb00" text-anchor="middle">A:3 | B:3 | C:2</text>
  </g>

  <!-- Process Matrix grid visual -->
  <g transform="translate(270, 110)" filter="url(#cardGlow)">
    <rect width="490" height="235" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="32" font-family="'Outfit', sans-serif" font-weight="600" font-size="14" fill="#ffffff">Process Safety Matrix</text>

    <!-- Table header -->
    <g transform="translate(24, 55)">
      <text x="0" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#718096">PROCESS</text>
      <text x="105" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#1ca2f1" text-anchor="middle">ALLOCATION</text>
      <text x="235" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#9a4dff" text-anchor="middle">MAX CLAIM</text>
      <text x="365" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#ffbb00" text-anchor="middle">NEED (MAX-ALLOC)</text>
      <text x="430" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" fill="#718096" text-anchor="end">STATUS</text>
      <line x1="0" y1="22" x2="442" y2="22" stroke="#223052" stroke-width="1" />
    </g>

    <!-- Processes items rows -->
    <g transform="translate(24, 95)">
      <!-- Row P0 -->
      <g>
        <text x="0" y="14" font-family="'Outfit', sans-serif" font-weight="700" font-size="13" fill="#ffffff">P0</text>
        <text x="105" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">0  1  0</text>
        <text x="235" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">7  5  3</text>
        <text x="365" y="14" font-family="'Fira Code', monospace" font-weight="600" font-size="12" fill="#ffbb00" text-anchor="middle">7  4  3</text>
        <rect x="402" y="2" width="40" height="15" rx="3" fill="#718096" fill-opacity="0.15" />
        <text x="422" y="12" font-family="'Outfit', sans-serif" font-size="9" fill="#a0aec0" font-weight="700" text-anchor="middle">WAIT</text>
        <line x1="0" y1="24" x2="442" y2="24" stroke="#223052" stroke-width="0.5" />
      </g>

      <!-- Row P1 (Executing/Safe checked) -->
      <g transform="translate(0, 34)">
        <rect x="-6" y="-3" width="454" height="23" rx="4" fill="#11d87f" fill-opacity="0.08" stroke="#11d87f" stroke-opacity="0.3" stroke-width="1" />
        <text x="0" y="14" font-family="'Outfit', sans-serif" font-weight="700" font-size="13" fill="#11d87f">P1</text>
        <text x="105" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#11d87f" text-anchor="middle">2  0  0</text>
        <text x="235" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#11d87f" text-anchor="middle">3  2  2</text>
        <text x="365" y="14" font-family="'Fira Code', monospace" font-weight="600" font-size="12" fill="#11d87f" text-anchor="middle">1  2  2</text>
        <rect x="402" y="2" width="40" height="15" rx="3" fill="#11d87f" fill-opacity="0.2" />
        <text x="422" y="12" font-family="'Outfit', sans-serif" font-size="9" fill="#11d87f" font-weight="700" text-anchor="middle">DONE</text>
        <line x1="0" y1="24" x2="442" y2="24" stroke="#223052" stroke-width="0.5" />
      </g>

      <!-- Row P2 -->
      <g transform="translate(0, 68)">
        <text x="0" y="14" font-family="'Outfit', sans-serif" font-weight="700" font-size="13" fill="#ffffff">P2</text>
        <text x="105" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">3  0  2</text>
        <text x="235" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">9  0  2</text>
        <text x="365" y="14" font-family="'Fira Code', monospace" font-weight="600" font-size="12" fill="#ffbb00" text-anchor="middle">6  0  0</text>
        <rect x="402" y="2" width="40" height="15" rx="3" fill="#718096" fill-opacity="0.15" />
        <text x="422" y="12" font-family="'Outfit', sans-serif" font-size="9" fill="#a0aec0" font-weight="700" text-anchor="middle">WAIT</text>
        <line x1="0" y1="24" x2="442" y2="24" stroke="#223052" stroke-width="0.5" />
      </g>

      <!-- Row P3 (Executing/Safe checked) -->
      <g transform="translate(0, 102)">
        <rect x="-6" y="-3" width="454" height="23" rx="4" fill="#11d87f" fill-opacity="0.08" stroke="#11d87f" stroke-opacity="0.3" stroke-width="1" />
        <text x="0" y="14" font-family="'Outfit', sans-serif" font-weight="700" font-size="13" fill="#11d87f">P3</text>
        <text x="105" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#11d87f" text-anchor="middle">2  1  1</text>
        <text x="235" y="14" font-family="'Fira Code', monospace" font-size="12" fill="#11d87f" text-anchor="middle">2  2  2</text>
        <text x="365" y="14" font-family="'Fira Code', monospace" font-weight="600" font-size="12" fill="#11d87f" text-anchor="middle">0  1  1</text>
        <rect x="402" y="2" width="40" height="15" rx="3" fill="#11d87f" fill-opacity="0.2" />
        <text x="422" y="12" font-family="'Outfit', sans-serif" font-size="9" fill="#11d87f" font-weight="700" text-anchor="middle">DONE</text>
      </g>
    </g>
  </g>

  <!-- Safe sequence timeline mapping -->
  <g transform="translate(40, 365)" filter="url(#cardGlow)">
    <rect width="720" height="105" rx="16" fill="url(#cardGrad)" stroke="#223052" stroke-width="1.5" />
    <text x="24" y="28" font-family="'Outfit', sans-serif" font-weight="600" font-size="13" fill="#ffffff">Safety Verification Proof Steps</text>
    
    <!-- Safety indicator badge status -->
    <rect x="630" y="14" width="65" height="20" rx="4" fill="#11d87f" fill-opacity="0.15" stroke="#11d87f" stroke-opacity="0.3" />
    <text x="662" y="27" font-family="'Outfit', sans-serif" font-weight="800" font-size="10" fill="#11d87f" text-anchor="middle">SYSTEM SAFE</text>

    <!-- Safe sequence bubbles pathway -->
    <g transform="translate(24, 48)">
      
      <!-- Safe sequence display item P1 -->
      <g transform="translate(10, 0)">
        <circle cx="30" cy="22" r="20" fill="url(#blueGrad)" filter="url(#glow)" />
        <text x="30" y="26" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">P1</text>
        <text x="30" y="-8" font-family="'Outfit', sans-serif" font-size="10" fill="#718096" text-anchor="middle">Step 1</text>
      </g>

      <!-- Connection arrow -->
      <line x1="72" y1="22" x2="114" y2="22" stroke="#ffbb00" stroke-width="2.5" marker-end="url(#arrow)" />

      <!-- Safe sequence display item P3 -->
      <g transform="translate(125, 0)">
        <circle cx="30" cy="22" r="20" fill="url(#purpleGrad)" />
        <text x="30" y="26" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">P3</text>
        <text x="30" y="-8" font-family="'Outfit', sans-serif" font-size="10" fill="#718096" text-anchor="middle">Step 2</text>
      </g>

      <!-- Connection arrow -->
      <line x1="187" y1="22" x2="229" y2="22" stroke="#ffbb00" stroke-width="2.5" marker-end="url(#arrow)" />

      <!-- Safe sequence display item P4 -->
      <g transform="translate(240, 0)">
        <circle cx="30" cy="22" r="20" fill="url(#emeraldGrad)" />
        <text x="30" y="26" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">P4</text>
        <text x="30" y="-8" font-family="'Outfit', sans-serif" font-size="10" fill="#718096" text-anchor="middle">Step 3</text>
      </g>

      <!-- Connection arrow -->
      <line x1="302" y1="22" x2="344" y2="22" stroke="#ffbb00" stroke-width="2.5" marker-end="url(#arrow)" />

      <!-- Safe sequence display item P0 -->
      <g transform="translate(355, 0)">
        <circle cx="30" cy="22" r="20" fill="#1b253c" stroke="#223052" stroke-width="1.5" />
        <text x="30" y="26" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#a0aec0" text-anchor="middle">P0</text>
        <text x="30" y="-8" font-family="'Outfit', sans-serif" font-size="10" fill="#718096" text-anchor="middle">Step 4</text>
      </g>

      <!-- Connection arrow -->
      <line x1="417" y1="22" x2="459" y2="22" stroke="#223052" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" />

      <!-- Safe sequence display item P2 -->
      <g transform="translate(470, 0)">
        <circle cx="30" cy="22" r="20" fill="#1b253c" stroke="#223052" stroke-width="1.5" />
        <text x="30" y="26" font-family="'Outfit', sans-serif" font-weight="800" font-size="13" fill="#a0aec0" text-anchor="middle">P2</text>
        <text x="30" y="-8" font-family="'Outfit', sans-serif" font-size="10" fill="#718096" text-anchor="middle">Step 5</text>
      </g>
    </g>
  </g>
</svg>
