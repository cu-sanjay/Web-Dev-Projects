<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="16" fill="#070a13"/>
  <rect x="8" y="8" width="112" height="112" rx="10" fill="none" stroke="#1f2937" stroke-width="1.5"/>

  <!-- 4x4 grid representation (simplified 12x12) -->
  <g transform="translate(20, 18)">
    <!-- Grid cells with colors -->
    <rect x="0" y="0" width="20" height="20" rx="2" fill="#ec4899"/>
    <rect x="22" y="0" width="20" height="20" rx="2" fill="#ec4899"/>
    <rect x="44" y="0" width="20" height="20" rx="2" fill="#f43f5e"/>
    <rect x="66" y="0" width="20" height="20" rx="2" fill="#f59e0b"/>

    <rect x="0" y="22" width="20" height="20" rx="2" fill="#ec4899"/>
    <rect x="22" y="22" width="20" height="20" rx="2" fill="#10b981"/>
    <rect x="44" y="22" width="20" height="20" rx="2" fill="#3b82f6"/>
    <rect x="66" y="22" width="20" height="20" rx="2" fill="#a855f7"/>

    <rect x="0" y="44" width="20" height="20" rx="2" fill="#f43f5e"/>
    <rect x="22" y="44" width="20" height="20" rx="2" fill="#3b82f6"/>
    <rect x="44" y="44" width="20" height="20" rx="2" fill="#10b981"/>
    <rect x="66" y="44" width="20" height="20" rx="2" fill="#f59e0b"/>

    <rect x="0" y="66" width="20" height="20" rx="2" fill="#f59e0b"/>
    <rect x="22" y="66" width="20" height="20" rx="2" fill="#a855f7"/>
    <rect x="44" y="66" width="20" height="20" rx="2" fill="#f43f5e"/>
    <rect x="66" y="66" width="20" height="20" rx="2" fill="#ec4899"/>

    <!-- Flood fill highlight on top-left region -->
    <rect x="0" y="0" width="42" height="42" rx="3" fill="none" stroke="#f8fafc" stroke-width="1.5" opacity="0.5"/>

    <!-- Arrow indicating expansion -->
    <polyline points="42,10 48,10 48,32 44,32" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Bottom label -->
  <text x="64" y="118" fill="#94a3b8" font-size="7" font-family="monospace" text-anchor="middle" letter-spacing="0.5">MATRIX INVERSION</text>
</svg>
