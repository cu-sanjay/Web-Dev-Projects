<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Internet Cable Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" role="application">
    <header class="main-header">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/><path d="M7.5 4.5l9 15M16.5 4.5l-9 15"/></svg>
        <div><h1>GLOBAL INTERNET CABLE MAP</h1><p>Undersea Cable Infrastructure Explorer</p></div>
      </div>
      <div class="header-stats">
        <span><strong id="cable-count">0</strong> cables</span>
        <span><strong id="landing-count">0</strong> landing points</span>
      </div>
    </header>
    <div class="main-layout">
      <aside class="side-panel">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search cables or countries..." aria-label="Search cables">
        </div>
        <div class="cable-list" id="cable-list"></div>
      </aside>
      <main class="map-area">
        <svg class="map-svg" id="map-svg" viewBox="0 0 1000 500" aria-label="World cable map">
          <rect x="0" y="0" width="1000" height="500" fill="#0a0f1a" rx="10"/>
          <g id="map-cables" stroke="#38bdf8" stroke-width="1" opacity="0.3" fill="none"></g>
          <g id="map-points" fill="#38bdf8"></g>
          <g id="map-labels" font-family="ui-monospace,monospace" font-size="7" fill="#64748b"></g>
        </svg>
        <div class="detail-panel" id="detail-panel">
          <div class="detail-placeholder">Click a cable or landing point for details</div>
        </div>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
