<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toon-Sprout // Cartoon Character Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- ====== LEFT SIDEBAR: FILTER DECK & TAXONOMY ====== -->
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 32 32" width="32" height="32">
          <rect x="2" y="2" width="28" height="28" rx="8" fill="#1b3a24"/>
          <path d="M16 8 Q20 16 16 24 Q12 16 16 8" fill="#81c784"/>
          <circle cx="16" cy="16" r="3" fill="#e2ebd9"/>
        </svg>
        <div class="brand-text">
          <span class="brand-title">TOON-SPROUT</span>
          <span class="brand-sub">Cartoon Character Gallery</span>
        </div>
      </div>

      <div class="sidebar-scroll">
        <!-- SEARCH -->
        <div class="filter-section">
          <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
              <circle cx="10" cy="10" r="7" fill="none" stroke="#557a61" stroke-width="2"/>
              <path d="M15 15 L21 21" fill="none" stroke="#557a61" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search by name or ability..." autocomplete="off">
          </div>
        </div>

        <!-- ERA FILTERS -->
        <div class="filter-section">
          <h3 class="filter-heading">Production Era</h3>
          <div class="checkbox-group" data-filter="era">
            <label class="check-label"><input type="checkbox" value="Classic"><span class="check-mark"></span>Classic</label>
            <label class="check-label"><input type="checkbox" value="Golden"><span class="check-mark"></span>Golden</label>
            <label class="check-label"><input type="checkbox" value="Modern"><span class="check-mark"></span>Modern</label>
          </div>
        </div>

        <!-- ORIGIN FILTERS -->
        <div class="filter-section">
          <h3 class="filter-heading">Media Origin</h3>
          <div class="checkbox-group" data-filter="origin">
            <label class="check-label"><input type="checkbox" value="Television"><span class="check-mark"></span>Television</label>
            <label class="check-label"><input type="checkbox" value="Cinematic Feature"><span class="check-mark"></span>Cinematic Feature</label>
            <label class="check-label"><input type="checkbox" value="Indie Webcomic"><span class="check-mark"></span>Indie Webcomic</label>
          </div>
        </div>

        <!-- ALIGNMENT FILTERS -->
        <div class="filter-section">
          <h3 class="filter-heading">Moral Alignment</h3>
          <div class="checkbox-group" data-filter="alignment">
            <label class="check-label"><input type="checkbox" value="Heroic"><span class="check-mark"></span>Heroic</label>
            <label class="check-label"><input type="checkbox" value="Neutral"><span class="check-mark"></span>Neutral</label>
            <label class="check-label"><input type="checkbox" value="Mischievous"><span class="check-mark"></span>Mischievous</label>
          </div>
        </div>

        <!-- RANGE SLIDERS -->
        <div class="filter-section">
          <h3 class="filter-heading">Attribute Thresholds</h3>
          <div class="slider-group">
            <div class="slider-row">
              <span class="slider-label">Power Level</span>
              <span class="slider-value" id="powerVal">100</span>
            </div>
            <input type="range" class="range-input" id="powerSlider" min="10" max="100" value="100">
          </div>
          <div class="slider-group">
            <div class="slider-row">
              <span class="slider-label">Agility Index</span>
              <span class="slider-value" id="agilityVal">100</span>
            </div>
            <input type="range" class="range-input" id="agilitySlider" min="10" max="100" value="100">
          </div>
          <div class="slider-group">
            <div class="slider-row">
              <span class="slider-label">Comedy Weight</span>
              <span class="slider-value" id="comedyVal">100</span>
            </div>
            <input type="range" class="range-input" id="comedySlider" min="10" max="100" value="100">
          </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="action-grid">
          <button class="action-btn primary" id="reflowBtn">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M2 10 L8 4 L8 8 L18 8 L18 12 L8 12 L8 16 Z" fill="currentColor"/></svg>
            RE-FLOW
          </button>
          <button class="action-btn secondary" id="clearBtn">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 4 L16 16 M16 4 L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            FLUSH
          </button>
          <button class="action-btn secondary" id="randomBtn">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 3 L12 8 L17 8 L13 11 L14 16 L10 13 L6 16 L7 11 L3 8 L8 8 Z" fill="currentColor"/></svg>
            RANDOM
          </button>
          <button class="action-btn primary" id="exportBtn">
            <svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 3 L10 13 M6 9 L10 13 L14 9 M4 16 L16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            EXPORT CSV
          </button>
        </div>
      </div>
    </aside>

    <!-- ====== RIGHT VIEWPORT: GRID GALLERY & TELEMETRY ====== -->
    <main class="viewport">
      <div class="diagnostics">
        <div class="diag-item"><span class="diag-label">Registry</span><span class="diag-value" id="totalCount">0</span></div>
        <div class="diag-item"><span class="diag-label">Visible</span><span class="diag-value" id="visibleCount">0</span></div>
        <div class="diag-item"><span class="diag-label">Filters</span><span class="diag-value" id="filterCount">0</span></div>
        <div class="diag-item">
          <span class="diag-label">Sort</span>
          <select class="sort-select" id="sortSelect">
            <option value="alphabetical">A–Z</option>
            <option value="power">Power Index</option>
            <option value="year">Release Year</option>
          </select>
        </div>
      </div>

      <div class="grid-canvas" id="gridCanvas"></div>

      <div class="status-banner" id="statusBanner">
        <span class="status-dot"></span>
        <span class="status-text">AWAITING TRANSFORMATION MATRIX</span>
      </div>
    </main>
  </div>

  <!-- ====== CHARACTER DETAIL MODAL ====== -->
  <div class="modal-overlay" id="characterModal">
    <div class="modal-panel">
      <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
