<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080b11"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glowAzure" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="azureGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="url(#bgGrad)" />

  <!-- Background Grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="320" y2="40" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="160" x2="320" y2="160" />
    <line x1="80" y1="0" x2="80" y2="200" />
    <line x1="160" y1="0" x2="160" y2="200" />
    <line x1="240" y1="0" x2="240" y2="200" />
  </g>

  <!-- Left: Horizontal Pipeline Funnel Visual Mockup -->
  <g transform="translate(20, 50)" opacity="0.85">
    <rect width="90" height="106" rx="6" fill="#03070d" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" />
    
    <!-- Funnel bar 1 (Bookmarked) -->
    <rect x="8" y="14" width="74" height="4" rx="2" fill="#64748b" />
    <!-- Funnel bar 2 (Applied) -->
    <rect x="8" y="32" width="62" height="4" rx="2" fill="#3b82f6" />
    <!-- Funnel bar 3 (Interviewing) -->
    <rect x="8" y="50" width="45" height="4" rx="2" fill="#f59e0b" />
    <!-- Funnel bar 4 (Offered) -->
    <rect x="8" y="68" width="32" height="4" rx="2" fill="#10b981" filter="url(#glowGreen)" />
    <!-- Funnel bar 5 (Rejected) -->
    <rect x="8" y="86" width="15" height="4" rx="2" fill="#ef4444" />
  </g>

  <!-- Right: Active Internship Card Details Visual Mockup -->
  <g transform="translate(130, 50)">
    <rect width="170" height="106" rx="8" fill="#111827" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5" />
    
    <!-- Card Top Header -->
    <rect x="12" y="14" width="60" height="6" rx="3" fill="#ffffff" />
    <rect x="118" y="12" width="40" height="10" rx="3" fill="rgba(245, 158, 11, 0.08)" stroke="rgba(245, 158, 11, 0.15)" stroke-width="0.8" />
    <rect x="123" y="16" width="30" height="2" rx="1" fill="#f59e0b" />
    
    <!-- Card Role Title -->
    <rect x="12" y="28" width="110" height="4" rx="2" fill="#94a3b8" />
    <rect x="12" y="38" width="85" height="4" rx="2" fill="#94a3b8" opacity="0.6" />
    
    <!-- Card Divider -->
    <line x1="12" y1="72" x2="158" y2="72" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    
    <!-- Card Footer -->
    <circle cx="18" cy="88" r="3" fill="#94a3b8" opacity="0.4" />
    <rect x="26" y="86" width="45" height="4" rx="2" fill="#475569" />
    
    <rect x="104" y="82" width="54" height="12" rx="3" fill="rgba(16, 185, 129, 0.08)" stroke="rgba(16, 185, 129, 0.15)" stroke-width="0.8" />
    <circle cx="112" cy="88" r="2.5" fill="#10b981" filter="url(#glowGreen)" />
    <rect x="120" y="86" width="30" height="4" rx="2" fill="#10b981" />
  </g>

  <!-- Brand Typography -->
  <text x="160" y="24" font-family="'Outfit', 'Inter', sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    INTERN<tspan fill="#0284c7">TRACK</tspan>
  </text>
</svg>
