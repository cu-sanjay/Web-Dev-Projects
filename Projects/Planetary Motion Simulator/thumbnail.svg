<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#050a1e" />
      <stop offset="60%" stop-color="#020308" />
      <stop offset="100%" stop-color="#000002" />
    </radialGradient>

    <!-- Blue/Cyan Nebula -->
    <radialGradient id="nebulaBlue" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Fuchsia Nebula -->
    <radialGradient id="nebulaFuchsia" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Glowing Sun Gradient -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#fff59d" />
      <stop offset="65%" stop-color="#ff9100" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ff9100" stop-opacity="0" />
    </radialGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Space -->
  <rect width="800" height="500" fill="url(#spaceBg)" />
  <rect width="800" height="500" fill="url(#nebulaBlue)" />
  <rect width="800" height="500" fill="url(#nebulaFuchsia)" />

  <!-- Stars Field -->
  <g fill="#ffffff">
    <circle cx="85" cy="80" r="1.2" opacity="0.8" />
    <circle cx="160" cy="140" r="0.8" opacity="0.5" />
    <circle cx="280" cy="70" r="1.5" opacity="0.9" />
    <circle cx="430" cy="110" r="0.7" opacity="0.4" />
    <circle cx="560" cy="55" r="1.2" opacity="0.7" />
    <circle cx="680" cy="120" r="1" opacity="0.6" />
    <circle cx="730" cy="65" r="1.6" opacity="0.8" />

    <circle cx="110" cy="380" r="1.2" opacity="0.7" />
    <circle cx="210" cy="290" r="0.7" opacity="0.4" />
    <circle cx="340" cy="420" r="1" opacity="0.6" />
    <circle cx="520" cy="350" r="1.5" opacity="0.9" />
    <circle cx="640" cy="410" r="0.8" opacity="0.5" />
    <circle cx="760" cy="340" r="1.3" opacity="0.8" />
  </g>

  <!-- Concentric Elliptical Planetary Orbits -->
  <g fill="none" opacity="0.6">
    <!-- Inner Orbit 1 (Mercury, Tilted, Eccentric) -->
    <ellipse cx="400" cy="250" rx="90" ry="70" stroke="#94a3b8" stroke-width="1" transform="rotate(25, 400, 250)" />
    
    <!-- Orbit 2 (Venus, Circular-ish) -->
    <ellipse cx="400" cy="250" rx="145" ry="135" stroke="#f97316" stroke-width="1.2" opacity="0.7" />
    
    <!-- Orbit 3 (Earth, Blue) -->
    <ellipse cx="400" cy="250" rx="205" ry="180" stroke="#38bdf8" stroke-width="1.5" filter="url(#neonGlow)" />
    
    <!-- Orbit 4 (Mars, Rust Red, Eccentric) -->
    <ellipse cx="380" cy="250" rx="280" ry="220" stroke="#f87171" stroke-width="1.2" transform="rotate(-15, 400, 250)" />
  </g>

  <!-- Kepler's Second Law Area Wedges on Mars Orbit -->
  <!-- Demonstrating equal-area wedge segments -->
  <g fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1" opacity="0.8">
    <!-- Wedge 1: Near Perihelion (wide but short) -->
    <path d="M 400,250 L 140,290 A 280 220 0 0 1 150,195 Z" transform="rotate(-15, 400, 250)" />
    <!-- Wedge 2: Near Aphelion (narrow but long) -->
    <path d="M 400,250 L 640,230 A 280 220 0 0 1 635,270 Z" transform="rotate(-15, 400, 250)" />
  </g>
  <text x="120" y="325" fill="#10b981" font-family="Share Tech Mono" font-size="8.5">Equal Area (Short/Wide)</text>
  <text x="645" y="295" fill="#10b981" font-family="Share Tech Mono" font-size="8.5">Equal Area (Long/Narrow)</text>

  <!-- Empty Second Focus Marker (Kepler 1st Law overlay) -->
  <g transform="translate(345, 230)">
    <circle cx="0" cy="0" r="4.5" fill="none" stroke="#a855f7" stroke-width="1.5" />
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#a855f7" stroke-width="1.2" />
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#a855f7" stroke-width="1.2" />
    <text x="10" y="-8" fill="#a855f7" font-family="Share Tech Mono" font-size="8.5">Focus 2</text>
  </g>

  <!-- Central Glowing Sun -->
  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="32" fill="url(#sunGlow)" />
    <circle cx="0" cy="0" r="14" fill="#ffffff" />
  </g>

  <!-- Active Planets -->
  <!-- 1. Mercury (Small grey dot) -->
  <g transform="translate(325, 208)">
    <circle cx="0" cy="0" r="3.5" fill="#94a3b8" />
  </g>
  <!-- 2. Venus (Orange dot) -->
  <g transform="translate(485, 360)">
    <circle cx="0" cy="0" r="5" fill="#f97316" />
  </g>
  <!-- 3. Earth (Cyan dot with vector overlay) -->
  <g transform="translate(300, 92)">
    <circle cx="0" cy="0" r="6" fill="#38bdf8" filter="url(#neonGlow)" />
    <!-- Velocity Arrow -->
    <line x1="0" y1="0" x2="-28" y2="-12" stroke="#00f2fe" stroke-width="2" />
    <path d="M -28,-12 L -21,-15 L -25,-8 Z" fill="#00f2fe" />
    <!-- Gravity force arrow pointing to center (400, 250) -> offset (-100, 158) -->
    <line x1="0" y1="0" x2="25" y2="38" stroke="#ff007f" stroke-width="1.8" />
    <path d="M 25,38 L 22,30 L 17,33 Z" fill="#ff007f" />
    <text x="10" y="-8" fill="#94a3b8" font-family="Share Tech Mono" font-size="9">EARTH</text>
  </g>
  <!-- 4. Mars (Rust red) -->
  <g transform="translate(650, 290)">
    <circle cx="0" cy="0" r="5" fill="#f87171" />
  </g>

  <!-- Dashboard Telemetry Card (Glassmorphic Overlay) -->
  <g transform="translate(285, 395)" opacity="0.9">
    <rect width="230" height="80" rx="8" fill="#030712" fill-opacity="0.8" stroke="#1e293b" stroke-width="1.5" />
    <text x="14" y="22" fill="#94a3b8" font-family="Outfit" font-size="9" font-weight="600" letter-spacing="0.5">OBSERVATORY DIAGNOSTICS</text>
    <text x="14" y="42" fill="#38bdf8" font-family="Share Tech Mono" font-size="12" font-weight="bold">KEPLER CONST (T²/a³): 1.0000</text>
    <text x="14" y="60" fill="#ff007f" font-family="Share Tech Mono" font-size="12" font-weight="bold">TARGET LOCK: EARTH (29.8 KM/S)</text>
    <!-- State status tag -->
    <rect x="172" y="10" width="45" height="15" rx="3" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="0.8" />
    <text x="195" y="21" fill="#10b981" font-family="Share Tech Mono" font-size="8" text-anchor="middle" font-weight="bold">STABLE</text>
  </g>

  <!-- Clock Warp Badge (Top Left) -->
  <g transform="translate(25, 25)" opacity="0.9">
    <rect width="130" height="28" rx="4" fill="#030712" fill-opacity="0.8" stroke="#1e293b" stroke-width="1" />
    <circle cx="14" cy="14" r="3" fill="#10b981" filter="url(#neonGlow)" />
    <text x="24" y="17" fill="#f8fafc" font-family="Share Tech Mono" font-size="9" font-weight="bold">TIME WARP: 100X</text>
  </g>

  <path d="M 0,0 L 800,0 L 800,500 L 0,500 Z" fill="none" stroke="#1e293b" stroke-width="2" />
</svg>
