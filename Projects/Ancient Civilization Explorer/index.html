<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ancient Civilization Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" role="application">
    <header class="main-header">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <div><h1>ANCIENT CIVILIZATION EXPLORER</h1><p>Egypt · Indus Valley · Mesopotamia · Rome · Greece · China</p></div>
      </div>
    </header>
    <div class="main-layout">
      <aside class="side-panel">
        <div class="civ-list" id="civ-list"></div>
        <div class="timeline" id="timeline"></div>
      </aside>
      <main class="content" id="content">
        <div class="welcome"><h2>Explore Ancient Civilizations</h2><p>Select a civilization from the left to begin your journey through history.</p></div>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
