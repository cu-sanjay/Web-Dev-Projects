<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a0f" />
      <stop offset="100%" stop-color="#12141d" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Teal Accent Gradient -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

  <!-- Background glows -->
  <circle cx="50" cy="150" r="50" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="270" cy="50" r="65" fill="#0d9488" opacity="0.12" filter="url(#glow)" />

  <!-- Graphic 1: Stack of Books (Left) -->
  <g transform="translate(40, 50)">
    <!-- Book 1 (Leaning) -->
    <g transform="translate(45, 0) rotate(15)">
      <rect x="0" y="0" width="18" height="85" rx="2" fill="#ea580c" />
      <rect x="3" y="10" width="12" height="4" fill="#ffffff" opacity="0.2" />
      <rect x="3" y="20" width="12" height="45" rx="1" fill="#1e1b4b" opacity="0.4" />
      <line x1="9" y1="25" x2="9" y2="60" stroke="#ea580c" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Book 2 (Vertical Blue) -->
    <g transform="translate(22, 5)">
      <rect x="0" y="0" width="20" height="80" rx="2" fill="#3b82f6" />
      <rect x="4" y="8" width="12" height="3" fill="#ffffff" opacity="0.25" />
      <!-- Book spine lines -->
      <line x1="4" y1="72" x2="16" y2="72" stroke="#ffffff" stroke-width="2" opacity="0.3" />
      <line x1="4" y1="68" x2="16" y2="68" stroke="#ffffff" stroke-width="1" opacity="0.3" />
    </g>

    <!-- Book 3 (Vertical Purple) -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="18" height="70" rx="2" fill="#8b5cf6" />
      <circle cx="9" cy="15" r="3" fill="#ffffff" opacity="0.3" />
      <line x1="4" y1="35" x2="14" y2="35" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />
      <line x1="4" y1="42" x2="14" y2="42" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />
    </g>
  </g>

  <!-- Graphic 2: Goal Progress Radial (Right) -->
  <g transform="translate(210, 90)">
    <!-- Gauge path -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6" />
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#teal-grad)" stroke-width="6" stroke-dasharray="226" stroke-dashoffset="60" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Central Text -->
    <text x="0" y="5" font-family="'Outfit', sans-serif" font-size="17" font-weight="850" fill="#ffffff" text-anchor="middle">74%</text>
    <text x="0" y="16" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="1">GOAL</text>
    
    <!-- Floating particles/stars -->
    <path d="M-48,-25 L-44,-25 L-42,-29 L-40,-25 L-36,-25 L-40,-21 L-42,-17 L-44,-21 Z" fill="#fbbf24" opacity="0.8" transform="scale(0.8)" />
    <circle cx="46" cy="-20" r="2.5" fill="#10b981" />
    <circle cx="-42" cy="25" r="2" fill="#6366f1" />
  </g>

  <!-- Text Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="850" text-anchor="middle" fill="#ffffff">
      Read<tspan fill="#6366f1">Flow</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="8.5" font-weight="500" text-anchor="middle" fill="#9ca3af" letter-spacing="0.5">
      Reading Progress Tracker &amp; Sessions
    </text>
  </g>
</svg>
