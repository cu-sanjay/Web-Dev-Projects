<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Binary Message Decoder</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid-container">
      <header>
        <p>Binary Message Decoder</p>
      </header>

      <form>
        <h1>Binary Message Decoder</h1>
        <input
               type="text"
               placeholder="Enter a binary message"
               id="binary-message"
        />
        <input
               type="submit"
               id="submit"
               value="Decode"
        />
        <p id="decoded-message"></p>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
