<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="16" fill="#f1f5f9"/>
  <rect x="8" y="8" width="112" height="112" rx="10" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 12 color ribbons (simplified to 8 for visibility) -->
  <g transform="translate(12, 18)">
    <rect x="0" y="0" width="12" height="80" rx="3" fill="#dc2626"/>
    <rect x="14" y="0" width="12" height="80" rx="3" fill="#ea580c"/>
    <rect x="28" y="0" width="12" height="80" rx="3" fill="#d97706"/>
    <rect x="42" y="0" width="12" height="80" rx="3" fill="#16a34a"/>
    <rect x="56" y="0" width="12" height="80" rx="3" fill="#0284c7"/>
    <rect x="70" y="0" width="12" height="80" rx="3" fill="#2563eb"/>
    <rect x="84" y="0" width="12" height="80" rx="3" fill="#7c3aed"/>
    <rect x="98" y="0" width="12" height="80" rx="3" fill="#a21caf"/>
  </g>

  <!-- Play indicator on active ribbon -->
  <rect x="42" y="0" width="12" height="80" rx="3" fill="#16a34a"/>
  <rect x="42" y="77" width="12" height="3" rx="1.5" fill="#3b82f6"/>

  <!-- Sound wave icon -->
  <g transform="translate(54, 105)">
    <path d="M0 0 Q 4 -6 0 -12" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 0 Q 10 -8 4 -18" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M8 0 Q 16 -10 8 -24" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
