<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a0f" />
      <stop offset="100%" stop-color="#12141d" />
    </linearGradient>
    
    <!-- Accent Gradient (Teal/Indigo) -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Indigo Accent Gradient -->
    <linearGradient id="indigo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" />

  <!-- Background decorative glows -->
  <circle cx="280" cy="50" r="50" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="40" cy="150" r="60" fill="#0d9488" opacity="0.12" filter="url(#glow)" />

  <!-- Graphic 1: DNA / Molecular Network Nodes (Left) -->
  <g transform="translate(45, 45)">
    <!-- Connections -->
    <line x1="15" y1="15" x2="45" y2="40" stroke="#4b5563" stroke-width="1.5" />
    <line x1="45" y1="40" x2="15" y2="70" stroke="#4b5563" stroke-width="1.5" />
    <line x1="45" y1="40" x2="75" y2="20" stroke="#4b5563" stroke-width="1.5" />
    <line x1="45" y1="40" x2="65" y2="80" stroke="#4b5563" stroke-width="1.5" />

    <!-- Node circles -->
    <circle cx="15" cy="15" r="7" fill="url(#indigo-grad)" filter="url(#glow)" />
    <circle cx="45" cy="40" r="10" fill="url(#primary-grad)" filter="url(#glow)" />
    <circle cx="15" cy="70" r="6" fill="#0d9488" />
    <circle cx="75" cy="20" r="5" fill="#8b5cf6" />
    <circle cx="65" cy="80" r="8" fill="#ea580c" />

    <!-- Inside graphics details -->
    <path d="M42,40 L44,42 L49,37" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Graphic 2: Kanban Boards Representation (Right) -->
  <g transform="translate(165, 40)">
    <!-- Todo Column (Outline) -->
    <rect x="0" y="0" width="34" height="90" rx="4" fill="#1c1e2a" stroke="#26293c" stroke-width="1" />
    <rect x="4" y="4" width="26" height="6" rx="1" fill="#6366f1" opacity="0.4" />
    <rect x="4" y="16" width="26" height="18" rx="2" fill="#26293c" />
    <rect x="4" y="38" width="26" height="12" rx="2" fill="#26293c" />

    <!-- Doing Column -->
    <rect x="42" y="0" width="34" height="90" rx="4" fill="#1c1e2a" stroke="#26293c" stroke-width="1" />
    <rect x="46" y="4" width="26" height="6" rx="1" fill="#ea580c" opacity="0.4" />
    <rect x="46" y="16" width="26" height="14" rx="2" fill="url(#indigo-grad)" filter="url(#glow)" opacity="0.9" />
    <rect x="46" y="34" width="26" height="22" rx="2" fill="#26293c" />

    <!-- Done Column -->
    <rect x="84" y="0" width="34" height="90" rx="4" fill="#1c1e2a" stroke="#26293c" stroke-width="1" />
    <rect x="88" y="4" width="26" height="6" rx="1" fill="#0d9488" opacity="0.4" />
    <rect x="88" y="16" width="26" height="15" rx="2" fill="#26293c" />
    <rect x="88" y="35" width="26" height="15" rx="2" fill="url(#primary-grad)" opacity="0.7" />
  </g>

  <!-- Text Branding -->
  <g transform="translate(160, 172)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="850" text-anchor="middle" fill="#ffffff">
      Scholar<tspan fill="#0d9488">Flow</tspan>
    </text>
    <text y="12" font-family="'Inter', sans-serif" font-size="8.5" font-weight="500" text-anchor="middle" fill="#9ca3af" letter-spacing="0.5">
      Research Progress Dashboard &amp; Citations
    </text>
  </g>
</svg>
