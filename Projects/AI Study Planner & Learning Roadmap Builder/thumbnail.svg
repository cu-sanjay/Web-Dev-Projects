<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913" />
      <stop offset="100%" stop-color="#0e1320" />
    </linearGradient>
    
    <!-- Accent Emerald Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Accent Cyan Gradient -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="320" height="200" rx="16" fill="url(#bg-grad)" />
  <rect width="320" height="200" rx="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

  <!-- Ambient Glows -->
  <circle cx="270" cy="140" r="50" fill="#10b981" opacity="0.1" filter="url(#glow)" />
  <circle cx="50" cy="50" r="65" fill="#06b6d4" opacity="0.08" filter="url(#glow)" />

  <!-- Roadmap Visual Connections (Dashed SVG Paths) -->
  <path d="M 75 75 C 75 110, 195 60, 195 100" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 195 100 C 195 135, 115 110, 115 145" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3" />

  <!-- Milestone Node 1 (Completed - Left Offset) -->
  <g transform="translate(30, 40)">
    <rect width="90" height="35" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.2" />
    <text x="8" y="15" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#10b981">WEEK 1</text>
    <text x="8" y="26" font-family="'Outfit', 'Inter', sans-serif" font-size="8.5" font-weight="700" fill="#ffffff">Core Basics</text>
    <!-- Checkmark Icon -->
    <circle cx="80" cy="17" r="5" fill="#10b981" />
    <path d="M 78 17 L 79.5 18.5 L 82 15.5" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Milestone Node 2 (In Progress - Right Offset) -->
  <g transform="translate(150, 80)">
    <rect width="90" height="35" rx="6" fill="#111827" stroke="#06b6d4" stroke-width="1.2" />
    <text x="8" y="15" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#06b6d4">WEEKS 2-3</text>
    <text x="8" y="26" font-family="'Outfit', 'Inter', sans-serif" font-size="8.5" font-weight="700" fill="#ffffff">Layout Design</text>
    <!-- Pulsing active dot -->
    <circle cx="80" cy="17" r="4" fill="#06b6d4" filter="url(#glow)" />
  </g>

  <!-- Milestone Node 3 (Todo - Left Offset) -->
  <g transform="translate(70, 125)">
    <rect width="90" height="35" rx="6" fill="#111827" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" />
    <text x="8" y="15" font-family="'Inter', sans-serif" font-size="6.5" font-weight="700" fill="#64748b">WEEK 4</text>
    <text x="8" y="26" font-family="'Outfit', 'Inter', sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.4)">Interactivity</text>
    <circle cx="80" cy="17" r="3.5" fill="rgba(255,255,255,0.08)" />
  </g>

  <!-- Progress Circular indicator (Right Corner) -->
  <g transform="translate(265, 45)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="3.5" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#cyan-grad)" stroke-width="3.5" stroke-dasharray="138" stroke-dashoffset="65" stroke-linecap="round" />
    <text x="0" y="3" font-family="'Outfit', 'Inter', sans-serif" font-size="10.5" font-weight="800" fill="#ffffff" text-anchor="middle">52%</text>
    <text x="0" y="11" font-family="'Inter', sans-serif" font-size="4" font-weight="600" fill="#94a3b8" text-anchor="middle">DONE</text>
  </g>

  <!-- Title Branding text -->
  <g transform="translate(160, 175)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="14.5" font-weight="800" text-anchor="middle" fill="#ffffff">
      Learn<tspan fill="#10b981">Flow</tspan>
    </text>
    <text y="11" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="0.5">
      AI Study Planner &amp; Roadmap Builder
    </text>
  </g>
</svg>
