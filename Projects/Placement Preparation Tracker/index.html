<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Preparation Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>🚀 Placement Prep Tracker</h1>
                <p id="currentDate">Today</p>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="btn-icon">🌙</button>
            </div>
        </header>

        <!-- Preparation Dashboard -->
        <section class="dashboard-overview">
            <div class="overview-card">
                <h3>Overall Readiness</h3>
                <div class="progress-container">
                    <div class="progress-bar" id="overallProgress"></div>
                </div>
                <span id="overallProgressText">0%</span>
            </div>
        </section>

        <div class="grid-layout">
            <!-- DSA Tracker -->
            <section class="card">
                <div class="card-header">
                    <h2>💻 DSA Tracker</h2>
                    <button id="addDsaBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="dsaList" class="item-list"></ul>
            </section>

            <!-- Aptitude Preparation -->
            <section class="card">
                <div class="card-header">
                    <h2>🧠 Aptitude & Reasoning</h2>
                    <button id="addAptitudeBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="aptitudeList" class="item-list"></ul>
            </section>

            <!-- Core Subjects -->
            <section class="card">
                <div class="card-header">
                    <h2>📚 Core Subjects</h2>
                    <button id="addCoreBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="coreList" class="item-list"></ul>
            </section>

            <!-- Resume & Projects -->
            <section class="card">
                <div class="card-header">
                    <h2>📄 Resume & Projects</h2>
                    <button id="addResumeBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="resumeList" class="item-list"></ul>
            </section>

            <!-- Mock Interviews -->
            <section class="card">
                <div class="card-header">
                    <h2>🎙️ Mock Interviews</h2>
                    <button id="addMockBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="mockList" class="item-list"></ul>
            </section>

            <!-- Company Prep -->
            <section class="card">
                <div class="card-header">
                    <h2>🏢 Company specific</h2>
                    <button id="addCompanyBtn" class="btn-small">+ Add</button>
                </div>
                <ul id="companyList" class="item-list"></ul>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
