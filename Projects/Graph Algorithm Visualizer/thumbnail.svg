<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
    
    <!-- Glowing Filters -->
    <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-warning" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Node Gradients -->
    <linearGradient id="grad-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="grad-shortest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Edge Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="21" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#4b5563" />
    </marker>
    <marker id="arrow-shortest" viewBox="0 0 10 10" refX="21" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#f59e0b" />
    </marker>
  </defs>

  <!-- Deep Slate Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  
  <!-- Grid pattern overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Mockup Title Headers -->
  <text x="400" y="70" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" letter-spacing="3">GRAPH LAB VISUALIZER</text>
  <text x="400" y="100" text-anchor="middle" fill="#6b7280" font-family="'Fira Code', monospace" font-size="12" font-weight="600" letter-spacing="1.5">// SHORTEST PATH &amp; MST TOPOLOGY LAB</text>

  <!-- Graph Connections (Edges) -->
  <!-- Shortest Path edges (Highlighted in Gold/Amber) -->
  <line x1="200" y1="260" x2="380" y2="180" stroke="#f59e0b" stroke-width="4.5" marker-end="url(#arrow-shortest)" filter="url(#glow-warning)" />
  <line x1="380" y1="180" x2="520" y2="340" stroke="#f59e0b" stroke-width="4.5" marker-end="url(#arrow-shortest)" filter="url(#glow-warning)" />
  <line x1="520" y1="340" x2="680" y2="260" stroke="#f59e0b" stroke-width="4.5" marker-end="url(#arrow-shortest)" filter="url(#glow-warning)" />

  <!-- Standard edges -->
  <line x1="200" y1="260" x2="320" y2="380" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="320" y1="380" x2="520" y2="340" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="380" y1="180" x2="680" y2="260" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="200" y1="260" x2="480" y2="260" stroke="#4b5563" stroke-width="2" stroke-dasharray="4" />
  <line x1="480" y1="260" x2="680" y2="260" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Edge Weights badge containers -->
  <!-- Shortest Path edge weights -->
  <g transform="translate(290, 220)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="10" font-weight="700">3</text>
  </g>
  <g transform="translate(450, 260)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="10" font-weight="700">4</text>
  </g>
  <g transform="translate(600, 300)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="10" font-weight="700">2</text>
  </g>
  <!-- Standard edge weights -->
  <g transform="translate(260, 320)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-family="'Fira Code', monospace" font-size="10">8</text>
  </g>
  <g transform="translate(420, 360)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-family="'Fira Code', monospace" font-size="10">5</text>
  </g>
  <g transform="translate(530, 220)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0b0f19" />
    <text text-anchor="middle" dominant-baseline="central" fill="#9ca3af" font-family="'Fira Code', monospace" font-size="10">9</text>
  </g>

  <!-- Graph Nodes (Vertices) -->
  <!-- Start Node (Node 1) -->
  <g transform="translate(200, 260)">
    <circle r="20" fill="url(#grad-shortest)" stroke="#ffffff" stroke-width="2" filter="url(#glow-warning)" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="800" font-size="13">S</text>
    <text y="-25" text-anchor="middle" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="9" font-weight="700">dist=0</text>
  </g>

  <!-- Inner Nodes -->
  <g transform="translate(380, 180)">
    <circle r="18" fill="url(#grad-shortest)" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-warning)" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="800" font-size="12">2</text>
    <text y="-23" text-anchor="middle" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="9" font-weight="700">dist=3</text>
  </g>
  <g transform="translate(320, 380)">
    <circle r="18" fill="url(#grad-node)" stroke="#ffffff" stroke-width="1.5" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="700" font-size="12">3</text>
  </g>
  <g transform="translate(480, 260)">
    <circle r="18" fill="url(#grad-node)" stroke="#ffffff" stroke-width="1.5" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="700" font-size="12">4</text>
  </g>
  <g transform="translate(520, 340)">
    <circle r="18" fill="url(#grad-shortest)" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-warning)" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="800" font-size="12">5</text>
    <text y="-23" text-anchor="middle" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="9" font-weight="700">dist=7</text>
  </g>

  <!-- Target Node (Node Target) -->
  <g transform="translate(680, 260)">
    <circle r="20" fill="url(#grad-shortest)" stroke="#ffffff" stroke-width="2" filter="url(#glow-warning)" />
    <text text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="800" font-size="13">T</text>
    <text y="-25" text-anchor="middle" fill="#f59e0b" font-family="'Fira Code', monospace" font-size="9" font-weight="700">dist=9</text>
  </g>

  <!-- Dashboard Metrics Mockup -->
  <rect x="30" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="45" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">PATH ENGINE</text>
  <text x="45" y="458" fill="#f59e0b" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">DIJKSTRA</text>

  <rect x="620" y="420" width="150" height="50" rx="6" fill="#111827" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="635" y="438" fill="#9ca3af" font-family="'Outfit', sans-serif" font-size="9" font-weight="600">SHORTEST PATH COST</text>
  <text x="635" y="458" fill="#10b981" font-family="'Outfit', sans-serif" font-size="15" font-weight="800">9 UNITS</text>
</svg>
