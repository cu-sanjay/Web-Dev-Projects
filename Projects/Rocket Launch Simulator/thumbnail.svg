<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020306" />
      <stop offset="50%" stop-color="#050a18" />
      <stop offset="100%" stop-color="#0e172e" />
    </linearGradient>

    <!-- Earth Atmosphere Glow -->
    <radialGradient id="skyGlow" cx="20%" cy="100%" r="90%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.25" />
      <stop offset="45%" stop-color="#0066ff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Earth Sphere Gradient -->
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b172a" />
      <stop offset="40%" stop-color="#0a2540" />
      <stop offset="80%" stop-color="#034870" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Rocket Flame Gradients -->
    <linearGradient id="s2Flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="20%" stop-color="#00f2fe" />
      <stop offset="60%" stop-color="#0066ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#000033" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="s1Flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffdd66" />
      <stop offset="25%" stop-color="#ff5500" />
      <stop offset="70%" stop-color="#cc0000" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#330000" stop-opacity="0" />
    </linearGradient>
    
    <!-- Metal Casing Gradients -->
    <linearGradient id="metalSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#e2e8f0" />
      <stop offset="75%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Space -->
  <rect width="800" height="500" fill="url(#spaceGrad)" />

  <!-- Atmospheric Sky Glow Overlay -->
  <rect width="800" height="500" fill="url(#skyGlow)" />

  <!-- Stars Field -->
  <g fill="#ffffff">
    <!-- Tiny background stars -->
    <circle cx="85" cy="74" r="0.8" opacity="0.6" />
    <circle cx="160" cy="120" r="1" opacity="0.8" />
    <circle cx="240" cy="55" r="0.5" opacity="0.4" />
    <circle cx="310" cy="180" r="1.2" opacity="0.7" />
    <circle cx="480" cy="90" r="0.8" opacity="0.5" />
    <circle cx="560" cy="150" r="1.5" opacity="0.9" />
    <circle cx="620" cy="45" r="0.6" opacity="0.3" />
    <circle cx="720" cy="115" r="1" opacity="0.7" />
    <circle cx="780" cy="70" r="1.3" opacity="0.6" />
    
    <circle cx="50" cy="220" r="1" opacity="0.5" />
    <circle cx="110" cy="300" r="0.7" opacity="0.4" />
    <circle cx="190" cy="250" r="1.2" opacity="0.7" />
    <circle cx="280" cy="330" r="0.6" opacity="0.3" />
    <circle cx="380" cy="240" r="1.5" opacity="0.85" />
    <circle cx="500" cy="290" r="0.8" opacity="0.6" />
    <circle cx="680" cy="230" r="1" opacity="0.7" />
    <circle cx="740" cy="280" r="0.5" opacity="0.3" />

    <!-- Twinkling Cross Stars -->
    <path d="M 450,130 L 450,140 M 445,135 L 455,135" stroke="#ffffff" stroke-width="0.8" opacity="0.85" />
    <path d="M 120,60 L 120,70 M 115,65 L 125,65" stroke="#ffffff" stroke-width="0.8" opacity="0.7" />
    <path d="M 690,80 L 690,90 M 685,85 L 695,85" stroke="#ffffff" stroke-width="0.8" opacity="0.9" />
  </g>

  <!-- Distant Blue Nebula glow -->
  <circle cx="550" cy="180" r="150" fill="#00f2fe" opacity="0.03" filter="url(#flameGlow)" />
  <circle cx="150" cy="320" r="220" fill="#0066ff" opacity="0.04" filter="url(#flameGlow)" />

  <!-- Curved Earth Horizon -->
  <path d="M -100,550 Q 350,420 900,550 L 900,600 L -100,600 Z" fill="url(#earthGrad)" />
  
  <!-- Earth atmosphere outline -->
  <path d="M -100,550 Q 350,420 900,550" stroke="#00f2fe" stroke-width="6" fill="none" opacity="0.4" filter="url(#neonGlow)" />
  <path d="M -100,550 Q 350,420 900,550" stroke="#0066ff" stroke-width="2" fill="none" opacity="0.8" />

  <!-- ================= STAGE 1: SEPARATED BOOSTER ================= -->
  <!-- Rotated and drifting away (lower left, falling back) -->
  <g transform="translate(320, 310) rotate(22)">
    <!-- Stage 1 Exhaust Plume (faded/dying embers) -->
    <path d="M -12,40 Q 0,85 12,40 Q 6,60 0,70 Q -6,60 -12,40 Z" fill="url(#s1Flame)" opacity="0.6" filter="url(#flameGlow)" />
    
    <!-- Stage 1 Body -->
    <rect x="-12" y="-30" width="24" height="70" fill="url(#metalSilver)" rx="2" />
    <!-- Dark Interstage (top part) -->
    <rect x="-12" y="-30" width="24" height="8" fill="url(#metalDark)" />
    
    <!-- Stage 1 USA markings & stripes -->
    <rect x="-12" y="-12" width="24" height="4" fill="#ef4444" />
    <text x="0" y="20" fill="#475569" font-family="Share Tech Mono" font-size="9" text-anchor="middle" font-weight="bold" transform="rotate(-90)">STAGE 1</text>
    
    <!-- Grid Fins (folded out) -->
    <path d="M -12,-22 L -20,-20 L -20,-24 Z" fill="#475569" />
    <path d="M 12,-22 L 20,-20 L 20,-24 Z" fill="#475569" />

    <!-- Engines bells -->
    <path d="M -10,40 L -12,45 L -6,45 L -5,40 Z" fill="#1e293b" />
    <path d="M 10,40 L 12,45 L 6,45 L 5,40 Z" fill="#1e293b" />
    <path d="M -3,40 L -5,45 L 5,45 L 3,40 Z" fill="#0f172a" />
  </g>

  <!-- Separation Debris & Gas Expansion (between stages) -->
  <g opacity="0.8">
    <ellipse cx="370" cy="245" rx="35" ry="15" fill="#ffffff" opacity="0.2" filter="url(#flameGlow)" transform="rotate(-25, 370, 245)" />
    <circle cx="360" cy="235" r="5" fill="#f8fafc" opacity="0.3" />
    <circle cx="385" cy="260" r="3" fill="#cbd5e1" opacity="0.4" />
    <circle cx="345" cy="255" r="4" fill="#94a3b8" opacity="0.3" />
    
    <!-- Sparkles -->
    <line x1="365" y1="230" x2="350" y2="220" stroke="#00f2fe" stroke-width="1.5" />
    <line x1="385" y1="240" x2="400" y2="235" stroke="#ffcc00" stroke-width="1.5" />
    <line x1="355" y1="265" x2="340" y2="275" stroke="#ef4444" stroke-width="1.5" />
  </g>

  <!-- ================= STAGE 2: ACTIVE ASCENDING PAYLOAD ================= -->
  <!-- Flying high towards top right (angle of ~55 degrees) -->
  <g transform="translate(480, 160) rotate(-35)">
    <!-- Stage 2 Exhaust Plume (Cyan/Blue Vacuum flame) -->
    <path d="M -8,35 Q 0,110 8,35 Q 4,80 0,95 Q -4,80 -8,35 Z" fill="url(#s2Flame)" filter="url(#flameGlow)" />
    
    <!-- Stage 2 Engine Bell -->
    <path d="M -6,20 L -8,35 L 8,35 L 6,20 Z" fill="#475569" />
    <path d="M -4,20 L -5,35 L 5,35 L 4,20 Z" fill="#1e293b" />
    
    <!-- Stage 2 Body -->
    <rect x="-8" y="-25" width="16" height="45" fill="url(#metalSilver)" rx="1.5" />
    
    <!-- Payloads Fairing (Cone) -->
    <path d="M -8,-25 C -8,-45 -4,-55 0,-62 C 4,-55 8,-45 8,-25 Z" fill="url(#metalSilver)" />
    <!-- Nosecone tip -->
    <path d="M -5,-46 C -2,-55 0,-62 0,-62 C 0,-62 2,-55 5,-46 Z" fill="#ef4444" />

    <!-- Red stripe marking -->
    <rect x="-8" y="-12" width="16" height="2.5" fill="#ef4444" />
    <text x="0" y="8" fill="#475569" font-family="Share Tech Mono" font-size="7" text-anchor="middle" font-weight="bold" transform="rotate(-90)">S2</text>
    
    <!-- Thrust Vector Arrow (Telemetry Overlay Style) -->
    <g transform="translate(0, 115)" opacity="0.8">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#00f2fe" stroke-width="2.5" stroke-dasharray="2 2" />
      <path d="M -5,25 L 0,32 L 5,25 Z" fill="#00f2fe" />
    </g>
  </g>

  <!-- Telemetry HUD Graphics / Interactive Overlay Elements -->
  <!-- Target Grid Lines (Circular orbit reference) -->
  <path d="M 0,200 Q 400,20 800,200" stroke="#00f2fe" stroke-width="1.2" stroke-dasharray="8 6" fill="none" opacity="0.15" />
  <text x="400" y="55" fill="#00f2fe" font-family="Share Tech Mono" font-size="10" opacity="0.45" text-anchor="middle" letter-spacing="1">TARGET LEO ORBIT PROFILE: 160 KM</text>

  <!-- Flight Path Vector Arc -->
  <path d="M 120,440 Q 300,340 480,160" stroke="#ff007f" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.6" />
  
  <!-- HUD Dashboard Overlays -->
  <g transform="translate(25, 25)" opacity="0.9">
    <!-- Glassmorphic panel header -->
    <rect width="180" height="42" rx="6" fill="#020617" fill-opacity="0.75" stroke="#1e293b" stroke-width="1.5" />
    <text x="12" y="18" fill="#94a3b8" font-family="Outfit" font-size="8" font-weight="600" letter-spacing="0.5">TELEMETRY STATS</text>
    <text x="12" y="32" fill="#00f2fe" font-family="Share Tech Mono" font-size="11" font-weight="bold">ALT: 138.45 KM</text>
    <text x="110" y="32" fill="#10b981" font-family="Share Tech Mono" font-size="11" font-weight="bold">VEL: 7.24 KM/S</text>
  </g>

  <g transform="translate(595, 25)" opacity="0.9">
    <rect width="180" height="42" rx="6" fill="#020617" fill-opacity="0.75" stroke="#1e293b" stroke-width="1.5" />
    <text x="12" y="18" fill="#94a3b8" font-family="Outfit" font-size="8" font-weight="600" letter-spacing="0.5">FLIGHT DECK STATUS</text>
    <circle cx="16" cy="29" r="3.5" fill="#ff007f" />
    <text x="25" y="32" fill="#ff007f" font-family="Share Tech Mono" font-size="10" font-weight="bold">STAGE 2 SUSTAINER ACTIVE</text>
  </g>
</svg>
