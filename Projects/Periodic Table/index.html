<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodic Table · Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-bar">
    <div class="top-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="1.5">
        <circle cx="6" cy="6" r="2" stroke="#00e5ff"/><circle cx="18" cy="6" r="2" stroke="#00e676"/><circle cx="12" cy="12" r="2" stroke="#ffb800"/>
        <circle cx="6" cy="18" r="2" stroke="#ff6d00"/><circle cx="18" cy="18" r="2" stroke="#ff1744"/>
        <line x1="6" y1="8" x2="6" y2="16" stroke="rgba(255,255,255,0.1)"/>
        <line x1="18" y1="8" x2="18" y2="16" stroke="rgba(255,255,255,0.1)"/>
      </svg>
      <div>
        <h1 class="top-title">Periodic Table · Interactive</h1>
        <span class="top-sub">elemental command center v1.0</span>
      </div>
      <span class="top-badge" id="topBadge">118 ELEMENTS</span>
    </div>
    <div class="top-metrics">
      <span class="metric-chip" id="chipFamily">FAMILY <strong id="familyVal">ALL</strong></span>
      <span class="metric-chip accent" id="chipCount">SELECTED <strong id="countVal">--</strong></span>
    </div>
  </header>

  <main class="workspace">

    <!-- FILTER RIBBON -->
    <section class="filter-row" id="filterRow">
      <button class="filter-btn active" data-family="all">&#x25C6; All Elements</button>
      <button class="filter-btn" data-family="alkali-metal">&#x2605; Alkali Metals</button>
      <button class="filter-btn" data-family="alkaline-earth">&#x25B2; Alkaline Earth</button>
      <button class="filter-btn" data-family="transition">&#x25CB; Transition Metals</button>
      <button class="filter-btn" data-family="post-transition">&#x25A0; Post-Transition</button>
      <button class="filter-btn" data-family="metalloid">&#x25C7; Metalloids</button>
      <button class="filter-btn" data-family="nonmetal">&#x25CF; Nonmetals</button>
      <button class="filter-btn" data-family="halogen">&#x2607; Halogens</button>
      <button class="filter-btn" data-family="noble-gas">&#x25C9; Noble Gases</button>
      <button class="filter-btn" data-family="lanthanide">&#x25D8; Lanthanides</button>
      <button class="filter-btn" data-family="actinide">&#x2602; Actinides</button>
    </section>

    <div class="main-grid">

      <!-- GRID -->
      <section class="grid-section">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          <span>18-Column IUPAC Matrix</span>
          <span class="panel-hint" id="gridHint">CLICK ANY CELL</span>
        </div>
        <div class="table-wrap">
          <div class="grid-container" id="gridContainer"></div>
        </div>
      </section>

      <!-- INSPECTOR -->
      <aside class="inspector-section">
        <div class="panel-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="10" height="10"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
          <span>Atomic Inspector</span>
          <span class="panel-hint" id="inspectorHint">--</span>
        </div>
        <div class="inspector-body" id="inspectorBody">
          <div class="inspector-empty" id="inspectorEmpty">
            <div class="ie-icon">?</div>
            <div class="ie-text">Click or hover an element to inspect atomic properties</div>
          </div>
          <div class="inspector-data hidden" id="inspectorData">
            <div class="id-top">
              <div class="id-number" id="idNum">--</div>
              <div class="id-symbol" id="idSym">--</div>
              <div class="id-mass" id="idMass">--</div>
            </div>
            <div class="id-name" id="idName">--</div>
            <div class="id-details">
              <div class="id-row"><span class="id-lbl">Electronegativity</span><span class="id-val" id="idEn">--</span></div>
              <div class="id-row"><span class="id-lbl">Family</span><span class="id-val" id="idFamily">--</span></div>
              <div class="id-row"><span class="id-lbl">Period</span><span class="id-val" id="idPeriod">--</span></div>
              <div class="id-row"><span class="id-lbl">Group</span><span class="id-val" id="idGroup">--</span></div>
            </div>
            <div class="id-fact" id="idFact">--</div>
          </div>
        </div>
      </aside>

    </div>

    <!-- ACTIONS -->
    <footer class="action-bar">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name or symbol...">
        <span class="search-icon">&#x1F50D;</span>
      </div>
      <button class="foot-btn foot-run" id="btnShell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
        Electron Shell Config
      </button>
      <button class="foot-btn foot-reset" id="btnPurge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Purge Selection
      </button>
    </footer>

  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
